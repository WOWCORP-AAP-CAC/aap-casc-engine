---
# Hybrid CasC Drift Detection — Compare Git desired state vs AAP live state
#
# Clones platform repo, reads config.yml + tenants.yml, clones all CasC repos,
# processes YAML, exports live state from AAP, compares, and generates a drift
# report. Optionally auto-remediates.
#
# Usage:
#   ansible-playbook drift-detect.yml -e target_env=dev -e drift_mode=report
#   ansible-playbook drift-detect.yml -e target_env=prd -e drift_mode=remediate

- name: "Hybrid CasC — Drift Detection & Reconciliation"
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_oauth_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') }}"
    aap_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default(true, true) | bool }}"
    target_env: "{{ lookup('env', 'TARGET_ENV') }}"
    drift_mode: "{{ lookup('env', 'DRIFT_MODE') | default('report', true) }}"
    drift_report_path: "{{ lookup('env', 'DRIFT_REPORT_PATH') | default('/tmp/drift-report.json', true) }}"
    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') }}"
    scm_token: "{{ lookup('env', 'SCM_TOKEN') }}"

    platform_repo: "{{ lookup('env', 'PLATFORM_REPO') | default('casc-platform-global', true) }}"
    platform_scm_org: "{{ lookup('env', 'PLATFORM_SCM_ORG') | default('', true) }}"
    platform_branch: "{{ lookup('env', 'PLATFORM_BRANCH') | default('main', true) }}"
    platform_dir: "/tmp/casc-platform"

  tasks:
    # ── Phase 0: Clone platform repo and load config ────────────────────
    - name: "Clone platform repo"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone:
          - name: "{{ platform_repo }}"
            scm_org: "{{ platform_scm_org }}"
            aap_scope: platform
        clone_base_dir: "{{ platform_dir }}"
        clone_branch: "{{ platform_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    - name: "Load config.yml from platform repo"
      ansible.builtin.include_vars:
        file: "{{ platform_dir }}/{{ platform_repo }}/config.yml"
        name: platform_config

    - name: "Load tenants.yml from platform repo"
      ansible.builtin.include_vars:
        file: "{{ platform_dir }}/{{ platform_repo }}/tenants.yml"
        name: tenants_registry

    # ── Phase 1: Compute effective platform branch and resolve env branch ───
    - name: "Compute effective platform branch from config"
      ansible.builtin.set_fact:
        _effective_platform_branch: "{{ platform_config.platform_branch | default(platform_branch) }}"
        _repo_pattern: "{{ platform_config.repo_pattern | default('combined') }}"

    - name: "Assert target_env is defined in env_branch_map"
      ansible.builtin.assert:
        that:
          - target_env in platform_config.env_branch_map
        fail_msg: >-
          target_env '{{ target_env }}' not found in config.yml env_branch_map.
          Valid environments: {{ platform_config.env_branch_map.keys() | list }}.

    - name: "Resolve target branch"
      ansible.builtin.set_fact:
        target_branch: "{{ platform_config.env_branch_map[target_env] }}"

    - name: "Filter active tenants"
      ansible.builtin.set_fact:
        _active_tenants: >-
          {{ tenants_registry.tenants | default([])
             | rejectattr('status', 'defined')
             | list
             + tenants_registry.tenants | default([])
               | selectattr('status', 'defined')
               | selectattr('status', 'equalto', 'active')
               | list }}

    - name: "Build platform repos list for drift check"
      ansible.builtin.set_fact:
        _platform_repos: >-
          {{ [{'name': platform_repo, 'aap_scope': 'platform', 'scm_org': platform_scm_org}]
             if _repo_pattern == 'combined'
             else (platform_config.platform_repos | default([])
                   | map('combine', {'aap_scope': 'platform', 'scm_org': platform_scm_org})
                   | list) }}

    - name: "Initialize tenant repos list for drift check"
      ansible.builtin.set_fact:
        _tenant_repos: []

    - name: "Build tenant repos list for drift check"
      ansible.builtin.set_fact:
        _tenant_repos: "{{ _tenant_repos + _entries }}"
      vars:
        _pattern: "{{ item.repo_pattern | default(_repo_pattern) }}"
        _combined:
          - name: "casc-tenant-{{ item.org_id }}"
            aap_scope: "{{ item.org_id }}"
            scm_org: "{{ item.tenant_scm_org }}"
        _per_type:
          - { name: "controller-projects-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-credentials-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-inventories-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-templates-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-workflows-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-schedules-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-notifications-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
        _entries: "{{ _combined if _pattern == 'combined' else _per_type }}"
      loop: "{{ _active_tenants }}"
      loop_control:
        label: "{{ item.org_id }}"

    - name: "Combine all repos for processing"
      ansible.builtin.set_fact:
        _all_repos: "{{ _platform_repos + _tenant_repos }}"

    - name: "Clone platform CasC repos at effective platform branch"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone: "{{ _platform_repos }}"
        clone_base_dir: "/tmp/drift-repos"
        clone_branch: "{{ _effective_platform_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    - name: "Clone tenant CasC repos at target branch"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone: "{{ _tenant_repos }}"
        clone_base_dir: "/tmp/drift-repos"
        clone_branch: "{{ target_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    - name: "Process YAML for each repo (folder-based env layering)"
      ansible.builtin.include_role:
        name: process_casc_config
      vars:
        repo_clone_dir: "/tmp/drift-repos/{{ casc_repo.name }}"
        repo_scope: "{{ casc_repo.aap_scope }}"
        output_dir: "/tmp/drift-staging"
        env_filter: "{{ target_env }}"
      loop: "{{ _all_repos }}"
      loop_control:
        loop_var: casc_repo
        label: "{{ casc_repo.name }}"

    - name: "Load processed config (scope-suffixed)"
      ansible.builtin.include_vars:
        dir: "/tmp/drift-staging"
        extensions: [yml, yaml]
        depth: 1

    - name: "Merge suffixed variables into standard dispatch variables"
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
        tasks_from: include_wildcard_vars.yml

    - name: "Merge scope-suffixed Hub RBAC vars (engine-side)"
      ansible.builtin.set_fact:
        "{{ item }}": >-
          {{ query('ansible.builtin.varnames', '^' + item + '_.*')
             | reject('match', '.*_secure_logging$')
             | map('extract', vars) | flatten }}
      loop: [hub_roles, hub_group_roles]
      when: query('ansible.builtin.varnames', '^' + item + '_.*') | length > 0

    - name: "Capture desired state snapshot"
      ansible.builtin.set_fact:
        desired_state:
          organizations: "{{ aap_organizations | default([]) }}"
          credential_types: "{{ controller_credential_types | default([]) }}"
          credentials: "{{ controller_credentials | default([]) }}"
          execution_environments: "{{ controller_execution_environments | default([]) }}"
          projects: "{{ controller_projects | default([]) }}"
          inventories: "{{ controller_inventories | default([]) }}"
          job_templates: "{{ controller_templates | default([]) }}"
          schedules: "{{ controller_schedules | default([]) }}"

    # ── Phase 2: Export live state from AAP platform ────────────────────
    - name: "Build common auth headers for AAP API"
      ansible.builtin.set_fact:
        _aap_auth_headers: >-
          {{ {'Authorization': 'Bearer ' + aap_oauth_token}
             if aap_oauth_token | default('') | length > 0
             else {} }}
        _aap_use_basic: "{{ (aap_oauth_token | default('') | length == 0) and (aap_username | default('') | length > 0) }}"

    - name: "Export live organizations"
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/gateway/v1/organizations/?page_size=200"
        method: GET
        headers: "{{ _aap_auth_headers }}"
        user: "{{ aap_username if _aap_use_basic | bool else omit }}"
        password: "{{ aap_password if _aap_use_basic | bool else omit }}"
        force_basic_auth: "{{ _aap_use_basic | bool }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: live_organizations

    - name: "Export live credential types"
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/controller/v2/credential_types/?managed=false&page_size=200"
        method: GET
        headers: "{{ _aap_auth_headers }}"
        user: "{{ aap_username if _aap_use_basic | bool else omit }}"
        password: "{{ aap_password if _aap_use_basic | bool else omit }}"
        force_basic_auth: "{{ _aap_use_basic | bool }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: live_credential_types

    - name: "Export live projects"
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/controller/v2/projects/?page_size=200"
        method: GET
        headers: "{{ _aap_auth_headers }}"
        user: "{{ aap_username if _aap_use_basic | bool else omit }}"
        password: "{{ aap_password if _aap_use_basic | bool else omit }}"
        force_basic_auth: "{{ _aap_use_basic | bool }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: live_projects

    - name: "Export live job templates"
      ansible.builtin.uri:
        url: "{{ aap_hostname }}/api/controller/v2/job_templates/?page_size=200"
        method: GET
        headers: "{{ _aap_auth_headers }}"
        user: "{{ aap_username if _aap_use_basic | bool else omit }}"
        password: "{{ aap_password if _aap_use_basic | bool else omit }}"
        force_basic_auth: "{{ _aap_use_basic | bool }}"
        validate_certs: "{{ aap_validate_certs }}"
      register: live_job_templates

    # ── Phase 3: Compare and generate drift report ──────────────────────
    - name: "Detect drift — organizations"
      ansible.builtin.set_fact:
        drift_organizations:
          missing_in_live: "{{ desired_state.organizations | map(attribute='name') |
                               difference(live_organizations.json.results | map(attribute='name')) | list }}"
          extra_in_live: "{{ live_organizations.json.results | map(attribute='name') |
                             difference(desired_state.organizations | map(attribute='name')) |
                             reject('equalto', 'Default') | list }}"

    - name: "Detect drift — credential types"
      ansible.builtin.set_fact:
        drift_credential_types:
          missing_in_live: "{{ desired_state.credential_types | map(attribute='name') |
                               difference(live_credential_types.json.results | map(attribute='name')) | list }}"
          extra_in_live: "{{ live_credential_types.json.results | map(attribute='name') |
                             difference(desired_state.credential_types | map(attribute='name')) | list }}"

    - name: "Detect drift — projects"
      ansible.builtin.set_fact:
        drift_projects:
          missing_in_live: "{{ desired_state.projects | map(attribute='name') |
                               difference(live_projects.json.results | map(attribute='name')) | list }}"
          extra_in_live: "{{ live_projects.json.results | map(attribute='name') |
                             difference(desired_state.projects | map(attribute='name')) | list }}"

    - name: "Detect drift — job templates"
      ansible.builtin.set_fact:
        drift_job_templates:
          missing_in_live: "{{ desired_state.job_templates | map(attribute='name') |
                               difference(live_job_templates.json.results | map(attribute='name')) | list }}"
          extra_in_live: "{{ live_job_templates.json.results | map(attribute='name') |
                             difference(desired_state.job_templates | map(attribute='name')) | list }}"

    - name: "Compile drift report"
      ansible.builtin.set_fact:
        drift_report:
          timestamp: "{{ ansible_date_time.iso8601 | default(lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ')) }}"
          environment: "{{ target_env }}"
          aap_host: "{{ aap_hostname }}"
          drift_detected: "{{ (drift_organizations.missing_in_live | length > 0) or
                              (drift_organizations.extra_in_live | length > 0) or
                              (drift_credential_types.missing_in_live | length > 0) or
                              (drift_credential_types.extra_in_live | length > 0) or
                              (drift_projects.missing_in_live | length > 0) or
                              (drift_projects.extra_in_live | length > 0) or
                              (drift_job_templates.missing_in_live | length > 0) or
                              (drift_job_templates.extra_in_live | length > 0) }}"
          details:
            organizations: "{{ drift_organizations }}"
            credential_types: "{{ drift_credential_types }}"
            projects: "{{ drift_projects }}"
            job_templates: "{{ drift_job_templates }}"
          summary:
            total_drift_items: "{{ (drift_organizations.missing_in_live | length) +
                                   (drift_organizations.extra_in_live | length) +
                                   (drift_credential_types.missing_in_live | length) +
                                   (drift_credential_types.extra_in_live | length) +
                                   (drift_projects.missing_in_live | length) +
                                   (drift_projects.extra_in_live | length) +
                                   (drift_job_templates.missing_in_live | length) +
                                   (drift_job_templates.extra_in_live | length) }}"
            missing_in_live: "{{ (drift_organizations.missing_in_live | length) +
                                 (drift_credential_types.missing_in_live | length) +
                                 (drift_projects.missing_in_live | length) +
                                 (drift_job_templates.missing_in_live | length) }}"
            extra_in_live: "{{ (drift_organizations.extra_in_live | length) +
                               (drift_credential_types.extra_in_live | length) +
                               (drift_projects.extra_in_live | length) +
                               (drift_job_templates.extra_in_live | length) }}"

    # ── Phase 4: Report / Remediate ─────────────────────────────────────
    - name: "Write drift report to file"
      ansible.builtin.copy:
        content: "{{ drift_report | to_nice_json }}"
        dest: "{{ drift_report_path }}"
      delegate_to: localhost

    - name: "Display drift summary"
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════
          DRIFT DETECTION REPORT — {{ target_env | upper }}
          ══════════════════════════════════════════════════════
          Timestamp: {{ drift_report.timestamp }}
          AAP Host:  {{ aap_hostname }}
          Drift Detected: {{ drift_report.drift_detected }}
          ──────────────────────────────────────────────────────
          Organizations:
            Missing in live: {{ drift_organizations.missing_in_live | join(', ') | default('none') }}
            Extra in live:   {{ drift_organizations.extra_in_live | join(', ') | default('none') }}
          Credential Types:
            Missing in live: {{ drift_credential_types.missing_in_live | join(', ') | default('none') }}
            Extra in live:   {{ drift_credential_types.extra_in_live | join(', ') | default('none') }}
          Projects:
            Missing in live: {{ drift_projects.missing_in_live | join(', ') | default('none') }}
            Extra in live:   {{ drift_projects.extra_in_live | join(', ') | default('none') }}
          Job Templates:
            Missing in live: {{ drift_job_templates.missing_in_live | join(', ') | default('none') }}
            Extra in live:   {{ drift_job_templates.extra_in_live | join(', ') | default('none') }}
          ══════════════════════════════════════════════════════

    - name: "Publish drift report as job artifact"
      ansible.builtin.set_stats:
        data:
          drift_report: "{{ drift_report }}"

    - name: "Send drift notification"
      ansible.builtin.uri:
        url: "{{ notification_webhook_url }}"
        method: POST
        body_format: json
        body:
          text: "CasC Drift Report [{{ target_env | upper }}]: Drift {{ 'DETECTED' if drift_report.drift_detected else 'CLEAR' }} — {{ aap_hostname }}"
          drift_report: "{{ drift_report }}"
      when:
        - notification_webhook_url is defined
        - drift_report.drift_detected | bool

    - name: "Auto-remediate drift (reconciliation mode)"
      ansible.builtin.include_tasks: remediate.yml
      when:
        - drift_mode == 'remediate'
        - drift_report.drift_detected | bool
