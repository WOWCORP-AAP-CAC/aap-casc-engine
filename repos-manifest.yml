---
# repos-manifest.yml — Default Template
#
# This file provides production-ready defaults for CasC repository definitions.
# Customers do NOT edit this file — the engine fork stays immutable for clean
# upstream pulls. It is consumed by every engine playbook:
#
#   - genesis.yml    — reads this file, merges JT extra_var / survey overrides
#                      (default_organization, env_branch_map), and pushes the
#                      merged result to the manifest repo (first-time only)
#   - site.yml       — loads the manifest from the manifest repo at runtime
#   - drift-detect   — same as site.yml
#   - bootstrap.yml  — appends new tenant entries to the manifest repo's copy
#
# After genesis, the manifest repo's copy is the operational single source of
# truth. Post-genesis changes (new branches, additional repos) are made there.
#
# CUSTOMER CUSTOMIZATION:
#   This file provides sensible defaults. Customers do NOT edit this file.
#   Day-0 overrides (org name, branching strategy) are provided via the
#   genesis JT extra_vars or survey. Genesis merges them and pushes the
#   result to the manifest repo. Post-genesis changes are made directly
#   in the manifest repo's copy.
#
# MANIFEST REPO PATTERN:
#   In production, the dispatcher and drift-detect clone the manifest repo
#   (typically aap-organizations-global) to load this manifest at runtime.
#   This local copy serves as the initial genesis seed and as a CLI fallback
#   when manifest_repo is not configured.
#
# FIELD REFERENCE:
#   aap_scope — suffix added during processing
#               platform repos -> aap_scope: platform -> keys like aap_organizations_platform
#               tenant repos   -> aap_scope: myorg01  -> keys like controller_projects_myorg01
#   scm_org   — SCM org/group for clone URL construction; the git_clone_repos
#               role uses https://HOST/ORG/REPO.git. Platform repos omit
#               scm_org here because genesis injects platform_scm_org at
#               runtime when pushing the operational manifest. Tenant repos
#               are added by bootstrap with scm_org already set.
#
# COMMON env_branch_map PATTERNS:
#   Single branch (demo):      dev: main,  tst: main,  npr: main,         prd: main
#   GitFlow:                   dev: develop, tst: develop, npr: release/npr, prd: main
#   Environment branches:      dev: env/dev, tst: env/tst, npr: env/npr,   prd: main
#   Trunk-based (with tags):   dev: main,  tst: main,  npr: main,         prd: main

default_organization: Default

env_branch_map:
  dev: develop
  tst: develop
  npr: release/npr
  prd: main

platform_repos:
  - name: aap-organizations-global
    aap_scope: platform
  - name: aap-teams-global
    aap_scope: platform
  - name: gateway-role_definitions-global
    aap_scope: platform
  - name: gateway-role_user_assignments-global
    aap_scope: platform
  - name: gateway-role_team_assignments-global
    aap_scope: platform
  - name: controller-credential_types-global
    aap_scope: platform
  - name: controller-execution_environments-global
    aap_scope: platform
  - name: controller-settings-global
    aap_scope: platform
  - name: controller-schedules-platform
    aap_scope: platform

# Tenant CasC repos — added automatically by the bootstrap playbook.
# Do NOT add entries here manually; bootstrap registers them in the registry
# repo's copy via the SCM API when onboarding new tenants.
#
# Example (for reference only):
#   - name: controller-projects-myorg01
#     aap_scope: myorg01
#     scm_org: aap-casc-tenant-alpha-demo
tenant_repos: []
