---
# AAP Multi-Tenant CasC Engine — Dispatcher (Apply Configuration to AAP)
#
# Main entry point for the aap-casc-engine. Clones the control repo first
# to read authoritative metadata, then clones only the desired-state scope,
# processes YAML
# (folder-based env layering), and applies via infra.aap_configuration.dispatch.
#
# Supports explicit scope operation:
#   - platform: platform desired state only
#   - tenant: one registered tenant desired-state scope only
#   - full: platform plus all dispatch-enabled tenant scopes
#
# Usage:
#   ansible-playbook site.yml -e target_env=dev
#   ansible-playbook site.yml -e target_env=dev -e triggered_repo=casc-tenant-myorg01

- name: "AAP Multi-Tenant CasC Engine — Dispatcher"
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default(true, true) | bool }}"
    target_env: "{{ lookup('env', 'TARGET_ENV') }}"

    trigger_commit: "{{ lookup('env', 'TRIGGER_COMMIT') | default('', true) }}"
    triggered_repo: "{{ lookup('env', 'TRIGGERED_REPO') | default('', true) }}"
    tenant_org_id: "{{ lookup('env', 'TENANT_ORG_ID') | default('', true) }}"
    trigger_source: "{{ lookup('env', 'TRIGGER_SOURCE') | default('scheduled', true) }}"
    dispatch_scope: "{{ lookup('env', 'DISPATCH_SCOPE') | default('full' if trigger_source in ['scheduled', 'drift'] else 'tenant', true) }}"
    control_revision: "{{ lookup('env', 'CONTROL_REVISION') | default('', true) }}"

    aap_configuration_collect_logs: true

    control_scm_org: "{{ lookup('env', 'CONTROL_SCM_ORG') | default(lookup('env', 'PLATFORM_SCM_ORG'), true) }}"
    control_repo: "{{ lookup('env', 'CONTROL_REPO') | default('casc-platform-control', true) }}"
    control_branch: "{{ lookup('env', 'CONTROL_BRANCH') | default('main', true) }}"
    platform_scm_org: "{{ lookup('env', 'PLATFORM_SCM_ORG') | default('', true) }}"
    control_dir: "/tmp/casc-control"

    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') }}"
    scm_token: "{{ lookup('env', 'SCM_TOKEN') }}"

    clone_dir: "/tmp/casc-repos"
    staging_dir: "/tmp/casc-staging"

  pre_tasks:
    # Phase 0: Clone control repo and load authoritative metadata.
    - name: "Clone control repo"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone:
          - name: "{{ control_repo }}"
            scm_org: "{{ control_scm_org }}"
            aap_scope: control
        clone_base_dir: "{{ control_dir }}"
        clone_branch: "{{ control_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    - name: "Pin control repo to authoritative revision when supplied"
      ansible.builtin.command:
        cmd: "git -C {{ control_dir }}/{{ control_repo }} checkout --detach {{ control_revision }}"
      when: control_revision | length > 0
      changed_when: false

    - name: "Resolve effective control revision"
      ansible.builtin.command:
        cmd: "git -C {{ control_dir }}/{{ control_repo }} rev-parse HEAD"
      register: _control_rev_probe
      changed_when: false

    - name: "Record effective control revision"
      ansible.builtin.set_fact:
        effective_control_revision: "{{ control_revision if control_revision | length > 0 else _control_rev_probe.stdout }}"

    - name: "Fail closed when requested control revision is unavailable"
      ansible.builtin.assert:
        that:
          - effective_control_revision | length > 0
          - control_revision | length == 0 or effective_control_revision == control_revision
        fail_msg: >-
          Authoritative control revision is unavailable or mismatched.
          requested={{ control_revision }} resolved={{ effective_control_revision }}

    - name: "Load config.yml from control repo"
      ansible.builtin.include_vars:
        file: "{{ control_dir }}/{{ control_repo }}/config.yml"
        name: control_config

    - name: "Load tenants.yml from control repo"
      ansible.builtin.include_vars:
        file: "{{ control_dir }}/{{ control_repo }}/tenants.yml"
        name: tenants_registry

    - name: "Require naming-rules.yml from control revision"
      ansible.builtin.stat:
        path: "{{ control_dir }}/{{ control_repo }}/{{ control_config.naming_rules_file | default('naming-rules.yml') }}"
      register: _control_naming_rules

    - name: "Fail closed when control naming rules are missing"
      ansible.builtin.assert:
        that:
          - _control_naming_rules.stat.exists
        fail_msg: >-
          Control revision {{ effective_control_revision }} is missing
          {{ control_config.naming_rules_file | default('naming-rules.yml') }}.

    # Phase 1: Resolve the requested environment from control metadata.
    - name: "Compute effective configuration from control metadata"
      ansible.builtin.set_fact:
        _repo_pattern: "{{ control_config.platform_repo_pattern | default('combined') }}"
        _platform_repo: "{{ control_config.platform_repo | default('casc-platform-global') }}"
        naming_rules_file: "{{ control_config.naming_rules_file | default('naming-rules.yml') }}"
        dispatcher_jt_name: "{{ control_config.job_templates.dispatcher | default('jt-platform-casc_dispatcher', true) }}"

    - name: "Assert target_env is defined in env_branch_map"
      ansible.builtin.assert:
        that:
          - target_env in control_config.env_branch_map
        fail_msg: >-
          target_env '{{ target_env }}' not found in control config.yml env_branch_map.
          Valid environments: {{ control_config.env_branch_map.keys() | list }}.

    - name: "Resolve target branch for {{ target_env }}"
      ansible.builtin.set_fact:
        target_branch: "{{ control_config.env_branch_map[target_env] }}"

    - name: "Validate requested dispatcher scope"
      ansible.builtin.assert:
        that:
          - dispatch_scope in ['platform', 'tenant', 'full']
          - dispatch_scope != 'tenant' or tenant_org_id | length > 0 or triggered_repo | length > 0
        fail_msg: "dispatch_scope must be platform, tenant, or full; tenant scope requires TENANT_ORG_ID or TRIGGERED_REPO."

    # Phase 2: Build selected repos list
    - name: "Filter active tenants"
      ansible.builtin.set_fact:
        _active_tenants: >-
          {{ tenants_registry.tenants | default([])
             | rejectattr('status', 'defined')
             | list
             + tenants_registry.tenants | default([])
               | selectattr('status', 'defined')
               | selectattr('status', 'equalto', 'active')
               | list }}

    - name: "Build platform repos list"
      ansible.builtin.set_fact:
        _platform_repos: >-
          {{ [{'name': _platform_repo, 'aap_scope': 'platform', 'scm_org': platform_scm_org}]
             if _repo_pattern == 'combined'
             else (control_config.platform_repos | default([])
                   | map('combine', {'aap_scope': 'platform', 'scm_org': platform_scm_org})
                   | list) }}

    - name: "Initialize tenant repos list"
      ansible.builtin.set_fact:
        _tenant_repos: []

    - name: "Build tenant repos list from registered repository names"
      ansible.builtin.set_fact:
        _tenant_repos: "{{ _tenant_repos + [{'name': item.1, 'aap_scope': item.0.org_id, 'scm_org': item.0.tenant_scm_org}] }}"
      loop: >-
        {{ (_active_tenants
            | selectattr('tenant_repos', 'defined')
            | selectattr('tenant_repos')
            | list)
           | subelements('tenant_repos') }}
      loop_control:
        label: "{{ item.0.org_id }} -> {{ item.1 }}"

    - name: "Build tenant repos list for legacy registry records"
      ansible.builtin.set_fact:
        _tenant_repos: "{{ _tenant_repos + _entries }}"
      vars:
        _pattern: "{{ item.repo_pattern | default(_repo_pattern) }}"
        _combined:
          - name: "casc-tenant-{{ item.org_id }}"
            aap_scope: "{{ item.org_id }}"
            scm_org: "{{ item.tenant_scm_org }}"
        _per_type:
          - { name: "controller-projects-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-credentials-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-inventories-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-templates-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-workflows-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-schedules-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
          - { name: "controller-notifications-{{ item.org_id }}", aap_scope: "{{ item.org_id }}", scm_org: "{{ item.tenant_scm_org }}" }
        # Explicit tenant repository names are normalized during Bootstrap and
        # persisted as tenant_repos. The standard names remain the fallback for
        # legacy registry records until migration rewrites them.
        _entries: "{{ _combined if _pattern == 'combined' else _per_type }}"
      loop: "{{ _active_tenants | selectattr('dispatch_enabled', 'undefined') | list + _active_tenants | selectattr('dispatch_enabled', 'defined') | selectattr('dispatch_enabled') | list }}"
      loop_control:
        label: "{{ item.org_id }}"
      when: item.tenant_repos is not defined or item.tenant_repos | length == 0

    - name: "Select only the requested desired-state scope"
      ansible.builtin.set_fact:
        selected_repos: >-
          {{ _platform_repos if dispatch_scope == 'platform'
             else (_tenant_repos | selectattr('aap_scope', 'equalto', tenant_org_id) | list)
             if dispatch_scope == 'tenant' and tenant_org_id | length > 0
             else (_tenant_repos | selectattr('name', 'equalto', triggered_repo) | list)
             if dispatch_scope == 'tenant'
             else _platform_repos + _tenant_repos }}

    - name: "Log apply mode"
      ansible.builtin.debug:
        msg: >-
          Scope: {{ dispatch_scope }}
          | Env: {{ target_env }} | Branch: {{ target_branch }}
          | ControlRevision: {{ effective_control_revision }}
          | Repos: {{ selected_repos | length }}

    # Phase 3: Clone only selected desired-state repos at the target environment branch.
    - name: "Clone selected platform CasC repos at target branch"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone: "{{ selected_repos | selectattr('aap_scope', 'equalto', 'platform') | list }}"
        clone_base_dir: "{{ clone_dir }}"
        clone_branch: "{{ target_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    - name: "Clone tenant CasC repos at target branch"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone: "{{ selected_repos | rejectattr('aap_scope', 'equalto', 'platform') | list }}"
        clone_base_dir: "{{ clone_dir }}"
        clone_branch: "{{ target_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    # Phase 4: Process YAML (folder-based env layering + merge + suffix)
    - name: "Process YAML for each repo"
      ansible.builtin.include_role:
        name: process_casc_config
      vars:
        repo_clone_dir: "{{ clone_dir }}/{{ casc_repo.name }}"
        repo_scope: "{{ casc_repo.aap_scope }}"
        output_dir: "{{ staging_dir }}"
        env_filter: "{{ target_env }}"
      loop: "{{ selected_repos }}"
      loop_control:
        loop_var: casc_repo
        label: "{{ casc_repo.name }}"

    # Phase 5: Load scope-suffixed variables into host scope
    - name: "Load processed config (scope-suffixed)"
      ansible.builtin.include_vars:
        dir: "{{ staging_dir }}"
        extensions: [yml, yaml]
        depth: 1

    # Phase 5b: Engine-side Hub RBAC wildcard merge
    - name: "Merge scope-suffixed Hub RBAC vars (engine-side)"
      ansible.builtin.set_fact:
        "{{ item }}": >-
          {{ query('ansible.builtin.varnames', '^' + item + '_.*')
             | reject('match', '.*_secure_logging$')
             | map('extract', vars) | flatten }}
      loop: [hub_roles, hub_group_roles]
      when: query('ansible.builtin.varnames', '^' + item + '_.*') | length > 0

  roles:
    # Phase 6: Apply ALL configuration via the built-in dispatch role.
    - role: infra.aap_configuration.dispatch
      vars:
        dispatch_include_wildcard_vars: true

  post_tasks:
    # Phase 7: Engine-side Hub RBAC apply (not in collection dispatcher)
    - name: "Apply Hub RBAC resources (not in default dispatch)"
      ansible.builtin.include_role:
        name: "infra.aap_configuration.{{ __hub_extra.role }}"
      when: vars[__hub_extra.var] is defined
      loop:
        - { role: hub_role, var: hub_roles }
        - { role: hub_group_roles, var: hub_group_roles }
      loop_control:
        loop_var: __hub_extra

    # Phase 8: Post-apply reporting and error handling
    - name: "Report any collected errors"
      ansible.builtin.fail:
        msg: >-
          Configuration apply encountered errors:
          {{ aap_configuration_role_errors | to_nice_yaml }}
      when:
        - aap_configuration_role_errors is defined
        - aap_configuration_role_errors | length > 0

    - name: "Configuration apply complete"
      ansible.builtin.debug:
        msg: >-
          AAP Multi-Tenant CasC dispatcher completed successfully.
          Mode: {{ trigger_source }} | Env: {{ target_env }} |
          Repos processed: {{ selected_repos | length }}

    - name: "Remove temporary directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ clone_dir }}"
        - "{{ staging_dir }}"
        - "{{ control_dir }}"
