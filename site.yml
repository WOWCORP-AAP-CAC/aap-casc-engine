---
# Hybrid CasC Dispatcher — Apply Configuration to AAP
#
# Main entry point for the aap-casc-engine. Clones the platform repo first
# to read config.yml + tenants.yml, then clones CasC repos, processes YAML
# (folder-based env layering), and applies via infra.aap_configuration.dispatch.
#
# Supports dual-mode operation:
#   - Targeted apply: CI/CD trigger passes triggered_repo (single tenant + platform repos)
#   - Full apply: Scheduled reconciliation processes all repos from tenants.yml
#
# Usage:
#   ansible-playbook site.yml -e target_env=dev
#   ansible-playbook site.yml -e target_env=dev -e triggered_repo=casc-tenant-myorg01

- name: "Hybrid CasC Dispatcher — Apply Configuration to AAP"
  hosts: localhost
  connection: local
  gather_facts: true

  vars:
    aap_hostname: "{{ lookup('env', 'CONTROLLER_HOST') }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default(true, true) | bool }}"
    target_env: "{{ lookup('env', 'TARGET_ENV') | default('dev', true) }}"

    trigger_commit: "{{ lookup('env', 'TRIGGER_COMMIT') | default('', true) }}"
    triggered_repo: "{{ lookup('env', 'TRIGGERED_REPO') | default('', true) }}"
    trigger_source: "{{ lookup('env', 'TRIGGER_SOURCE') | default('scheduled', true) }}"

    aap_configuration_collect_logs: true

    # Platform repo — contains config.yml and tenants.yml
    platform_repo: "{{ lookup('env', 'PLATFORM_REPO') | default('casc-platform-global', true) }}"
    platform_scm_org: "{{ lookup('env', 'PLATFORM_SCM_ORG') | default('', true) }}"
    platform_branch: "main"
    platform_dir: "/tmp/casc-platform"

    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') }}"
    scm_token: "{{ lookup('env', 'SCM_TOKEN') }}"

    clone_dir: "/tmp/casc-repos"
    staging_dir: "/tmp/casc-staging"

  pre_tasks:
    # Phase 0: Clone platform repo and load config.yml + tenants.yml
    - name: "Clone platform repo"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone:
          - name: "{{ platform_repo }}"
            scm_org: "{{ platform_scm_org }}"
            aap_scope: platform
        clone_base_dir: "{{ platform_dir }}"
        clone_branch: "{{ platform_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    - name: "Load config.yml from platform repo"
      ansible.builtin.include_vars:
        file: "{{ platform_dir }}/{{ platform_repo }}/config.yml"
        name: platform_config

    - name: "Load tenants.yml from platform repo"
      ansible.builtin.include_vars:
        file: "{{ platform_dir }}/{{ platform_repo }}/tenants.yml"
        name: tenants_registry

    # Phase 1: Resolve branch from env_branch_map
    - name: "Resolve target branch for {{ target_env }}"
      ansible.builtin.set_fact:
        target_branch: "{{ platform_config.env_branch_map[target_env] | default('develop') }}"
        _repo_pattern: "{{ platform_config.repo_pattern | default('combined') }}"

    # Phase 2: Build selected repos list
    - name: "Filter active tenants"
      ansible.builtin.set_fact:
        _active_tenants: >-
          {{ tenants_registry.tenants | default([])
             | rejectattr('status', 'defined')
             | list
             + tenants_registry.tenants | default([])
               | selectattr('status', 'defined')
               | selectattr('status', 'equalto', 'active')
               | list }}

    - name: "Build tenant repos list"
      ansible.builtin.set_fact:
        _tenant_repos: >-
          {% set ns = namespace(repos=[]) %}
          {% for tenant in _active_tenants %}
          {% if tenant.repo_pattern | default(_repo_pattern) == 'combined' %}
          {% set ns.repos = ns.repos + [{'name': 'casc-tenant-' + tenant.org_id, 'aap_scope': tenant.org_id, 'scm_org': tenant.tenant_scm_org}] %}
          {% else %}
          {% for rtype in ['controller-projects', 'controller-credentials', 'controller-inventories', 'controller-templates', 'controller-workflows', 'controller-schedules', 'controller-notifications'] %}
          {% set ns.repos = ns.repos + [{'name': rtype + '-' + tenant.org_id, 'aap_scope': tenant.org_id, 'scm_org': tenant.tenant_scm_org}] %}
          {% endfor %}
          {% endif %}
          {% endfor %}
          {{ ns.repos }}

    - name: "Build platform repos list"
      ansible.builtin.set_fact:
        _platform_repos: >-
          {% if _repo_pattern == 'combined' %}
          {{ [{'name': platform_repo, 'aap_scope': 'platform', 'scm_org': platform_scm_org}] }}
          {% else %}
          {% set ns = namespace(repos=[]) %}
          {% for r in platform_config.platform_repos | default([]) %}
          {% set ns.repos = ns.repos + [{'name': r.name, 'aap_scope': 'platform', 'scm_org': platform_scm_org}] %}
          {% endfor %}
          {{ ns.repos }}
          {% endif %}

    - name: "Select repos to process"
      ansible.builtin.set_fact:
        selected_repos: >-
          {{ _platform_repos +
             (_tenant_repos | selectattr('name', 'equalto', triggered_repo) | list
              if triggered_repo is defined and triggered_repo | length > 0
              else _tenant_repos) }}

    - name: "Log apply mode"
      ansible.builtin.debug:
        msg: >-
          Mode: {{ 'TARGETED (' + triggered_repo + ' + platform repos)'
                   if triggered_repo is defined and triggered_repo | length > 0
                   else 'FULL (all repos from tenants.yml)' }}
          | Env: {{ target_env }} | Branch: {{ target_branch }}
          | Repos: {{ selected_repos | length }}

    # Phase 3: Clone repos from Git
    - name: "Clone CasC repos at target branch"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone: "{{ selected_repos }}"
        clone_base_dir: "{{ clone_dir }}"
        clone_branch: "{{ target_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_token }}"

    # Phase 4: Process YAML (folder-based env layering + merge + suffix)
    - name: "Process YAML for each repo"
      ansible.builtin.include_role:
        name: process_casc_config
      vars:
        repo_clone_dir: "{{ clone_dir }}/{{ casc_repo.name }}"
        repo_scope: "{{ casc_repo.aap_scope }}"
        output_dir: "{{ staging_dir }}"
        env_filter: "{{ target_env }}"
      loop: "{{ selected_repos }}"
      loop_control:
        loop_var: casc_repo
        label: "{{ casc_repo.name }}"

    # Phase 5: Load scope-suffixed variables into host scope
    - name: "Load processed config (scope-suffixed)"
      ansible.builtin.include_vars:
        dir: "{{ staging_dir }}"
        extensions: [yml, yaml]
        depth: 1

    # Phase 5b: Engine-side Hub RBAC wildcard merge
    - name: "Merge scope-suffixed Hub RBAC vars (engine-side)"
      ansible.builtin.set_fact:
        "{{ item }}": >-
          {{ query('ansible.builtin.varnames', '^' + item + '_.*')
             | reject('match', '.*_secure_logging$')
             | map('extract', vars) | flatten }}
      loop: [hub_roles, hub_group_roles]
      when: query('ansible.builtin.varnames', '^' + item + '_.*') | length > 0

  roles:
    # Phase 6: Apply ALL configuration via the built-in dispatch role.
    - role: infra.aap_configuration.dispatch
      vars:
        dispatch_include_wildcard_vars: true

  post_tasks:
    # Phase 7: Engine-side Hub RBAC apply (not in collection dispatcher)
    - name: "Apply Hub RBAC resources (not in default dispatch)"
      ansible.builtin.include_role:
        name: "infra.aap_configuration.{{ __hub_extra.role }}"
      when: vars[__hub_extra.var] is defined
      loop:
        - { role: hub_role, var: hub_roles }
        - { role: hub_group_roles, var: hub_group_roles }
      loop_control:
        loop_var: __hub_extra

    # Phase 8: Post-apply reporting and error handling
    - name: "Report any collected errors"
      ansible.builtin.fail:
        msg: >-
          Configuration apply encountered errors:
          {{ aap_configuration_role_errors | to_nice_yaml }}
      when:
        - aap_configuration_role_errors is defined
        - aap_configuration_role_errors | length > 0

    - name: "Configuration apply complete"
      ansible.builtin.debug:
        msg: >-
          Hybrid CasC dispatcher completed successfully.
          Mode: {{ trigger_source }} | Env: {{ target_env }} |
          Repos processed: {{ selected_repos | length }}

    - name: "Remove temporary directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ clone_dir }}"
        - "{{ staging_dir }}"
        - "{{ platform_dir }}"
