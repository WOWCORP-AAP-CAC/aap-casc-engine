---
version: 3

build_arg_defaults:
  ANSIBLE_GALAXY_CLI_COLLECTION_OPTS: "--pre"
  ARTIFACT_REPO_URL: ""  # Set at build time: ansible-builder build --build-arg ARTIFACT_REPO_URL=https://...

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/ee-minimal-rhel9:latest

dependencies:
  galaxy: ../collections/requirements.yml
  python:
    - jmespath       # Required for json_query filter
    - netaddr        # Network address manipulation
    - PyYAML         # YAML parsing
  system:
    - git            [platform:rpm]
    - python3-pip    [platform:rpm]

additional_build_steps:
  prepend_base: []
  prepend_galaxy: []
  prepend_builder: []
  prepend_final: []
  append_final:
    - RUN pip3 install --upgrade pip
