---
# AAP Multi-Tenant CasC Engine - Bootstrap tenant SCM state.
#
# Greenfield creates a universal two-object foundation declaration: one AAP
# Organization and one Team. Brownfield scaffolds SCM only. Users, RBAC,
# credentials, execution environments, and SCM membership remain customer policy.

- name: "AAP Multi-Tenant CasC Engine - Bootstrap Tenant"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') }}"
    scm_api_token: "{{ lookup('env', 'SCM_TOKEN') }}"
    _scm_provider_override: "{{ lookup('env', 'SCM_PROVIDER') | default('', true) }}"
    scm_provider: >-
      {{ _scm_provider_override
         if _scm_provider_override in ['github', 'gitlab']
         else ('github' if 'github' in scm_base_url else 'gitlab') }}

    platform_scm_org: "{{ lookup('env', 'PLATFORM_SCM_ORG') | default('', true) }}"
    control_scm_org: "{{ lookup('env', 'CONTROL_SCM_ORG') | default(platform_scm_org, true) }}"
    control_repo: "{{ lookup('env', 'CONTROL_REPO') | default('casc-platform-control', true) }}"
    control_branch: "{{ lookup('env', 'CONTROL_BRANCH') | default('main', true) }}"
    control_revision: "{{ lookup('env', 'CONTROL_REVISION') | default('', true) }}"
    engine_repo: "{{ lookup('env', 'ENGINE_REPO') | default('aap-casc-engine', true) }}"

    platform_repo_id: "{{ lookup('env', 'PLATFORM_REPO_ID') | default('', true) }}"
    platform_namespace_id: "{{ lookup('env', 'PLATFORM_NAMESPACE_ID') | default('', true) }}"
    tenant_scm_namespace_id: "{{ lookup('env', 'TENANT_SCM_NAMESPACE_ID') | default('', true) }}"

    # Survey/launch inputs. Extra vars override these environment defaults.
    tenant_id: "{{ lookup('env', 'TENANT_ID') | default('', true) }}"
    aap_organization: "{{ lookup('env', 'AAP_ORGANIZATION') | default('', true) }}"
    team_name: "{{ lookup('env', 'TEAM_NAME') | default('', true) }}"
    tenant_scm_org: "{{ lookup('env', 'TENANT_SCM_ORG') | default('', true) }}"
    repo_mode: "{{ lookup('env', 'REPO_MODE') | default('', true) }}"
    onboarding_mode: "{{ lookup('env', 'ONBOARDING_MODE') | default('', true) }}"
    dispatch_enabled: "{{ lookup('env', 'DISPATCH_ENABLED') | default('', true) }}"
    repo_visibility: "{{ lookup('env', 'REPO_VISIBILITY') | default('', true) }}"
    repo_name: "{{ lookup('env', 'REPO_NAME') | default('', true) }}"

    _tenant_types:
      - { folder: projects, basename: controller-projects, template: "templates/seed-controller-projects.yml.j2" }
      - { folder: credentials, basename: controller-credentials, template: "templates/seed-controller-credentials.yml.j2" }
      - { folder: inventories, basename: controller-inventories, template: "templates/seed-controller-inventories.yml.j2" }
      - { folder: templates, basename: controller-templates, template: "templates/seed-controller-templates.yml.j2" }
      - { folder: workflows, basename: controller-workflows, template: "templates/seed-controller-workflows.yml.j2" }
      - { folder: schedules, basename: controller-schedules, template: "templates/seed-controller-schedules.yml.j2" }
      - { folder: notifications, basename: controller-notifications, template: "templates/seed-controller-notifications.yml.j2" }

    bootstrap_clone_dir: "/tmp/bootstrap-repos"
    bootstrap_validation_dir: "/tmp/bootstrap-foundation-validation"

  tasks:
    - name: "Validate provider and control inputs"
      ansible.builtin.assert:
        that:
          - scm_provider in ['github', 'gitlab']
          - scm_api_token | length > 0
          - control_scm_org | length > 0
          - control_repo | length > 0
          - control_branch | length > 0
        fail_msg: "SCM provider/token and control repository coordinates are required."

    - name: "Clone authoritative control repository"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone:
          - name: "{{ control_repo }}"
            scm_org: "{{ control_scm_org }}"
            aap_scope: control
        clone_base_dir: "{{ bootstrap_clone_dir }}"
        clone_branch: "{{ control_branch }}"
        clone_depth: 0
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_api_token }}"

    - name: "Pin control repository to requested revision"
      ansible.builtin.command:
        cmd: "git -C {{ bootstrap_clone_dir }}/{{ control_repo }} checkout --detach {{ control_revision }}"
      when: control_revision | length > 0
      changed_when: false

    - name: "Resolve effective control revision"
      ansible.builtin.command:
        cmd: "git -C {{ bootstrap_clone_dir }}/{{ control_repo }} rev-parse HEAD"
      register: _control_rev_probe
      changed_when: false

    - name: "Record and verify effective control revision"
      ansible.builtin.set_fact:
        effective_control_revision: "{{ _control_rev_probe.stdout }}"

    - name: "Fail closed on control revision mismatch"
      ansible.builtin.assert:
        that:
          - effective_control_revision | length > 0
          - control_revision | length == 0 or _control_rev_probe.stdout == control_revision
        fail_msg: >-
          Authoritative control revision is unavailable or mismatched.
          requested={{ control_revision }} resolved={{ effective_control_revision }}

    - name: "Load authoritative control files"
      ansible.builtin.include_vars:
        file: "{{ bootstrap_clone_dir }}/{{ control_repo }}/{{ item.file }}"
        name: "{{ item.name }}"
      loop:
        - { file: config.yml, name: control_config }
        - { file: tenants.yml, name: tenants_registry }

    - name: "Reject removed topology launch inputs"
      ansible.builtin.assert:
        that:
          - repo_pattern is not defined
          - repo_names is not defined
          - platform_repo_pattern is not defined
          - platform_repo_names is not defined
          - (lookup('env', 'REPO_PATTERN') | default('', true) | length) == 0
          - (lookup('env', 'REPO_NAMES_JSON') | default('', true) | length) == 0
          - (lookup('env', 'PLATFORM_REPO_PATTERN') | default('', true) | length) == 0
          - (lookup('env', 'PLATFORM_REPO_NAMES_JSON') | default('', true) | length) == 0
          - control_config.platform_repo_pattern is not defined
          - control_config.platform_repo_names is not defined
          - control_config.platform_repos is not defined
          - control_config.repo_mode is not defined
        fail_msg: >-
          Removed topology inputs were supplied via JT extra-vars, environment, or
          control config.yml (repo_pattern / repo_names / platform_repo_pattern /
          platform_repo_names / platform_repos / persisted Genesis repo_mode).
          Use scalar platform_repo and tenant repo_name/repository only.

    - name: "Build concise Bootstrap request"
      ansible.builtin.set_fact:
        _bootstrap_request: >-
          {{ {'tenant_id': tenant_id}
             | combine({'tenant_scm_org': tenant_scm_org} if tenant_scm_org | length > 0 else {})
             | combine({'repo_mode': repo_mode} if repo_mode | length > 0 else {})
             | combine({'onboarding_mode': onboarding_mode} if onboarding_mode | length > 0 else {})
             | combine({'dispatch_enabled': dispatch_enabled | bool}
                       if dispatch_enabled | string | length > 0 else {})
             | combine({'repo_visibility': repo_visibility} if repo_visibility | length > 0 else {})
             | combine({'aap_organization': aap_organization} if aap_organization | length > 0 else {})
             | combine({'team_name': team_name} if team_name | length > 0 else {})
             | combine({'tenant_scm_namespace_id': tenant_scm_namespace_id} if tenant_scm_namespace_id | length > 0 else {})
             | combine({'repo_name': repo_name} if repo_name | length > 0 else {}) }}

    - name: "Resolve tenant from the shared registry contract"
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
          - resolve-bootstrap
          - --config
          - "{{ bootstrap_clone_dir }}/{{ control_repo }}/config.yml"
          - --tenants
          - "{{ bootstrap_clone_dir }}/{{ control_repo }}/tenants.yml"
          - --request-json
          - "{{ _bootstrap_request | to_json }}"
      register: _bootstrap_resolution
      changed_when: false

    - name: "Apply canonical tenant runtime values"
      ansible.builtin.set_fact:
        _tenant_runtime: "{{ (_bootstrap_resolution.stdout | from_json).tenant }}"
        _tenant_registered: "{{ (_bootstrap_resolution.stdout | from_json).registered | bool }}"
        _effective_tenant_id: "{{ (_bootstrap_resolution.stdout | from_json).tenant.tenant_id }}"
        _effective_aap_organization: "{{ (_bootstrap_resolution.stdout | from_json).tenant.aap_organization }}"
        _effective_team_name: "{{ (_bootstrap_resolution.stdout | from_json).tenant.team_name | default('') }}"
        _tenant_repository: "{{ (_bootstrap_resolution.stdout | from_json).tenant.repository }}"
        _tenant_repositories: "{{ [(_bootstrap_resolution.stdout | from_json).tenant.repository] }}"
        tenant_scm_org: "{{ (_bootstrap_resolution.stdout | from_json).tenant.tenant_scm_org }}"
        tenant_scm_namespace_id: "{{ (_bootstrap_resolution.stdout | from_json).tenant.tenant_scm_namespace_id | default('') }}"
        repo_mode: "{{ (_bootstrap_resolution.stdout | from_json).tenant.repo_mode }}"
        onboarding_mode: "{{ (_bootstrap_resolution.stdout | from_json).tenant.onboarding_mode }}"
        repo_visibility: "{{ (_bootstrap_resolution.stdout | from_json).tenant.repo_visibility }}"
        dispatch_enabled: "{{ (_bootstrap_resolution.stdout | from_json).tenant.dispatch_enabled | bool }}"
        _repo_private: "{{ (_bootstrap_resolution.stdout | from_json).tenant.repo_visibility == 'private' }}"

    - name: "Validate GitLab namespace input"
      ansible.builtin.assert:
        that:
          - tenant_scm_namespace_id | length > 0
        fail_msg: "GitLab Bootstrap requires tenant_scm_namespace_id."
      when:
        - scm_provider == 'gitlab'
        - repo_mode == 'create'

    - name: "Derive effective control configuration"
      ansible.builtin.set_fact:
        platform_scm_org: "{{ control_config.platform_scm_org }}"
        _env_branch_map: "{{ control_config.env_branch_map }}"
        _mapped_branches: "{{ control_config.env_branch_map.values() | list | unique }}"
        _create_missing_env_branches: "{{ control_config.create_missing_env_branches | default(true) | bool }}"
        platform_repo: "{{ control_config.platform_repo | default('casc-platform-global') }}"
        bootstrap_jt_name: "{{ control_config.job_templates.bootstrap | default('jt-platform-bootstrap_tenant', true) }}"
        dispatcher_jt_name: "{{ control_config.job_templates.dispatcher | default('jt-platform-casc_dispatcher', true) }}"

    - name: "Validate authoritative branch topology"
      ansible.builtin.assert:
        that:
          - platform_scm_org | length > 0
          - _env_branch_map is mapping
          - _env_branch_map | length > 0
          - _mapped_branches | length > 0
          - _mapped_branches | select('string') | list | length == _mapped_branches | length
          - _mapped_branches | reject('equalto', '') | list | length == _mapped_branches | length
        fail_msg: >-
          control config.yml requires platform_scm_org and a non-empty env_branch_map
          whose branch values are non-empty strings.

    - name: "Build tenant repository records"
      ansible.builtin.set_fact:
        _tenant_repo_records:
          - name: "{{ _tenant_repository }}"

    - name: "Render expected scaffold marker for each tenant repository"
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
          - scaffold-marker
          - --tenant-json
          - "{{ _tenant_runtime | to_json }}"
          - --repository
          - "{{ item.name }}"
      loop: "{{ _tenant_repo_records }}"
      register: _scaffold_marker_results
      changed_when: false

    - name: "Index expected scaffold markers by repository"
      ansible.builtin.set_fact:
        _scaffold_markers: >-
          {{ _scaffold_markers | default({})
             | combine({item.item.name: item.stdout | from_json}) }}
      loop: "{{ _scaffold_marker_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: "Render Greenfield foundation once"
      ansible.builtin.set_fact:
        _org_foundation_content: "{{ lookup('template', 'templates/org-template.yml.j2') }}"
        _team_foundation_content: "{{ lookup('template', 'templates/team-template.yml.j2') }}"
      when: onboarding_mode == 'greenfield'

    - name: "Reset foundation validation directory"
      ansible.builtin.file:
        path: "{{ bootstrap_validation_dir }}"
        state: absent
      when: onboarding_mode == 'greenfield'

    - name: "Prepare foundation validation directory"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0700'
      loop:
        - "{{ bootstrap_validation_dir }}"
        - "{{ bootstrap_validation_dir }}/base/organizations"
        - "{{ bootstrap_validation_dir }}/base/teams"
      when: onboarding_mode == 'greenfield'

    - name: "Write rendered foundation for preflight validation"
      ansible.builtin.copy:
        dest: "{{ bootstrap_validation_dir }}/{{ item.path }}"
        content: "{{ item.content }}"
        mode: '0600'
      loop:
        - path: "base/organizations/{{ _effective_tenant_id }}.yml"
          content: "{{ _org_foundation_content | default('') }}"
        - path: "base/teams/{{ _effective_tenant_id }}.yml"
          content: "{{ _team_foundation_content | default('') }}"
      when: onboarding_mode == 'greenfield'

    - name: "Check for optional customer naming policy"
      ansible.builtin.stat:
        path: "{{ bootstrap_clone_dir }}/{{ control_repo }}/naming-rules.yml"
      register: _control_naming_rules

    - name: "Validate generated identities against active naming policy"
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/schemas/validate_naming.py"
          - --config-dir
          - "{{ bootstrap_validation_dir }}"
          - --control-config
          - "{{ bootstrap_clone_dir }}/{{ control_repo }}/config.yml"
          - --caller-role
          - platform
          - --rules
          - "{{ bootstrap_clone_dir }}/{{ control_repo }}/naming-rules.yml"
          - --resource-types
          - "{{ playbook_dir }}/schemas/resource-types.yml"
          - --allowed-keys
          - "{{ playbook_dir }}/roles/process_casc_config/defaults/main.yml"
      changed_when: false
      when:
        - onboarding_mode == 'greenfield'
        - _control_naming_rules.stat.exists

    - name: "Build lean survey fallback registry entry"
      ansible.builtin.set_fact:
        _tenant_registry_entry: >-
          {{ {'tenant_id': _effective_tenant_id,
              'tenant_scm_org': tenant_scm_org,
              'repo_mode': repo_mode,
              'onboarding_mode': onboarding_mode,
              'dispatch_enabled': dispatch_enabled | bool,
              'repo_visibility': repo_visibility,
              'status': 'active'}
             | combine({'aap_organization': _effective_aap_organization}
                       if _effective_aap_organization != _effective_tenant_id else {})
             | combine({'team_name': _effective_team_name}
                       if onboarding_mode == 'greenfield' else {})
             | combine({'tenant_scm_namespace_id': tenant_scm_namespace_id}
                       if tenant_scm_namespace_id | length > 0 else {})
             | combine({'repo_name': _tenant_repository}
                       if _tenant_repository != ('casc-tenant-' + _effective_tenant_id) else {}) }}

    - name: "Log resolved Bootstrap contract"
      ansible.builtin.debug:
        msg: >-
          tenant={{ _effective_tenant_id }} organization={{ _effective_aap_organization }}
          mode={{ onboarding_mode }} provider={{ scm_provider }} repository={{ _tenant_repository }}
          control={{ control_scm_org }}/{{ control_repo }}@{{ effective_control_revision }}

    - name: "Execute provider Bootstrap operations"
      ansible.builtin.include_tasks: "tasks/bootstrap_scm_{{ scm_provider }}.yml"

    - name: "Report Bootstrap completion"
      ansible.builtin.debug:
        msg: |
          TENANT BOOTSTRAP COMPLETE (SCM-only)
          Tenant: {{ _effective_tenant_id }}
          AAP Organization: {{ _effective_aap_organization }}
          Foundation: {{ 'Organization + Team' if onboarding_mode == 'greenfield' else 'none (Brownfield)' }}
          Repositories: {{ _tenant_repositories | join(', ') }}
          Environment branches: {{ _mapped_branches | join(', ') }}

    - name: "Cleanup temporary directories"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ bootstrap_clone_dir }}"
        - "{{ bootstrap_validation_dir }}"
