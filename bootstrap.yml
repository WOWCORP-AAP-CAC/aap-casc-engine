---
# Hybrid CasC — Bootstrap New Tenant Organization
#
# Automates onboarding a new tenant organization to AAP:
#   1. Adds org/RBAC JSON configs to platform repos (via SCM API)
#   2. Creates tenant CasC repositories (via SCM API)
#   3. Seeds repos with shared pipeline include + example JSON files
#   4. Sets repository permissions (tenant team = maintainer)
#   5. Registers new repos in repos-manifest.yml
#   6. Applies platform config to AAP via the dispatch role
#
# Usage:
#   ansible-playbook bootstrap.yml \
#     -e org_id=newteam01 \
#     -e team_name="New Team" \
#     -e team_lead=newteam_lead \
#     -e team_group=newteam_developers

- name: "Hybrid CasC — Bootstrap New Tenant Organization"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    # Provided by the platform team during onboarding
    org_id: "{{ lookup('env', 'ORG_ID') }}"
    team_name: "{{ lookup('env', 'TEAM_NAME') }}"
    team_lead: "{{ lookup('env', 'TEAM_LEAD') }}"
    team_group: "{{ lookup('env', 'TEAM_GROUP') }}"
    default_ee: "{{ lookup('env', 'DEFAULT_EE') | default('ACME RHEL 9 Ansible 2.18 Base') }}"
    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') }}"  # e.g., https://gitlab.example.com/casc
    scm_api_token: "{{ lookup('env', 'SCM_API_TOKEN') }}"
    environments: ["dev", "tst", "npr", "prd"]

    # SCM project IDs for platform repos (looked up or provided as extra vars)
    # These are the GitLab/GitHub project IDs of the platform CasC repos
    orgs_repo_id: "{{ lookup('env', 'ORGS_REPO_ID') }}"
    rbac_user_repo_id: "{{ lookup('env', 'RBAC_USER_REPO_ID') }}"
    rbac_team_repo_id: "{{ lookup('env', 'RBAC_TEAM_REPO_ID') }}"
    scm_casc_group_id: "{{ lookup('env', 'SCM_CASC_GROUP_ID') }}"  # SCM group/org for CasC repos
    team_lead_user_id: "{{ lookup('env', 'TEAM_LEAD_USER_ID') }}"  # SCM user ID for repo access

    # AAP connection for applying config
    aap_hostname: "{{ lookup('env', 'AAP_HOSTNAME') }}"
    aap_username: "{{ lookup('env', 'AAP_USERNAME') }}"
    aap_password: "{{ lookup('env', 'AAP_PASSWORD') }}"
    aap_validate_certs: true
    bootstrap_target_env: "{{ lookup('env', 'BOOTSTRAP_TARGET_ENV') | default('dev') }}"

    # Repository names to create
    tenant_repos:
      - "controller-projects-{{ org_id }}"
      - "controller-credentials-{{ org_id }}"
      - "controller-inventories-{{ org_id }}"
      - "controller-job_templates-{{ org_id }}"
      - "controller-schedules-{{ org_id }}"

  tasks:
    # ── Step 1: Add JSON configs to platform repos ─────────────────────
    - name: "Add organization JSON to aap-organizations-global repo"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ orgs_repo_id }}/repository/files/org-{{ org_id }}.json"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "main"
          content: "{{ lookup('template', 'templates/org-template.json.j2') }}"
          commit_message: "Bootstrap: add organization org-{{ org_id }}"
        status_code: [200, 201]
      vars:
        org_name: "org-{{ org_id }}"
        org_description: "{{ team_name }} automation organization"
        org_default_ee: "{{ default_ee }}"

    - name: "Add RBAC user assignments JSON to gateway-role_user_assignments-global repo"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ rbac_user_repo_id }}/repository/files/rbac-user-{{ org_id }}.json"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "main"
          content: "{{ lookup('template', 'templates/rbac-user-template.json.j2') }}"
          commit_message: "Bootstrap: add RBAC user assignments for org-{{ org_id }}"
        status_code: [200, 201]
      vars:
        org_name: "org-{{ org_id }}"
        admin_user: "{{ team_lead }}"

    - name: "Add RBAC team assignments JSON to gateway-role_team_assignments-global repo"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ rbac_team_repo_id }}/repository/files/rbac-team-{{ org_id }}.json"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "main"
          content: "{{ lookup('template', 'templates/rbac-team-template.json.j2') }}"
          commit_message: "Bootstrap: add RBAC team assignments for org-{{ org_id }}"
        status_code: [200, 201]
      vars:
        org_name: "org-{{ org_id }}"
        dev_team: "{{ team_group }}"

    # ── Step 2: Create SCM repositories ─────────────────────────────────
    - name: "Create tenant CasC repositories"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          name: "{{ item }}"
          namespace_id: "{{ scm_casc_group_id }}"
          visibility: "internal"
          initialize_with_readme: true
        status_code: [200, 201]
      loop: "{{ tenant_repos }}"
      register: created_repos

    # ── Step 3: Seed repos with template files ──────────────────────────
    - name: "Seed repos with shared pipeline include and template JSON"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/.gitlab-ci.yml"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "main"
          content: |
            include:
              - project: 'platform-team/aap-casc-engine'
                ref: 'main'
                file: '/pipeline-templates/gitlab/.gitlab-ci-template.yml'
          commit_message: "Bootstrap: add shared pipeline template"
      loop: "{{ created_repos.results }}"
      loop_control:
        label: "{{ item.json.name }}"

    - name: "Seed each repo with an example JSON file"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/example.json"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "main"
          content: "{{ lookup('template', 'templates/seed-' + (item.json.name | regex_replace('-' + org_id + '$', '')) + '.json.j2') }}"
          commit_message: "Bootstrap: add example JSON configuration"
        status_code: [200, 201]
      loop: "{{ created_repos.results }}"
      loop_control:
        label: "{{ item.json.name }}"

    # ── Step 4: Set repository permissions ──────────────────────────────
    - name: "Grant tenant team maintainer access"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/members"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          user_id: "{{ team_lead_user_id }}"
          access_level: 40  # Maintainer
        status_code: [200, 201, 409]
      loop: "{{ created_repos.results }}"
      loop_control:
        label: "{{ item.json.name }}"

    # ── Step 5: Register new repos in the repos manifest ─────────────────
    - name: "Update repos-manifest.yml in aap-casc-engine"
      ansible.builtin.blockinfile:
        path: "repos-manifest.yml"
        marker: "# {mark} TENANT {{ org_id }}"
        block: |
          - name: {{ item }}
            scope: {{ org_id }}
        insertafter: "tenant_repos:"
      delegate_to: localhost
      loop: "{{ tenant_repos }}"

    - name: "Commit updated repos-manifest.yml to aap-casc-engine"
      ansible.builtin.shell: |
        cd {{ playbook_dir }}
        git add repos-manifest.yml
        git commit -m "Bootstrap: register tenant {{ org_id }} repos in manifest"
        git push origin main
      delegate_to: localhost

    # ── Step 6: Clone platform repos, process JSON, and apply to AAP ────
    # Bootstrap only applies platform-level config (org, RBAC, team assignments).
    # Tenant repos are empty at this point — they'll be populated by the tenant.
    - name: "Clone platform repos for initial apply"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone: "{{ lookup('file', 'repos-manifest.yml') | from_yaml | json_query('platform_repos') }}"
        clone_base_dir: "/tmp/bootstrap-repos"
        clone_branch: "main"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_api_token }}"

    - name: "Process platform JSON (env filter + merge + suffix)"
      ansible.builtin.include_role:
        name: process_casc_json
      vars:
        repo_clone_dir: "/tmp/bootstrap-repos/{{ item.name }}"
        repo_scope: "{{ item.scope }}"
        output_dir: "/tmp/bootstrap-staging"
        env_filter: "{{ bootstrap_target_env | default('dev') }}"
      loop: "{{ lookup('file', 'repos-manifest.yml') | from_yaml | json_query('platform_repos') }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "Load processed platform config"
      ansible.builtin.include_vars:
        dir: "/tmp/bootstrap-staging"
        extensions: [json]
        depth: 1

    - name: "Apply organization, RBAC, and team config to AAP"
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
      vars:
        dispatch_include_wildcard_vars: true
        aap_configuration_collect_logs: true

    - name: "Bootstrap complete"
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════
          TENANT BOOTSTRAP COMPLETE
          ══════════════════════════════════════════════════════
          Organization: org-{{ org_id }}
          Team Lead:    {{ team_lead }} (admin)
          Team Group:   {{ team_group }} (execute)
          Default EE:   {{ default_ee }}
          Repositories created:
          {% for repo in tenant_repos %}
            • {{ scm_base_url }}/casc/{{ repo }}
          {% endfor %}
          ══════════════════════════════════════════════════════
