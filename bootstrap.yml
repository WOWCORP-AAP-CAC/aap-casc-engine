---
# Hybrid CasC — Bootstrap New Tenant Organization (SCM-only)
#
# Creates/updates Git/SCM state for a new tenant. Does NOT apply AAP resources.
# AAP resource creation (org, team, user, RBAC) is handled by the dispatcher
# on the subsequent CI/CD fan-out run.
#
# SCM operations performed:
#   1. Pushes org/team/RBAC YAML to platform repo(s)
#   2. Creates tenant CasC repositories in the tenant's SCM org/namespace
#   3. Seeds repos with CI/CD pipeline include + example YAML files
#   4. Sets repository permissions (tenant team lead = maintainer)
#   5. Creates environment branches from env_branch_map (if enabled)
#   6. Updates tenants.yml in the platform home repo
#
# Supports both GitHub and GitLab. Provider is set via SCM_PROVIDER env var
# (github|gitlab) or auto-detected from scm_base_url.
# SCM-specific operations are delegated to tasks/bootstrap_scm_{provider}.yml.
# All SCM steps are idempotent — safe to rerun without side effects.
#
# Usage (via AAP Job Template with Survey):
#   Survey provides: org_id, team_name, team_lead, team_lead_email,
#                    repo_pattern, tenant_scm_org
#   JT extra vars provide: platform_scm_org, platform_repo
#   Credential: crd-platform-scm_token only (no AAP credentials needed)

- name: "Hybrid CasC — Bootstrap New Tenant Organization"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') }}"
    scm_api_token: "{{ lookup('env', 'SCM_TOKEN') }}"

    _scm_provider_override: "{{ lookup('env', 'SCM_PROVIDER') | default('') }}"
    scm_provider: >-
      {{ _scm_provider_override
         if _scm_provider_override in ['github', 'gitlab']
         else ('github' if 'github' in scm_base_url else 'gitlab') }}

    platform_scm_org: "{{ lookup('env', 'PLATFORM_SCM_ORG') | default('') }}"
    engine_repo: "{{ lookup('env', 'ENGINE_REPO') | default('aap-casc-engine') }}"

    # Platform home repo — where config.yml and tenants.yml live
    platform_repo: "{{ lookup('env', 'PLATFORM_REPO') | default('casc-platform-global') }}"

    # GitLab-specific numeric project/namespace IDs (ignored for GitHub)
    platform_repo_id: "{{ lookup('env', 'PLATFORM_REPO_ID') | default('') }}"
    platform_namespace_id: "{{ lookup('env', 'PLATFORM_NAMESPACE_ID') | default('') }}"

    # Tenant-specific (from AAP Survey)
    org_id: "{{ lookup('env', 'ORG_ID') }}"
    team_name: "{{ lookup('env', 'TEAM_NAME') }}"
    team_lead: "{{ lookup('env', 'TEAM_LEAD') }}"
    team_lead_email: "{{ lookup('env', 'TEAM_LEAD_EMAIL') | default('') }}"
    team_lead_first_name: "{{ lookup('env', 'TEAM_LEAD_FIRST_NAME') | default('') }}"
    team_lead_last_name: "{{ lookup('env', 'TEAM_LEAD_LAST_NAME') | default('') }}"
    team_lead_password: "{{ lookup('env', 'TEAM_LEAD_PASSWORD') | default('change_me') }}"
    team_group: "{{ lookup('env', 'TEAM_GROUP') | default('') }}"
    repo_pattern: "{{ lookup('env', 'REPO_PATTERN') | default('combined', true) }}"
    repo_visibility: "{{ lookup('env', 'REPO_VISIBILITY') | default('private', true) }}"
    _repo_private: "{{ repo_visibility == 'private' }}"

    # Platform repo pattern (how platform repos are organized — may differ from tenant)
    platform_repo_pattern: "{{ lookup('env', 'PLATFORM_REPO_PATTERN') | default('combined', true) }}"

    tenant_scm_org: "{{ lookup('env', 'TENANT_SCM_ORG') }}"
    tenant_scm_namespace_id: "{{ lookup('env', 'TENANT_SCM_NAMESPACE_ID') | default('') }}"

    team_lead_username: "{{ lookup('env', 'TEAM_LEAD_USERNAME') | default('') }}"
    team_lead_user_id: "{{ lookup('env', 'TEAM_LEAD_USER_ID') | default('') }}"

    # Tenant repos — auto-generated from repo_pattern
    tenant_repos: >-
      {{ ['casc-tenant-' + org_id] if repo_pattern == 'combined'
         else ['controller-projects-' + org_id,
               'controller-credentials-' + org_id,
               'controller-inventories-' + org_id,
               'controller-templates-' + org_id,
               'controller-workflows-' + org_id,
               'controller-schedules-' + org_id,
               'controller-notifications-' + org_id] }}

    default_ee: "{{ lookup('env', 'DEFAULT_EE') | default('Default execution environment', true) }}"

    platform_branch: "{{ lookup('env', 'PLATFORM_BRANCH') | default('main', true) }}"

    bootstrap_clone_dir: "/tmp/bootstrap-repos"

  tasks:
    # ── Validation ─────────────────────────────────────────────────────────
    - name: "Compute effective team group (safe fallback)"
      ansible.builtin.set_fact:
        _effective_team_group: "{{ team_group if (team_group | length > 0) else team_name }}"

    - name: "Validate common required inputs"
      ansible.builtin.assert:
        that:
          - org_id | length > 0
          - team_name | length > 0
          - team_lead | length > 0
          - tenant_scm_org | length > 0
          - _effective_team_group | length > 0
        fail_msg: "Missing required bootstrap input(s). org_id, team_name, team_lead, tenant_scm_org must be non-empty."

    - name: "Validate SCM provider value"
      ansible.builtin.assert:
        that:
          - scm_provider in ['github', 'gitlab']
        fail_msg: >-
          scm_provider must be 'github' or 'gitlab'. Got: '{{ scm_provider }}'.

    - name: "Validate repo_pattern"
      ansible.builtin.assert:
        that:
          - repo_pattern in ['combined', 'per-resource-type']
        fail_msg: >-
          repo_pattern must be 'combined' or 'per-resource-type'. Got: '{{ repo_pattern }}'.

    - name: "Validate repo visibility value"
      ansible.builtin.assert:
        that:
          - repo_visibility in ['public', 'private']
        fail_msg: >-
          repo_visibility must be 'public' or 'private'. Got: '{{ repo_visibility }}'.

    - name: "Validate GitLab-specific inputs"
      ansible.builtin.assert:
        that:
          - tenant_scm_org | length > 0
          - tenant_scm_namespace_id | length > 0
        fail_msg: >-
          GitLab bootstrap requires both tenant_scm_org (group path)
          and tenant_scm_namespace_id (numeric namespace ID).
      when: scm_provider == 'gitlab'

    # ── Load platform config (env_branch_map, platform_branch) ─────────
    - name: "Clone platform home repo for config"
      ansible.builtin.include_role:
        name: git_clone_repos
      vars:
        repos_to_clone:
          - name: "{{ platform_repo }}"
            scm_org: "{{ platform_scm_org }}"
            aap_scope: platform
        clone_base_dir: "{{ bootstrap_clone_dir }}"
        clone_branch: "{{ platform_branch }}"
        git_base_url: "{{ scm_base_url }}"
        git_token: "{{ scm_api_token }}"

    - name: "Load config.yml from platform home repo"
      ansible.builtin.include_vars:
        file: "{{ bootstrap_clone_dir }}/{{ platform_repo }}/config.yml"
        name: platform_config

    - name: "Derive effective platform branch and env_branch_map"
      ansible.builtin.set_fact:
        _effective_platform_branch: "{{ platform_config.platform_branch | default('main') }}"
        _env_branch_map: "{{ platform_config.env_branch_map }}"
        _create_missing_env_branches: "{{ platform_config.create_missing_env_branches | default(true) | bool }}"

    - name: "Log bootstrap parameters"
      ansible.builtin.debug:
        msg: >-
          Bootstrap: org={{ org_id }} | team={{ team_name }} | lead={{ team_lead }}
          | provider={{ scm_provider }} | pattern={{ repo_pattern }}
          | tenant_org={{ tenant_scm_org }}
          {{ '| tenant_ns_id=' + tenant_scm_namespace_id if scm_provider == 'gitlab' else '' }}
          | repos={{ tenant_repos | length }}
          | effective_team_group={{ _effective_team_group }}
          | platform_branch={{ _effective_platform_branch }}
          | create_env_branches={{ _create_missing_env_branches }}

    # ── Steps 1-5: SCM operations (provider-specific, idempotent) ──────────
    - name: "Execute {{ scm_provider }} SCM operations (Steps 1-5)"
      ansible.builtin.include_tasks: "tasks/bootstrap_scm_{{ scm_provider }}.yml"

    # ── Completion ───────────────────────────────────────────────────────

    - name: "Bootstrap complete"
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════
          TENANT BOOTSTRAP COMPLETE (SCM-only)
          ══════════════════════════════════════════════════════
          Organization:  org-{{ org_id }}
          Team Lead:     {{ team_lead }}
          Team:          {{ _effective_team_group }}
          SCM Provider:  {{ scm_provider }}
          Repo Pattern:  {{ repo_pattern }}
          Tenant SCM:    {{ tenant_scm_org }}
          Platform Branch: {{ _effective_platform_branch }}
          Env Branches:  {{ _env_branch_map | to_nice_yaml | indent(25) }}
          Repositories:
          {% for repo in tenant_repos %}
            • {{ repo }} (in {{ tenant_scm_org }})
          {% endfor %}
          ══════════════════════════════════════════════════════
          NOTE: AAP resources (org, team, user, RBAC) will be
          applied by the dispatcher on the next CI/CD run.
          ══════════════════════════════════════════════════════

    - name: "Cleanup temporary directories"
      ansible.builtin.file:
        path: "{{ bootstrap_clone_dir }}"
        state: absent
