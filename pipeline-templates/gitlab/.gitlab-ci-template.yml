# Platform-managed shared pipeline template for CasC repositories (v3 — multi-env fan-out)
# Lives in: aap-casc-engine/pipeline-templates/gitlab/.gitlab-ci-template.yml
# Tenant/platform repos include this template via .gitlab-ci.yml
#
# Tenant repo usage (.gitlab-ci.yml):
#   include:
#     - project: '<platform-group>/aap-casc-engine'
#       ref: 'main'
#       file: '/pipeline-templates/gitlab/.gitlab-ci-template.yml'
#
# Control protected onboarding continuation (Run pipeline / web):
#   CASC_OPERATION=onboarding_dispatch
#   TENANT_ID=<tenant_id>
#   CONTROL_REVISION=<optional sha>
#   CASC_CALLER_ROLE=control

stages:
  - validate
  - bootstrap
  - fanout
  - onboarding
  - trigger

variables:
  ENGINE_PROJECT_PATH: ""
  SCHEMA_DIR: "${CI_PROJECT_DIR}/.schemas"
  DISPATCHER_JT_NAME: "jt-platform-casc_dispatcher"
  BOOTSTRAP_JT_NAME: "jt-platform-bootstrap_tenant"
  POLL_TIMEOUT_MINUTES: "30"
  BOOTSTRAP_POLL_TIMEOUT_MINUTES: "15"
  CASC_CALLER_ROLE: "tenant"
  CONTROL_SCM_ORG: ""
  CONTROL_REPO: "casc-platform-control"
  CONTROL_BRANCH: "main"
  CASC_OPERATION: ""
  TENANT_ID: ""
  CONTROL_REVISION: ""

# ── Pre-stage: Fetch schemas from engine repo ────────────────────────────────
fetch:schemas:
  stage: .pre
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - |
      if [ -z "$ENGINE_PROJECT_PATH" ]; then
        echo "ERROR: ENGINE_PROJECT_PATH is not set."
        exit 1
      fi
      git clone --depth 1 --branch main \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${ENGINE_PROJECT_PATH}.git" /tmp/engine
      mkdir -p .schemas .scripts/pipeline
      [ -f /tmp/engine/schemas/resource-types.yml ] && cp /tmp/engine/schemas/resource-types.yml .schemas/ || true
      [ -f /tmp/engine/schemas/validate_naming.py ] && cp /tmp/engine/schemas/validate_naming.py .schemas/ || true
      [ -d /tmp/engine/schemas/policies ] && cp -r /tmp/engine/schemas/policies .schemas/ || true
      if [ -f /tmp/engine/roles/process_casc_config/defaults/main.yml ]; then
        cp /tmp/engine/roles/process_casc_config/defaults/main.yml .schemas/engine_defaults.yml
      fi
      if [ -f /tmp/engine/scripts/pipeline/casc_runtime.py ]; then
        cp /tmp/engine/scripts/pipeline/casc_runtime.py .scripts/pipeline/
      fi
  artifacts:
    paths:
      - .schemas/
      - .scripts/pipeline/

# Fetch authoritative control metadata. Naming policy is optional.
fetch:control-metadata:
  stage: .pre
  image: python:3.11-slim
  needs:
    - job: "fetch:schemas"
      artifacts: true
  before_script:
    - pip install pyyaml
  script:
    - |
      if [ ! -f .scripts/pipeline/casc_runtime.py ]; then
        echo "ERROR: casc_runtime.py unavailable; cannot fetch authoritative control metadata"
        exit 1
      fi
      if [ -z "${CONTROL_REPO_TOKEN:-}" ] || [ -z "${CONTROL_SCM_ORG:-}" ]; then
        echo "ERROR: CONTROL_REPO_TOKEN and CONTROL_SCM_ORG are required for authoritative control metadata"
        exit 1
      fi
      REQUESTED_CONTROL_REVISION="${CONTROL_REVISION}"
      if [ -z "${REQUESTED_CONTROL_REVISION}" ] \
         && [ "${CASC_CALLER_ROLE}" = "control" ] \
         && [ "${CI_PROJECT_PATH}" = "${CONTROL_SCM_ORG}/${CONTROL_REPO}" ] \
         && [ "${CI_COMMIT_BRANCH:-}" = "${CONTROL_BRANCH}" ]; then
        REQUESTED_CONTROL_REVISION="${CI_COMMIT_SHA}"
      fi
      python3 .scripts/pipeline/casc_runtime.py ensure-control \
        --provider gitlab \
        --control-scm-org "${CONTROL_SCM_ORG}" \
        --control-repo "${CONTROL_REPO}" \
        --control-branch "${CONTROL_BRANCH}" \
        --token "${CONTROL_REPO_TOKEN}" \
        --control-revision "${REQUESTED_CONTROL_REVISION}" \
        --gitlab-api "${CI_API_V4_URL}" \
        --dest-dir .control | tee /tmp/ensure-control.out
      RESOLVED_LINE=$(grep '^control_revision=' /tmp/ensure-control.out)
      if [ -z "$RESOLVED_LINE" ]; then
        echo "ERROR: authoritative control revision was not resolved"
        exit 1
      fi
      printf 'CONTROL_REVISION=%s\n' "${RESOLVED_LINE#control_revision=}" > control.env
      rm -f .schemas/naming-rules.yml
      if [ -f .control/naming-rules.yml ]; then
        cp .control/naming-rules.yml .schemas/naming-rules.yml
        echo "Using optional naming-rules.yml from control revision"
      else
        echo "Naming policy not active."
      fi
      python3 .scripts/pipeline/casc_runtime.py resolve-jt-names \
        --config .control/config.yml
  artifacts:
    paths:
      - .schemas/
      - .scripts/pipeline/
      - .control/
    reports:
      dotenv: control.env
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── Stage 1: Validate ────────────────────────────────────────────────────────
validate:yaml-structure:
  stage: validate
  image: python:3.11-slim
  needs:
    - job: "fetch:schemas"
      artifacts: true
    - job: "fetch:control-metadata"
      artifacts: true
      optional: true
  before_script:
    - pip install pyyaml
  script:
    - |
      echo "=== CasC YAML Structural Validation ==="
      python3 .scripts/pipeline/casc_runtime.py validate-structure \
        --root . \
        --control-config .control/config.yml \
        --caller-role "${CASC_CALLER_ROLE:-tenant}" \
        --resource-types .schemas/resource-types.yml \
        --allowed-keys .schemas/engine_defaults.yml
      python3 .scripts/pipeline/casc_runtime.py validate-deletions \
        --root . \
        --control-config .control/config.yml \
        --caller-role "${CASC_CALLER_ROLE:-tenant}" \
        --resource-types .schemas/resource-types.yml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:control-files:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - |
      echo "=== Control File Validation ==="
      python3 -c "
      import yaml, sys, os, re
      errors = []

      ENV_NAME_RE = re.compile(r'^[a-z][a-z0-9_]*$')

      if os.path.exists('config.yml'):
          try:
              cfg = yaml.safe_load(open('config.yml'))
              for key in ['env_branch_map', 'scm_provider', 'platform_scm_org', 'platform_repo']:
                  if key not in cfg:
                      errors.append(f'config.yml: missing required key \"{key}\"')
              for required in ('control_scm_org', 'control_repo', 'control_branch', 'platform_repo'):
                  if not isinstance(cfg.get(required), str) or not cfg[required].strip():
                      errors.append(f'config.yml: {required} must be a non-empty string')
              if 'create_missing_env_branches' in cfg and not isinstance(cfg['create_missing_env_branches'], bool):
                  errors.append('config.yml: create_missing_env_branches must be a boolean')
              if 'bootstrap_dispatch_fanout' in cfg and not isinstance(cfg['bootstrap_dispatch_fanout'], bool):
                  errors.append('config.yml: bootstrap_dispatch_fanout must be a boolean')
              if 'env_branch_map' in cfg:
                  ebm = cfg['env_branch_map']
                  if not isinstance(ebm, dict) or not ebm:
                      errors.append('config.yml: env_branch_map must be a non-empty mapping')
                  else:
                      for env, branch in ebm.items():
                          if not isinstance(env, str) or not env.strip():
                              errors.append('config.yml: env_branch_map contains an empty or non-string key')
                          elif not ENV_NAME_RE.match(env):
                              errors.append(f'config.yml: env_branch_map key \"{env}\" must match ^[a-z][a-z0-9_]*$')
                          if not isinstance(branch, str) or not branch.strip():
                              errors.append(f'config.yml: env_branch_map[{env}] must be a non-empty branch string')
                      branches = list(ebm.values())
                      if len(branches) != len(set(branches)):
                          dupes = [b for b in set(branches) if branches.count(b) > 1]
                          errors.append(f'config.yml: env_branch_map branch values must be unique. Duplicates: {dupes}')
          except Exception as e:
              errors.append(f'config.yml: Failed to parse — {e}')

      if errors:
          for e in errors: print(f'  ERROR: {e}')
          sys.exit(1)
      else:
          print('=== CONTROL FILES VALID (or not present) ===')
      "
    - >-
      python3 .scripts/pipeline/casc_runtime.py validate-registry
      --config .control/config.yml
      --tenants .control/tenants.yml > /dev/null
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:naming-convention:
  stage: validate
  image: python:3.11-slim
  needs:
    - job: "fetch:schemas"
      artifacts: true
    - job: "fetch:control-metadata"
      artifacts: true
      optional: true
  before_script:
    - pip install pyyaml
  script:
    - |
      if [ -f ".schemas/naming-rules.yml" ]; then
        echo "=== Checking naming conventions ==="
        python3 .schemas/validate_naming.py \
          --config-dir . \
          --rules .schemas/naming-rules.yml \
          --resource-types .schemas/resource-types.yml \
          --allowed-keys .schemas/engine_defaults.yml \
          --control-config .control/config.yml \
          --caller-role "${CASC_CALLER_ROLE:-tenant}"
        echo "=== NAMING CONVENTIONS PASSED ==="
      else
        echo "Naming policy not active."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:policy-compliance:
  stage: validate
  image: python:3.11-slim
  needs:
    - job: "fetch:schemas"
      artifacts: true
    - job: "fetch:control-metadata"
      artifacts: true
      optional: true
  before_script:
    - pip install pyyaml
    - curl -sL -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static && chmod +x /usr/local/bin/opa
  script:
    - |
      if [ "${CASC_CALLER_ROLE:-tenant}" = "control" ]; then
        echo "Control repo: skipping desired-state OPA resource scan"
      elif [ -d ".schemas/policies" ]; then
        echo "=== Checking OPA policy compliance ==="

        SCAN_DIRS=$(python3 .scripts/pipeline/casc_runtime.py list-desired-state-dirs \
          --root . \
          --control-config .control/config.yml \
          --caller-role "${CASC_CALLER_ROLE:-tenant}" | paste -sd ' ' -)

        if [ -z "$SCAN_DIRS" ]; then
          echo "No desired-state directories found — OPA resource scan skipped"
        else
          for yml_file in $(find $SCAN_DIRS -name "*.yml" -o -name "*.yaml" 2>/dev/null | grep -v '.sample$'); do
            echo "Policy check: $yml_file"
            python3 -c "import yaml,json,sys; json.dump(yaml.safe_load(open(sys.argv[1])), open('/tmp/opa_input.json','w'))" "$yml_file"
            opa eval --data .schemas/policies/ --input /tmp/opa_input.json "data.casc.deny" --format pretty
          done
        fi
        echo "=== OPA POLICY CHECK COMPLETE ==="
      else
        echo "No OPA policies found — skipping."
      fi
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── Stage 2: Bootstrap (GitOps tenant onboarding from tenants.yml) ───────────
bootstrap:tenants:
  stage: bootstrap
  image: python:3.11-slim
  variables:
    GIT_DEPTH: 0
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl > /dev/null
    - pip install pyyaml
  script:
    - |
      NULL_SHA="0000000000000000000000000000000000000000"
      : > bootstrap.env

      # Guard 1: non-push pipelines (manual/web/scheduled/MR) — skip bootstrap
      if [ "${CI_PIPELINE_SOURCE}" != "push" ]; then
        echo "BOOTSTRAP_BLOCK_DISPATCH=false" >> bootstrap.env
        echo "BOOTSTRAP_ACTIONABLE=false" >> bootstrap.env
        echo "Non-push pipeline (${CI_PIPELINE_SOURCE}); skipping bootstrap."
        exit 0
      fi

      # Guard 2: exact tenants.yml change detection via git diff
      if [ -z "${CI_COMMIT_BEFORE_SHA:-}" ] || [ "$CI_COMMIT_BEFORE_SHA" = "$NULL_SHA" ]; then
        git diff-tree --root --no-commit-id --name-only -r "$CI_COMMIT_SHA" > /tmp/changed_files
      else
        if ! git diff --name-only "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA" > /tmp/changed_files; then
          echo "ERROR: Could not diff ${CI_COMMIT_BEFORE_SHA}..${CI_COMMIT_SHA}; refusing to silently skip bootstrap"
          exit 1
        fi
      fi

      if ! grep -Fxq "tenants.yml" /tmp/changed_files; then
        echo "BOOTSTRAP_BLOCK_DISPATCH=false" >> bootstrap.env
        echo "BOOTSTRAP_ACTIONABLE=false" >> bootstrap.env
        echo "tenants.yml was not changed in this push; skipping bootstrap."
        exit 0
      fi

      echo "tenants.yml was modified; enforcing tenant lifecycle..."

      if [ -z "${CI_COMMIT_BEFORE_SHA:-}" ] || [ "${CI_COMMIT_BEFORE_SHA}" = "${NULL_SHA}" ]; then
        printf '%s\n' 'tenants: []' > /tmp/previous-tenants.yml
      else
        if ! git cat-file -e "${CI_COMMIT_BEFORE_SHA}^{commit}" 2>/dev/null; then
          echo "ERROR: previous push commit ${CI_COMMIT_BEFORE_SHA} is unavailable; refusing an unsafe tenant lifecycle diff"
          exit 1
        fi
        if git cat-file -e "${CI_COMMIT_BEFORE_SHA}:tenants.yml" 2>/dev/null; then
          git show "${CI_COMMIT_BEFORE_SHA}:tenants.yml" > /tmp/previous-tenants.yml
        else
          printf '%s\n' 'tenants: []' > /tmp/previous-tenants.yml
        fi
      fi
      if [ -z "${CONTROL_REPO_TOKEN:-}" ]; then
        echo "ERROR: CONTROL_REPO_TOKEN is required for tenant lifecycle validation"
        exit 1
      fi
      python3 .scripts/pipeline/casc_runtime.py diff-tenants \
        --provider gitlab \
        --config config.yml \
        --previous /tmp/previous-tenants.yml \
        --current tenants.yml \
        --scm-token "${CONTROL_REPO_TOKEN}" \
        --gitlab-api "${CI_API_V4_URL}" \
        --output tenant_actions.json > /dev/null

      if [ "$(python3 -c 'import json; print(len(json.load(open("tenant_actions.json"))))')" -eq 0 ]; then
        echo "No actionable tenant bootstrap; normal dispatcher may proceed."
        echo "BOOTSTRAP_BLOCK_DISPATCH=false" >> bootstrap.env
        echo "BOOTSTRAP_ACTIONABLE=false" >> bootstrap.env
        exit 0
      fi

      echo "BOOTSTRAP_BLOCK_DISPATCH=true" >> bootstrap.env
      echo "BOOTSTRAP_ACTIONABLE=true" >> bootstrap.env
      TENANT_IDS=$(python3 -c 'import json; print(json.dumps([a["tenant"]["tenant_id"] for a in json.load(open("tenant_actions.json"))]))')
      DISPATCH_TENANT_IDS=$(python3 -c 'import json; print(json.dumps([a["tenant"]["tenant_id"] for a in json.load(open("tenant_actions.json")) if a["tenant"].get("onboarding_mode", "greenfield") == "greenfield" and a["tenant"].get("dispatch_enabled", True)]))')
      FANOUT_TENANT_IDS=$(python3 -c 'import json; print(json.dumps([a["tenant"]["tenant_id"] for a in json.load(open("tenant_actions.json")) if a["tenant"].get("onboarding_mode", "greenfield") == "greenfield"]))')
      echo "BOOTSTRAP_TENANT_IDS=${TENANT_IDS}" >> bootstrap.env
      echo "BOOTSTRAP_DISPATCH_TENANT_IDS=${DISPATCH_TENANT_IDS}" >> bootstrap.env
      echo "BOOTSTRAP_FANOUT_TENANT_IDS=${FANOUT_TENANT_IDS}" >> bootstrap.env

      # Engine credential resolution with host normalization (token-only)
      normalize_aap_host() {
        local raw="$1"
        raw="${raw%/}"
        if [[ "$raw" == http://* || "$raw" == https://* ]]; then
          echo "$raw"
        else
          echo "https://${raw}"
        fi
      }

      if [ -n "${AAP_ENGINE_HOST:-}" ] && [ -n "${AAP_ENGINE_TOKEN:-}" ]; then
        ENGINE_HOST=$(normalize_aap_host "$AAP_ENGINE_HOST")
        AUTH_HEADER="Authorization: Bearer ${AAP_ENGINE_TOKEN}"
      else
        echo "ERROR: Actionable tenants require AAP_ENGINE_HOST and AAP_ENGINE_TOKEN"
        exit 1
      fi

      if [ -n "${CONTROL_REVISION:-}" ]; then
        export CONTROL_REVISION
      else
        export CONTROL_REVISION="${CI_COMMIT_SHA}"
      fi
      echo "CONTROL_REVISION=${CONTROL_REVISION}" >> bootstrap.env
      echo "control_revision=${CONTROL_REVISION}"

      JT_NAME="${BOOTSTRAP_JT_NAME}"
      if [ -f config.yml ]; then
        RESOLVED_JT=$(python3 -c "
      import yaml
      try:
          cfg = yaml.safe_load(open('config.yml')) or {}
          jt = (cfg.get('job_templates') or {}).get('bootstrap')
          if isinstance(jt, str) and jt.strip():
              print(jt.strip())
      except Exception:
          pass
      ")
        if [ -n "$RESOLVED_JT" ]; then
          JT_NAME="$RESOLVED_JT"
          echo "Using bootstrap JT from config.yml: ${JT_NAME}"
        fi
      fi
      export JT_NAME

      engine_curl() {
        curl -sk -H "${AUTH_HEADER}" "$@"
      }

      JT_RESPONSE=$(engine_curl "${ENGINE_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")
      JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

      if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
        echo "ERROR: Bootstrap JT '${JT_NAME}' not found"
        exit 1
      fi

      POLL_TIMEOUT="${BOOTSTRAP_POLL_TIMEOUT_MINUTES:-15}"

      export ENGINE_HOST JT_ID POLL_TIMEOUT AUTH_HEADER CONTROL_REVISION

      python3 <<'BOOTSTRAP_PY'
      import json, subprocess, sys, os, time

      actions = json.load(open('tenant_actions.json'))
      jt_id = os.environ['JT_ID']
      engine_host = os.environ['ENGINE_HOST']
      control_revision = os.environ.get('CONTROL_REVISION') or os.environ.get('CI_COMMIT_SHA', '')
      poll_timeout = int(os.environ.get('POLL_TIMEOUT', '15'))
      poll_interval = 10
      max_polls = (poll_timeout * 60) // poll_interval

      def engine_curl_args():
          return ['-H', os.environ['AUTH_HEADER']]

      def build_bootstrap_extra_vars(tenant):
          extra = {
              'tenant_id': tenant['tenant_id'],
              'aap_organization': tenant['aap_organization'],
              'tenant_scm_org': tenant['tenant_scm_org'],
              'control_revision': control_revision,
          }
          for opt in ('team_name', 'repo_mode', 'onboarding_mode', 'dispatch_enabled', 'repo_name', 'tenant_scm_namespace_id', 'repo_visibility'):
              if opt in tenant and tenant[opt] is not None and tenant[opt] != '':
                  extra[opt] = tenant[opt]
          return extra

      for action in actions:
          tenant = action['tenant']
          tenant_id = tenant['tenant_id']
          print(f'Bootstrapping tenant: {tenant_id} ({action["action"]})')

          extra_vars = json.dumps(build_bootstrap_extra_vars(tenant))

          launch_cmd = ['curl', '-sk'] + engine_curl_args() + [
              '-X', 'POST', '-H', 'Content-Type: application/json',
              '-d', json.dumps({'extra_vars': extra_vars}),
              f'{engine_host}/api/controller/v2/job_templates/{jt_id}/launch/'
          ]
          result = subprocess.run(launch_cmd, capture_output=True, text=True)
          try:
              response = json.loads(result.stdout)
          except Exception:
              print(f'  ERROR: Failed to parse launch response')
              sys.exit(1)

          job_id = response.get('id')
          if not job_id:
              print(f'  ERROR: Failed to launch bootstrap JT for {tenant_id}')
              sys.exit(1)

          print(f'  Job launched: ID={job_id}')
          print(f'  Polling for completion (timeout: {poll_timeout}min)...')

          for i in range(1, max_polls + 1):
              time.sleep(poll_interval)
              status_cmd = ['curl', '-sk'] + engine_curl_args() + [f'{engine_host}/api/controller/v2/jobs/{job_id}/']
              status_result = subprocess.run(status_cmd, capture_output=True, text=True)
              try:
                  status = json.loads(status_result.stdout).get('status', 'unknown')
              except Exception:
                  status = 'unknown'
              print(f'    Status: {status} ({i}/{max_polls})')
              if status == 'successful':
                  print(f'  Bootstrap JT for {tenant_id} completed successfully.')
                  break
              elif status in ('failed', 'error', 'canceled'):
                  print(f'  ERROR: Bootstrap JT job {job_id} for tenant {tenant_id} {status}.')
                  sys.exit(1)
          else:
              print(f'  ERROR: Bootstrap JT job {job_id} for tenant \'{tenant_id}\' did not complete within {poll_timeout} minutes.')
              sys.exit(1)
      print('All bootstrap JTs completed successfully.')
      BOOTSTRAP_PY
  artifacts:
    reports:
      dotenv: bootstrap.env
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip dispatch\]/'
      when: never
    - if: '$CASC_OPERATION == "onboarding_dispatch"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CONTROL_BRANCH && $CI_PROJECT_NAME == $CONTROL_REPO && $CASC_CALLER_ROLE == "control"'
      changes:
        - tenants.yml
    - when: never

# ── Stage 3: Fan-out ─────────────────────────────────────────────────────────
fanout:dispatcher:
  stage: fanout
  image: python:3.11-slim
  needs:
    - job: "bootstrap:tenants"
      artifacts: true
      optional: true
    - job: "fetch:control-metadata"
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
    - pip install pyyaml
  script:
    - |
      # Guard: only fan-out when bootstrap actually onboarded tenants
      if [ "${BOOTSTRAP_ACTIONABLE:-false}" != "true" ]; then
        echo "No actionable tenant bootstrap; skipping fan-out."
        exit 0
      fi

      if [ ! -f ".control/config.yml" ]; then
        echo "ERROR: pinned control config artifact is unavailable"
        exit 1
      fi

      python3 <<'FANOUT_PY'
      import os, json, sys, subprocess, time, yaml

      def normalize_host(raw):
          raw = raw.rstrip('/')
          return raw if raw.startswith(('http://', 'https://')) else f'https://{raw}'

      def resolve_env_creds(env_key):
          try:
              entry = json.loads(os.environ.get('AAP_ENV_TARGETS_JSON', '')).get(env_key, {})
          except json.JSONDecodeError:
              raise ValueError('AAP_ENV_TARGETS_JSON must be valid JSON')
          if entry.get('username') or entry.get('password'):
              raise ValueError('username/password credentials are rejected; bearer token only')
          if entry.get('host') and entry.get('token'):
              return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
          return None

      def wait_for_terminal(host, auth_args, job_id, timeout_minutes):
          checks = max(1, timeout_minutes * 6)
          for _ in range(checks):
              time.sleep(10)
              result = subprocess.run(['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/{job_id}/'], capture_output=True, text=True)
              try:
                  status = json.loads(result.stdout).get('status', 'unknown')
              except json.JSONDecodeError:
                  status = 'unknown'
              if status == 'successful':
                  return
              if status in ('failed', 'error', 'canceled'):
                  raise RuntimeError(f'Dispatcher job {job_id} ended {status}')
          raise RuntimeError(f'Dispatcher job {job_id} did not complete within {timeout_minutes} minutes')

      cfg = yaml.safe_load(open('.control/config.yml')) or {}
      if not cfg.get('bootstrap_dispatch_fanout', True):
          print('Fan-out disabled by bootstrap_dispatch_fanout=false.')
          print('Onboarding dispatch remains pending.')
          print('Continue with protected control web pipeline:')
          print('  CASC_OPERATION=onboarding_dispatch TENANT_ID=<tenant_id> [CONTROL_REVISION=<sha>]')
          print('Normal trigger dispatch is suppressed for this control-repo event.')
          # Exit success so dotenv BOOTSTRAP_BLOCK_DISPATCH continues to suppress normal trigger.
          sys.exit(0)
      fanout_tenants = json.loads(os.environ.get('BOOTSTRAP_FANOUT_TENANT_IDS', '[]'))
      if not fanout_tenants:
          print('No greenfield onboarding tenants — skipping Dispatcher fan-out (brownfield is SCM-only).')
          sys.exit(0)
      environments = list(cfg.get('env_branch_map', {}).keys())
      onboarding_tenants = json.loads(os.environ.get('BOOTSTRAP_DISPATCH_TENANT_IDS', '[]'))
      jt_name = (cfg.get('job_templates') or {}).get('dispatcher') or os.environ.get('DISPATCHER_JT_NAME', 'jt-platform-casc_dispatcher')
      poll_timeout = int(os.environ.get('POLL_TIMEOUT_MINUTES', '30'))
      control_revision = os.environ.get('CONTROL_REVISION', '')
      resolved, errors = {}, []
      for env in environments:
          try:
              result = resolve_env_creds(env)
          except ValueError as exc:
              errors.append(f'ERROR: {exc}')
              continue
          if result is None:
              errors.append(f"ERROR: No token credentials for env '{env}'.")
          else:
              resolved[env] = result
      if errors:
          print('\n'.join(errors))
          sys.exit(1)

      for env in environments:
          host, auth_args = resolved[env]
          response = subprocess.run(['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}'], capture_output=True, text=True)
          try:
              jt = json.loads(response.stdout)['results'][0]
              jt_id = jt['id']
          except (json.JSONDecodeError, KeyError, IndexError):
              print(f"ERROR: JT '{jt_name}' not found on {host}")
              sys.exit(1)
          if jt.get('allow_simultaneous', False):
              print('ERROR: serialized rollout requires dispatcher allow_simultaneous=false')
              sys.exit(1)
          # Bounded onboarding: platform first, then only changed tenants. No full reconciliation.
          for scope, tenant_id in [('platform', '')] + [('tenant', oid) for oid in onboarding_tenants]:
              if scope == 'full':
                  raise RuntimeError('Refusing full scope during bounded onboarding')
              extra_vars = json.dumps({
                  'target_env': env,
                  'dispatch_scope': scope,
                  'tenant_id': tenant_id,
                  'control_revision': control_revision,
                  'trigger_commit': os.environ.get('CI_COMMIT_SHA', ''),
                  'trigger_source': 'bootstrap-onboarding',
              })
              launch = subprocess.run(['curl', '-sk', '-X', 'POST'] + auth_args + [
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'extra_vars': extra_vars}),
                  f'{host}/api/controller/v2/job_templates/{jt_id}/launch/'
              ], capture_output=True, text=True)
              try:
                  job_id = json.loads(launch.stdout).get('id')
              except json.JSONDecodeError:
                  job_id = None
              if not job_id:
                  print(f'ERROR: Failed to launch dispatcher for env={env}, scope={scope}')
                  sys.exit(1)
              print(f'Dispatcher launched: id={job_id}, env={env}, scope={scope}, tenant={tenant_id or "-"}')
              wait_for_terminal(host, auth_args, job_id, poll_timeout)
      FANOUT_PY
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip dispatch\]/'
      when: never
    - if: '$CASC_OPERATION == "onboarding_dispatch"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CONTROL_BRANCH && $CI_PROJECT_NAME == $CONTROL_REPO && $CASC_CALLER_ROLE == "control"'
      changes:
        - tenants.yml
    - when: never

# ── Stage 4: Protected onboarding continuation (control web/manual) ───────────
onboarding:dispatch:
  stage: onboarding
  image: python:3.11-slim
  needs:
    - job: "fetch:schemas"
      artifacts: true
    - job: "fetch:control-metadata"
      artifacts: true
    - job: "validate:yaml-structure"
    - job: "validate:control-files"
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
    - pip install pyyaml
  script:
    - |
      if [ "${CASC_CALLER_ROLE}" != "control" ]; then
        echo "ERROR: onboarding_dispatch requires CASC_CALLER_ROLE=control"
        exit 1
      fi
      if [ -z "${TENANT_ID:-}" ]; then
        echo "ERROR: TENANT_ID is required for onboarding_dispatch"
        exit 1
      fi
      HELPER=""
      if [ -f .scripts/pipeline/casc_runtime.py ]; then
        HELPER=".scripts/pipeline/casc_runtime.py"
      elif [ -f scripts/pipeline/casc_runtime.py ]; then
        HELPER="scripts/pipeline/casc_runtime.py"
      else
        echo "ERROR: casc_runtime.py missing from engine checkout artifacts"
        exit 1
      fi
      if [ -z "${CONTROL_REPO_TOKEN:-}" ]; then
        echo "ERROR: CONTROL_REPO_TOKEN is required for onboarding_dispatch"
        exit 1
      fi
      python3 "$HELPER" onboarding-dispatch \
        --provider gitlab \
        --operation "${CASC_OPERATION}" \
        --caller-role "${CASC_CALLER_ROLE}" \
        --repository "${CI_PROJECT_PATH}" \
        --ref-name "${CI_COMMIT_BRANCH:-${CI_COMMIT_REF_NAME}}" \
        --control-scm-org "${CONTROL_SCM_ORG}" \
        --control-repo "${CONTROL_REPO}" \
        --control-branch "${CONTROL_BRANCH}" \
        --control-token "${CONTROL_REPO_TOKEN}" \
        --tenant-id "${TENANT_ID}" \
        --control-revision "${CONTROL_REVISION}" \
        --poll-timeout "${POLL_TIMEOUT_MINUTES}" \
        --gitlab-api "${CI_API_V4_URL}"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CASC_OPERATION == "onboarding_dispatch" && $CASC_CALLER_ROLE == "control" && $CI_PROJECT_NAME == $CONTROL_REPO && $CI_COMMIT_BRANCH == $CONTROL_BRANCH'
      when: on_success
    - when: never

# ── Stage 5: Trigger ─────────────────────────────────────────────────────────
trigger:dispatcher:
  stage: trigger
  image: python:3.11-slim
  resource_group: casc-dispatcher
  needs:
    - job: "bootstrap:tenants"
      artifacts: true
      optional: true
    - job: "fetch:schemas"
      artifacts: true
      optional: true
    - job: "fetch:control-metadata"
      artifacts: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
    - pip install pyyaml
  script:
    - |
      if [ "${CASC_OPERATION:-}" = "onboarding_dispatch" ]; then
        echo "Skipping normal trigger; operation=onboarding_dispatch uses protected onboarding job."
        exit 0
      fi
      if [ "${CASC_CALLER_ROLE:-tenant}" = "control" ]; then
        echo "Control repository does not run normal desired-state dispatch."
        exit 0
      fi
      # Guard: skip if bootstrap path ran (tenants.yml changed)
      if [ "${BOOTSTRAP_BLOCK_DISPATCH:-false}" = "true" ]; then
        echo "tenants.yml bootstrap path ran for this pipeline; skipping normal dispatcher."
        exit 0
      fi

      HELPER=""
      if [ -f .scripts/pipeline/casc_runtime.py ]; then
        HELPER=".scripts/pipeline/casc_runtime.py"
      elif [ -f scripts/pipeline/casc_runtime.py ]; then
        HELPER="scripts/pipeline/casc_runtime.py"
      fi

      # Resolve and fetch one authoritative control revision. No branch-head or
      # job-token fallback is allowed after validation.
      if [ -z "$HELPER" ]; then
        echo "ERROR: casc_runtime.py missing from engine checkout artifacts"
        exit 1
      fi
      if [ -z "${CONTROL_REPO_TOKEN:-}" ] || [ -z "${CONTROL_SCM_ORG:-}" ]; then
        echo "ERROR: CONTROL_REPO_TOKEN and CONTROL_SCM_ORG are required"
        exit 1
      fi
      python3 "$HELPER" ensure-control \
        --provider gitlab \
        --control-scm-org "${CONTROL_SCM_ORG}" \
        --control-repo "${CONTROL_REPO}" \
        --control-branch "${CONTROL_BRANCH}" \
        --token "${CONTROL_REPO_TOKEN}" \
        --control-revision "${CONTROL_REVISION}" \
        --gitlab-api "${CI_API_V4_URL}" \
        --dest-dir . | tee /tmp/ensure-control.out
      RESOLVED_LINE=$(grep '^control_revision=' /tmp/ensure-control.out)
      if [ -z "$RESOLVED_LINE" ]; then
        echo "ERROR: authoritative control revision was not resolved"
        exit 1
      fi
      export CONTROL_REVISION="${RESOLVED_LINE#control_revision=}"
      export DISPATCHER_JT_NAME=$(python3 -c "
      import yaml
      cfg = yaml.safe_load(open('config.yml')) or {}
      jt = (cfg.get('job_templates') or {}).get('dispatcher')
      if not isinstance(jt, str) or not jt.strip():
          raise SystemExit('ERROR: config.yml job_templates.dispatcher must be a non-empty string')
      print(jt.strip())
      ")

      # Config-driven env resolution
      export BRANCH="${CI_COMMIT_BRANCH}"
      TARGET_ENV=$(python3 <<'PY'
      import os, yaml, sys
      cfg = yaml.safe_load(open('config.yml')) or {}
      env_map = cfg.get('env_branch_map', {})
      branch = os.environ['BRANCH']
      matching_envs = [env for env, br in env_map.items() if br == branch]
      if not matching_envs:
          print(f'No env_branch_map entry maps branch {branch} to an environment. Skipping dispatch.', file=sys.stderr)
          print('')
      else:
          print(matching_envs[0])
      PY
      )

      if [ -z "$TARGET_ENV" ]; then
        echo "No matching environment for branch ${BRANCH}. Skipping dispatch."
        exit 0
      fi

      python3 <<TRIGGER_PY
      import os, json, sys, subprocess, time

      def normalize_host(raw):
          raw = raw.rstrip('/')
          return raw if raw.startswith('http://') or raw.startswith('https://') else f'https://{raw}'

      def resolve_env_creds(env_key):
          try:
              entry = json.loads(os.environ.get('AAP_ENV_TARGETS_JSON', '')).get(env_key, {})
          except json.JSONDecodeError:
              raise ValueError('AAP_ENV_TARGETS_JSON must be valid JSON')
          if entry.get('username') or entry.get('password'):
              raise ValueError('username/password credentials are rejected; bearer token only')
          if entry.get('host') and entry.get('token'):
              return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
          return None

      target_env = "${TARGET_ENV}"
      jt_name = os.environ.get('DISPATCHER_JT_NAME', 'jt-platform-casc_dispatcher')
      poll_timeout = int(os.environ.get('POLL_TIMEOUT_MINUTES', '30'))
      caller_role = os.environ.get('CASC_CALLER_ROLE', 'tenant')
      control_revision = os.environ.get('CONTROL_REVISION', '')

      try:
          creds = resolve_env_creds(target_env)
      except ValueError as exc:
          print(f'ERROR: {exc}')
          sys.exit(1)
      if creds is None:
          print(f'ERROR: No credentials for env={target_env}')
          sys.exit(1)
      host, auth_args = creds

      print(f'=== Triggering dispatcher | Host: {host} | Env: {target_env} | JT: {jt_name} ===')
      jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
      jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
      try:
          jt_data = json.loads(jt_result.stdout)
          jt_id = jt_data['results'][0]['id']
      except (json.JSONDecodeError, KeyError, IndexError):
          print(f"ERROR: JT '{jt_name}' not found")
          sys.exit(1)

      allow_simul = jt_data['results'][0].get('allow_simultaneous', False)
      if allow_simul:
          print('ERROR: Dispatcher JT has allow_simultaneous=true — must be false')
          sys.exit(1)

      dispatch_scope = 'platform' if caller_role == 'platform' else 'tenant'
      if dispatch_scope == 'full':
          print('ERROR: normal trigger cannot launch full scope')
          sys.exit(1)

      extra_vars = {
          'target_env': target_env,
          'dispatch_scope': dispatch_scope,
          'trigger_commit': os.environ.get('CI_COMMIT_SHA', ''),
          'triggered_repo': os.environ.get('CI_PROJECT_PATH', ''),
          'control_revision': control_revision,
          'trigger_source': 'ci-cd-pipeline',
      }
      launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
          '-H', 'Content-Type: application/json',
          '-d', json.dumps({'extra_vars': json.dumps(extra_vars)}),
          f'{host}/api/controller/v2/job_templates/{jt_id}/launch/'
      ]
      launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
      try:
          job_id = json.loads(launch_result.stdout).get('id')
      except Exception:
          job_id = None
      if not job_id:
          print('ERROR: Failed to launch dispatcher')
          sys.exit(1)
      print(f'Dispatcher launched: ID={job_id}')

      # Serialized baseline requires authoritative completion polling.
      poll_checks = (poll_timeout * 60) // 10
      print(f'Polling for completion (timeout: {poll_timeout} min)...')
      for i in range(1, poll_checks + 1):
          time.sleep(10)
          status_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/{job_id}/']
          status_result = subprocess.run(status_cmd, capture_output=True, text=True)
          try:
              status = json.loads(status_result.stdout).get('status', 'unknown')
          except Exception:
              status = 'unknown'
          print(f'  Status: {status} ({i}/{poll_checks})')
          if status == 'successful':
              print('=== COMPLETED ===')
              sys.exit(0)
          elif status in ('failed', 'error', 'canceled'):
              print(f'=== FAILED ({status}) ===')
              sys.exit(1)
      print(f'ERROR: Job {job_id} still running after {poll_timeout} min')
      sys.exit(1)
      TRIGGER_PY
  retry: 2
  rules:
    - if: '$CASC_OPERATION == "onboarding_dispatch"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "web" && $CASC_CALLER_ROLE != "control"'
      when: manual
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip dispatch\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH && $CASC_CALLER_ROLE != "control"'
      when: on_success
    - when: never
