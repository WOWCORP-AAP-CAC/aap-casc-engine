# Platform-managed shared pipeline template for CasC repositories (v3 — multi-env fan-out)
# Lives in: aap-casc-engine/pipeline-templates/gitlab/.gitlab-ci-template.yml
# Tenant/platform repos include this template via .gitlab-ci.yml
#
# Tenant repo usage (.gitlab-ci.yml):
#   include:
#     - project: '<platform-group>/aap-casc-engine'
#       ref: 'main'
#       file: '/pipeline-templates/gitlab/.gitlab-ci-template.yml'

stages:
  - validate
  - bootstrap
  - fanout
  - trigger

variables:
  ENGINE_PROJECT_PATH: ""
  SCHEMA_DIR: "${CI_PROJECT_DIR}/.schemas"
  DISPATCHER_JT_NAME: "jt-platform-casc_dispatcher"
  BOOTSTRAP_JT_NAME: "jt-platform-bootstrap_tenant"
  WAIT_FOR_COMPLETION: "true"
  POLL_TIMEOUT_MINUTES: "30"
  BOOTSTRAP_POLL_TIMEOUT_MINUTES: "15"
  PLATFORM_SCM_ORG: ""
  PLATFORM_HOME_REPO: "casc-platform-global"
  PLATFORM_BRANCH: "main"

# ── Pre-stage: Fetch schemas from engine repo ────────────────────────────────
fetch:schemas:
  stage: .pre
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - |
      if [ -z "$ENGINE_PROJECT_PATH" ]; then
        echo "ERROR: ENGINE_PROJECT_PATH is not set."
        exit 1
      fi
      git clone --depth 1 --branch main \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${ENGINE_PROJECT_PATH}.git" /tmp/engine
      mkdir -p .schemas
      [ -f /tmp/engine/schemas/resource-types.yml ] && cp /tmp/engine/schemas/resource-types.yml .schemas/ || true
      [ -f /tmp/engine/schemas/validate_naming.py ] && cp /tmp/engine/schemas/validate_naming.py .schemas/ || true
      [ -f /tmp/engine/schemas/naming-rules.yml ] && cp /tmp/engine/schemas/naming-rules.yml .schemas/ || true
      [ -d /tmp/engine/schemas/policies ] && cp -r /tmp/engine/schemas/policies .schemas/ || true
      if [ -f /tmp/engine/roles/process_casc_config/defaults/main.yml ]; then
        cp /tmp/engine/roles/process_casc_config/defaults/main.yml .schemas/engine_defaults.yml
      fi
  artifacts:
    paths:
      - .schemas/

# ── Stage 1: Validate ────────────────────────────────────────────────────────
validate:yaml-structure:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - |
      echo "=== CasC YAML Structural Validation ==="
      python3 -c "
      import yaml, sys, os

      resource_types = yaml.safe_load(open('.schemas/resource-types.yml')) if os.path.exists('.schemas/resource-types.yml') else {'defaults': {'value_type': 'list', 'identity_field': 'name'}, 'exceptions': {}}
      defaults = resource_types.get('defaults', {})
      exceptions = resource_types.get('exceptions', {})

      allowed_keys = None
      if os.path.exists('.schemas/engine_defaults.yml'):
          ak = yaml.safe_load(open('.schemas/engine_defaults.yml'))
          allowed_keys = set(ak.get('casc_allowed_resource_keys', []))

      skip_dirs = {'.schemas', '.engine', '.git'}
      errors = []

      for search_dir in ['base'] + [d for d in os.listdir('.') if os.path.isdir(d) and d not in skip_dirs and d != 'base']:
          if not os.path.isdir(search_dir):
              continue
          for root, _, files in os.walk(search_dir):
              for fname in files:
                  if not fname.endswith(('.yml', '.yaml')) or fname.endswith('.sample'):
                      continue
                  fpath = os.path.join(root, fname)
                  try:
                      data = yaml.safe_load(open(fpath))
                  except Exception as e:
                      errors.append(f'{fpath}: Failed to parse YAML — {e}')
                      continue
                  if not isinstance(data, dict):
                      errors.append(f'{fpath}: Expected a mapping')
                      continue
                  keys = list(data.keys())
                  if len(keys) != 1:
                      errors.append(f'{fpath}: Expected 1 top-level key, got {len(keys)}: {keys}')
                      continue
                  key = keys[0]
                  if allowed_keys and key not in allowed_keys:
                      errors.append(f'{fpath}: Unknown resource key \"{key}\" (not in casc_allowed_resource_keys)')
                      continue
                  exc = exceptions.get(key, {})
                  vtype = exc.get('value_type', defaults.get('value_type', 'list'))
                  id_field = exc.get('identity_field', defaults.get('identity_field', 'name'))
                  value = data[key]
                  if vtype == 'list':
                      if not isinstance(value, list):
                          errors.append(f'{fpath}: Key \"{key}\" expected list, got {type(value).__name__}')
                          continue
                      for i, item in enumerate(value):
                          if isinstance(item, dict) and id_field not in item:
                              errors.append(f'{fpath}: Item {i} in \"{key}\" missing \"{id_field}\"')

      if errors:
          for e in errors: print(f'  ERROR: {e}')
          sys.exit(1)
      else:
          print('=== ALL YAML FILES PASSED STRUCTURAL VALIDATION ===')
      "
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:control-files:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - |
      echo "=== Control File Validation ==="
      python3 -c "
      import yaml, sys, os, re
      errors = []

      ENV_NAME_RE = re.compile(r'^[a-z][a-z0-9_]*$')

      if os.path.exists('config.yml'):
          try:
              cfg = yaml.safe_load(open('config.yml'))
              for key in ['env_branch_map', 'scm_provider', 'platform_scm_org', 'repo_pattern']:
                  if key not in cfg:
                      errors.append(f'config.yml: missing required key \"{key}\"')
              if 'platform_branch' in cfg and not isinstance(cfg['platform_branch'], str):
                  errors.append('config.yml: platform_branch must be a string')
              if 'create_missing_env_branches' in cfg and not isinstance(cfg['create_missing_env_branches'], bool):
                  errors.append('config.yml: create_missing_env_branches must be a boolean')
              if 'bootstrap_dispatch_fanout' in cfg and not isinstance(cfg['bootstrap_dispatch_fanout'], bool):
                  errors.append('config.yml: bootstrap_dispatch_fanout must be a boolean')
              if 'env_branch_map' in cfg:
                  ebm = cfg['env_branch_map']
                  if not isinstance(ebm, dict) or not ebm:
                      errors.append('config.yml: env_branch_map must be a non-empty mapping')
                  else:
                      for env, branch in ebm.items():
                          if not isinstance(env, str) or not env.strip():
                              errors.append('config.yml: env_branch_map contains an empty or non-string key')
                          elif not ENV_NAME_RE.match(env):
                              errors.append(f'config.yml: env_branch_map key \"{env}\" must match ^[a-z][a-z0-9_]*$')
                          if not isinstance(branch, str) or not branch.strip():
                              errors.append(f'config.yml: env_branch_map[{env}] must be a non-empty branch string')
                      branches = list(ebm.values())
                      if len(branches) != len(set(branches)):
                          dupes = [b for b in set(branches) if branches.count(b) > 1]
                          errors.append(f'config.yml: env_branch_map branch values must be unique. Duplicates: {dupes}')
          except Exception as e:
              errors.append(f'config.yml: Failed to parse — {e}')

      if os.path.exists('tenants.yml'):
          try:
              t = yaml.safe_load(open('tenants.yml'))
              tenants = t.get('tenants', [])
              if not isinstance(tenants, list):
                  errors.append('tenants.yml: \"tenants\" must be a list')
              else:
                  for i, entry in enumerate(tenants):
                      for req in ['org_id', 'team_name', 'team_lead', 'tenant_scm_org']:
                          if req not in entry:
                              errors.append(f'tenants.yml: tenant {i} missing required field \"{req}\"')
                      if 'status' in entry and entry['status'] not in ('active', 'inactive'):
                          errors.append(f'tenants.yml: tenant {i} has invalid status \"{entry[\"status\"]}\"')
          except Exception as e:
              errors.append(f'tenants.yml: Failed to parse — {e}')

      if errors:
          for e in errors: print(f'  ERROR: {e}')
          sys.exit(1)
      else:
          print('=== CONTROL FILES VALID (or not present) ===')
      "
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:naming-convention:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - |
      if [ -f ".schemas/validate_naming.py" ] && [ -f ".schemas/naming-rules.yml" ]; then
        echo "=== Checking naming conventions ==="
        python3 .schemas/validate_naming.py --config-dir . --rules .schemas/naming-rules.yml
        echo "=== NAMING CONVENTIONS PASSED ==="
      else
        echo "No naming validation scripts found — skipping."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:policy-compliance:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
    - curl -sL -o /usr/local/bin/opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static && chmod +x /usr/local/bin/opa
  script:
    - |
      if [ -d ".schemas/policies" ]; then
        echo "=== Checking OPA policy compliance ==="

        SCAN_DIRS=""
        for d in $(ls -d */ 2>/dev/null); do
          case "$d" in
            .schemas/|.engine/|.git/) continue ;;
            *) SCAN_DIRS="$SCAN_DIRS $d" ;;
          esac
        done

        for yml_file in $(find $SCAN_DIRS -name "*.yml" -o -name "*.yaml" 2>/dev/null | grep -v '.sample$'); do
          echo "Policy check: $yml_file"
          python3 -c "import yaml,json,sys; json.dump(yaml.safe_load(open(sys.argv[1])), open('/tmp/opa_input.json','w'))" "$yml_file"
          opa eval --data .schemas/policies/ --input /tmp/opa_input.json "data.casc.deny" --format pretty
        done
        echo "=== OPA POLICY CHECK COMPLETE ==="
      else
        echo "No OPA policies found — skipping."
      fi
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── Stage 2: Bootstrap (GitOps tenant onboarding from tenants.yml) ───────────
bootstrap:tenants:
  stage: bootstrap
  image: python:3.11-slim
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl > /dev/null
    - pip install pyyaml
  script:
    - |
      python3 -c "
      import yaml, json, subprocess, sys, os

      if not os.path.exists('tenants.yml'):
          print('No tenants.yml — skipping bootstrap')
          sys.exit(0)

      try:
          current = yaml.safe_load(open('tenants.yml'))
      except Exception:
          print('Invalid tenants.yml — skipping bootstrap')
          sys.exit(0)

      result = subprocess.run(['git', 'show', 'HEAD~1:tenants.yml'], capture_output=True, text=True)
      if result.returncode != 0:
          previous = {'tenants': []}
      else:
          previous = yaml.safe_load(result.stdout) or {'tenants': []}

      prev_map = {t['org_id']: t for t in previous.get('tenants', [])}
      curr_map = {t['org_id']: t for t in current.get('tenants', [])}

      actions = []
      for oid, tenant in curr_map.items():
          if tenant.get('status') == 'inactive':
              continue
          if oid not in prev_map:
              actions.append({'action': 'added', 'tenant': tenant})
          elif tenant != prev_map[oid]:
              actions.append({'action': 'modified', 'tenant': tenant})

      if not actions:
          print('No new or modified active tenants — skipping bootstrap')
          sys.exit(0)

      print(f'Found {len(actions)} tenant(s) to bootstrap:')
      for a in actions:
          print(f'  {a[\"action\"]}: {a[\"tenant\"][\"org_id\"]}')

      with open('tenant_actions.json', 'w') as f:
          json.dump(actions, f)
      "

      # tenants.yml changed — always block normal dispatcher
      echo "BOOTSTRAP_BLOCK_DISPATCH=true" >> bootstrap.env

      if [ ! -f tenant_actions.json ]; then
        echo "No actionable tenant bootstrap; normal dispatcher remains blocked for this tenants.yml change."
        echo "BOOTSTRAP_ACTIONABLE=false" >> bootstrap.env
        exit 0
      fi

      echo "BOOTSTRAP_ACTIONABLE=true" >> bootstrap.env

      # Engine credential resolution with host normalization
      normalize_aap_host() {
        local raw="$1"
        raw="${raw%/}"
        if [[ "$raw" == http://* || "$raw" == https://* ]]; then
          echo "$raw"
        else
          echo "https://${raw}"
        fi
      }

      if [ -n "${AAP_ENGINE_HOST:-}" ] && [ -n "${AAP_ENGINE_TOKEN:-}" ]; then
        ENGINE_HOST=$(normalize_aap_host "$AAP_ENGINE_HOST")
        AUTH_MODE="bearer"
        AUTH_HEADER="Authorization: Bearer ${AAP_ENGINE_TOKEN}"
      elif [ -n "${AAP_ENGINE_HOST:-}" ] && [ -n "${AAP_ENGINE_USERNAME:-}" ] && [ -n "${AAP_ENGINE_PASSWORD:-}" ]; then
        ENGINE_HOST=$(normalize_aap_host "$AAP_ENGINE_HOST")
        AUTH_MODE="basic"
        AUTH_CREDS="${AAP_ENGINE_USERNAME}:${AAP_ENGINE_PASSWORD}"
      elif [ -n "${AAP_HOST:-}" ] && [ -n "${AAP_USERNAME:-}" ] && [ -n "${AAP_PASSWORD:-}" ]; then
        ENGINE_HOST=$(normalize_aap_host "$AAP_HOST")
        AUTH_MODE="basic"
        AUTH_CREDS="${AAP_USERNAME}:${AAP_PASSWORD}"
      else
        echo "ERROR: Actionable tenants found but no engine credentials configured"
        exit 1
      fi

      engine_curl() {
        if [ "$AUTH_MODE" = "bearer" ]; then
          curl -sk -H "${AUTH_HEADER}" "$@"
        else
          curl -sk -u "${AUTH_CREDS}" "$@"
        fi
      }

      JT_RESPONSE=$(engine_curl "${ENGINE_HOST}/api/controller/v2/job_templates/?name=${BOOTSTRAP_JT_NAME}")
      JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

      if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
        echo "ERROR: Bootstrap JT '${BOOTSTRAP_JT_NAME}' not found"
        exit 1
      fi

      POLL_TIMEOUT="${BOOTSTRAP_POLL_TIMEOUT_MINUTES:-15}"

      export ENGINE_HOST JT_ID AUTH_MODE POLL_TIMEOUT
      [ "$AUTH_MODE" = "bearer" ] && export AUTH_HEADER || export AUTH_CREDS

      python3 <<'BOOTSTRAP_PY'
      import json, subprocess, sys, os, time

      actions = json.load(open('tenant_actions.json'))
      jt_id = os.environ['JT_ID']
      engine_host = os.environ['ENGINE_HOST']
      auth_mode = os.environ['AUTH_MODE']
      poll_timeout = int(os.environ.get('POLL_TIMEOUT', '15'))
      poll_interval = 10
      max_polls = (poll_timeout * 60) // poll_interval

      def engine_curl_args():
          if auth_mode == 'bearer':
              return ['-H', os.environ['AUTH_HEADER']]
          else:
              return ['-u', os.environ['AUTH_CREDS']]

      for action in actions:
          tenant = action['tenant']
          org_id = tenant['org_id']
          print(f'Bootstrapping tenant: {org_id} ({action["action"]})')

          extra_vars = json.dumps({
              'org_id': org_id,
              'team_name': tenant['team_name'],
              'team_lead': tenant['team_lead'],
              'tenant_scm_org': tenant['tenant_scm_org'],
              'tenant_scm_namespace_id': tenant.get('tenant_scm_namespace_id', ''),
              'repo_pattern': tenant.get('repo_pattern', 'combined'),
          })

          launch_cmd = ['curl', '-sk'] + engine_curl_args() + [
              '-X', 'POST', '-H', 'Content-Type: application/json',
              '-d', json.dumps({'extra_vars': extra_vars}),
              f'{engine_host}/api/controller/v2/job_templates/{jt_id}/launch/'
          ]
          result = subprocess.run(launch_cmd, capture_output=True, text=True)
          try:
              response = json.loads(result.stdout)
          except Exception:
              print(f'  ERROR: Failed to parse launch response')
              sys.exit(1)

          job_id = response.get('id')
          if not job_id:
              print(f'  ERROR: Failed to launch bootstrap JT for {org_id}')
              sys.exit(1)

          print(f'  Job launched: ID={job_id}')
          print(f'  Polling for completion (timeout: {poll_timeout}min)...')

          for i in range(1, max_polls + 1):
              time.sleep(poll_interval)
              status_cmd = ['curl', '-sk'] + engine_curl_args() + [f'{engine_host}/api/controller/v2/jobs/{job_id}/']
              status_result = subprocess.run(status_cmd, capture_output=True, text=True)
              try:
                  status = json.loads(status_result.stdout).get('status', 'unknown')
              except Exception:
                  status = 'unknown'
              print(f'    Status: {status} ({i}/{max_polls})')
              if status == 'successful':
                  print(f'  Bootstrap JT for {org_id} completed successfully.')
                  break
              elif status in ('failed', 'error', 'canceled'):
                  print(f'  ERROR: Bootstrap JT job {job_id} for tenant {org_id} {status}.')
                  sys.exit(1)
          else:
              print(f'  ERROR: Bootstrap JT job {job_id} for tenant \'{org_id}\' did not complete within {poll_timeout} minutes.')
              sys.exit(1)
      print('All bootstrap JTs completed successfully.')
      BOOTSTRAP_PY
  artifacts:
    reports:
      dotenv: bootstrap.env
  rules:
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip dispatch\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH'
      changes:
        - tenants.yml

# ── Stage 3: Fan-out ─────────────────────────────────────────────────────────
fanout:dispatcher:
  stage: fanout
  image: python:3.11-slim
  needs:
    - job: "bootstrap:tenants"
      artifacts: true
      optional: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
    - pip install pyyaml
  script:
    - |
      # Guard: only fan-out when bootstrap actually onboarded tenants
      if [ "${BOOTSTRAP_ACTIONABLE:-false}" != "true" ]; then
        echo "No actionable tenant bootstrap; skipping fan-out."
        exit 0
      fi

      # Fetch config.yml from platform home repo if not local
      if [ ! -f "config.yml" ]; then
        echo "Fetching config.yml from platform home repo..."
        PLATFORM_PROJECT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${PLATFORM_SCM_ORG}/${PLATFORM_HOME_REPO:-casc-platform-global}', safe=''))")
        PLATFORM_BRANCH_ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${PLATFORM_BRANCH:-main}', safe=''))")

        if [ -n "${PLATFORM_REPO_TOKEN:-}" ]; then
          AUTH_HEADER="PRIVATE-TOKEN: ${PLATFORM_REPO_TOKEN}"
        else
          AUTH_HEADER="JOB-TOKEN: ${CI_JOB_TOKEN}"
        fi

        curl -sf \
          --header "${AUTH_HEADER}" \
          "${CI_API_V4_URL}/projects/${PLATFORM_PROJECT}/repository/files/config.yml/raw?ref=${PLATFORM_BRANCH_ENC}" \
          -o config.yml

        if [ ! -f "config.yml" ]; then
          echo "ERROR: Could not fetch config.yml"
          exit 1
        fi
      fi

      python3 <<'FANOUT_PY'
      import os, json, sys, subprocess, time, yaml

      def normalize_host(raw):
          raw = raw.rstrip('/')
          return raw if raw.startswith('http://') or raw.startswith('https://') else f'https://{raw}'

      def resolve_env_creds(env_key):
          uk = env_key.upper()
          targets = os.environ.get('AAP_ENV_TARGETS_JSON', '')
          if targets:
              try:
                  t = json.loads(targets)
                  entry = t.get(env_key, {})
                  if entry.get('host') and entry.get('token'):
                      return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
                  if entry.get('host') and entry.get('username') and entry.get('password'):
                      return normalize_host(entry['host']), ['-u', f'{entry["username"]}:{entry["password"]}']
              except json.JSONDecodeError:
                  pass
          env_host = os.environ.get(f'AAP_{uk}_HOST', '')
          env_token = os.environ.get(f'AAP_{uk}_TOKEN', '')
          if env_host and env_token:
              return normalize_host(env_host), ['-H', f'Authorization: Bearer {env_token}']
          env_user = os.environ.get(f'AAP_{uk}_USERNAME', '')
          env_pass = os.environ.get(f'AAP_{uk}_PASSWORD', '')
          if env_host and env_user and env_pass:
              return normalize_host(env_host), ['-u', f'{env_user}:{env_pass}']
          allow_basic = os.environ.get('AAP_FANOUT_ALLOW_BASIC', 'false').lower() == 'true'
          aap_host = os.environ.get('AAP_HOST', '')
          aap_user = os.environ.get('AAP_USERNAME', '')
          aap_pass = os.environ.get('AAP_PASSWORD', '')
          if allow_basic and aap_host and aap_user and aap_pass:
              return normalize_host(aap_host), ['-u', f'{aap_user}:{aap_pass}']
          return None

      cfg = yaml.safe_load(open('config.yml'))
      fanout_enabled = cfg.get('bootstrap_dispatch_fanout', True)
      if not fanout_enabled:
          print('Fan-out disabled by bootstrap_dispatch_fanout=false.')
          sys.exit(0)

      environments = list(cfg.get('env_branch_map', {}).keys())
      jt_name = os.environ.get('DISPATCHER_JT_NAME', 'jt-platform-casc_dispatcher')

      if not environments:
          print('No environments in env_branch_map.')
          sys.exit(0)

      resolved = {}
      errors = []
      for env in environments:
          result = resolve_env_creds(env)
          if result is None:
              errors.append(f"ERROR: bootstrap_dispatch_fanout=true but no dispatcher credentials were found for env '{env}'.")
          else:
              resolved[env] = result
      if errors:
          for e in errors: print(e)
          sys.exit(1)

      print(f'Credentials resolved for {len(environments)} environments. Dispatching...')
      for env in environments:
          host, auth_args = resolved[env]
          print(f'\n=== Dispatching env={env} on {host} ===')
          jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
          jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
          try:
              jt_data = json.loads(jt_result.stdout)
              jt_id = jt_data['results'][0]['id']
          except (json.JSONDecodeError, KeyError, IndexError):
              print(f"ERROR: JT '{jt_name}' not found on {host}")
              sys.exit(1)

          extra_vars = json.dumps({'target_env': env, 'trigger_commit': os.environ.get('CI_COMMIT_SHA', ''), 'triggered_repo': os.environ.get('CI_PROJECT_NAME', ''), 'trigger_source': 'ci-cd-fanout'})
          launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + ['-H', 'Content-Type: application/json', '-d', json.dumps({'extra_vars': extra_vars}), f'{host}/api/controller/v2/job_templates/{jt_id}/launch/']
          launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
          try:
              job_id = json.loads(launch_result.stdout).get('id')
          except Exception:
              job_id = None
          if not job_id:
              print(f'ERROR: Failed to launch dispatcher for env={env}')
              sys.exit(1)
          print(f'  Dispatcher launched: job_id={job_id}')
      print('\n=== Fan-out complete ===')
      FANOUT_PY
  rules:
    - if: '$CI_COMMIT_BRANCH'
      when: on_success

# ── Stage 4: Trigger ─────────────────────────────────────────────────────────
trigger:dispatcher:
  stage: trigger
  image: python:3.11-slim
  resource_group: casc-dispatcher
  needs:
    - job: "bootstrap:tenants"
      artifacts: true
      optional: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
    - pip install pyyaml
  script:
    - |
      # Guard: skip if bootstrap path ran (tenants.yml changed)
      if [ "${BOOTSTRAP_BLOCK_DISPATCH:-false}" = "true" ]; then
        echo "tenants.yml bootstrap path ran for this pipeline; skipping normal dispatcher."
        exit 0
      fi

      # Fetch config.yml from platform home repo if not local
      if [ ! -f "config.yml" ]; then
        echo "Fetching config.yml from platform home repo..."
        PLATFORM_PROJECT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${PLATFORM_SCM_ORG}/${PLATFORM_HOME_REPO:-casc-platform-global}', safe=''))")
        PLATFORM_BRANCH_ENC=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${PLATFORM_BRANCH:-main}', safe=''))")

        if [ -n "${PLATFORM_REPO_TOKEN:-}" ]; then
          AUTH_HEADER="PRIVATE-TOKEN: ${PLATFORM_REPO_TOKEN}"
        else
          AUTH_HEADER="JOB-TOKEN: ${CI_JOB_TOKEN}"
        fi

        curl -sf \
          --header "${AUTH_HEADER}" \
          "${CI_API_V4_URL}/projects/${PLATFORM_PROJECT}/repository/files/config.yml/raw?ref=${PLATFORM_BRANCH_ENC}" \
          -o config.yml

        if [ ! -f "config.yml" ]; then
          echo "ERROR: Could not fetch config.yml"
          exit 1
        fi
      fi

      # Config-driven env resolution
      export BRANCH="${CI_COMMIT_BRANCH}"
      TARGET_ENV=$(python3 <<'PY'
      import os, yaml, sys
      cfg = yaml.safe_load(open('config.yml')) or {}
      env_map = cfg.get('env_branch_map', {})
      branch = os.environ['BRANCH']
      matching_envs = [env for env, br in env_map.items() if br == branch]
      if not matching_envs:
          print(f'No env_branch_map entry maps branch {branch} to an environment. Skipping dispatch.', file=sys.stderr)
          print('')
      else:
          print(matching_envs[0])
      PY
      )

      if [ -z "$TARGET_ENV" ]; then
        echo "No matching environment for branch ${BRANCH}. Skipping dispatch."
        exit 0
      fi

      python3 <<TRIGGER_PY
      import os, json, sys, subprocess, time

      def normalize_host(raw):
          raw = raw.rstrip('/')
          return raw if raw.startswith('http://') or raw.startswith('https://') else f'https://{raw}'

      def resolve_env_creds(env_key):
          uk = env_key.upper()
          targets = os.environ.get('AAP_ENV_TARGETS_JSON', '')
          if targets:
              try:
                  t = json.loads(targets)
                  entry = t.get(env_key, {})
                  if entry.get('host') and entry.get('token'):
                      return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
                  if entry.get('host') and entry.get('username') and entry.get('password'):
                      return normalize_host(entry['host']), ['-u', f'{entry["username"]}:{entry["password"]}']
              except json.JSONDecodeError:
                  pass
          env_host = os.environ.get(f'AAP_{uk}_HOST', '')
          env_token = os.environ.get(f'AAP_{uk}_TOKEN', '')
          if env_host and env_token:
              return normalize_host(env_host), ['-H', f'Authorization: Bearer {env_token}']
          env_user = os.environ.get(f'AAP_{uk}_USERNAME', '')
          env_pass = os.environ.get(f'AAP_{uk}_PASSWORD', '')
          if env_host and env_user and env_pass:
              return normalize_host(env_host), ['-u', f'{env_user}:{env_pass}']
          allow_basic = os.environ.get('AAP_FANOUT_ALLOW_BASIC', 'false').lower() == 'true'
          aap_host = os.environ.get('AAP_HOST', '')
          aap_user = os.environ.get('AAP_USERNAME', '')
          aap_pass = os.environ.get('AAP_PASSWORD', '')
          if allow_basic and aap_host and aap_user and aap_pass:
              return normalize_host(aap_host), ['-u', f'{aap_user}:{aap_pass}']
          return None

      target_env = "${TARGET_ENV}"
      jt_name = os.environ.get('DISPATCHER_JT_NAME', 'jt-platform-casc_dispatcher')
      wait = os.environ.get('WAIT_FOR_COMPLETION', 'true') == 'true'
      poll_timeout = int(os.environ.get('POLL_TIMEOUT_MINUTES', '30'))

      creds = resolve_env_creds(target_env)
      if creds is None:
          print(f'ERROR: No credentials for env={target_env}')
          sys.exit(1)
      host, auth_args = creds

      print(f'=== Triggering dispatcher | Host: {host} | Env: {target_env} | JT: {jt_name} ===')
      jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
      jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
      try:
          jt_data = json.loads(jt_result.stdout)
          jt_id = jt_data['results'][0]['id']
      except (json.JSONDecodeError, KeyError, IndexError):
          print(f"ERROR: JT '{jt_name}' not found")
          sys.exit(1)

      allow_simul = jt_data['results'][0].get('allow_simultaneous', False)
      if allow_simul:
          print('ERROR: Dispatcher JT has allow_simultaneous=true — must be false')
          sys.exit(1)

      extra_vars = json.dumps({'target_env': target_env, 'trigger_commit': os.environ.get('CI_COMMIT_SHA', ''), 'triggered_repo': os.environ.get('CI_PROJECT_NAME', ''), 'trigger_source': 'ci-cd-pipeline'})
      launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + ['-H', 'Content-Type: application/json', '-d', json.dumps({'extra_vars': extra_vars}), f'{host}/api/controller/v2/job_templates/{jt_id}/launch/']
      launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
      try:
          job_id = json.loads(launch_result.stdout).get('id')
      except Exception:
          job_id = None
      if not job_id:
          print('ERROR: Failed to launch dispatcher')
          sys.exit(1)
      print(f'Dispatcher launched: ID={job_id}')

      if not wait:
          sys.exit(0)

      poll_checks = (poll_timeout * 60) // 10
      for i in range(1, poll_checks + 1):
          time.sleep(10)
          status_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/{job_id}/']
          status_result = subprocess.run(status_cmd, capture_output=True, text=True)
          try:
              status = json.loads(status_result.stdout).get('status', 'unknown')
          except Exception:
              status = 'unknown'
          print(f'  Status: {status} ({i}/{poll_checks})')
          if status == 'successful':
              print('=== COMPLETED ===')
              sys.exit(0)
          elif status in ('failed', 'error', 'canceled'):
              print(f'=== FAILED ({status}) ===')
              sys.exit(1)
      sys.exit(0)
      TRIGGER_PY
  retry: 2
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_COMMIT_MESSAGE =~ /\[skip dispatch\]/'
      when: never
    - if: '$CI_COMMIT_BRANCH'
      when: on_success
