# Platform-managed shared pipeline template for tenant CasC repositories
# Lives in: aap-casc-engine/pipeline-templates/gitlab/.gitlab-ci-template.yml
# Tenant repos include this template — they do NOT define their own pipelines
#
# Supports two authentication modes:
#   1. Bearer token (production) — per-environment CI/CD variables: AAP_DEV_HOST/TOKEN, etc.
#   2. Basic auth (demo/sandbox) — single-host CI/CD variables: AAP_HOST, AAP_USERNAME, AAP_PASSWORD
#
# Tenant repo usage (.gitlab-ci.yml):
#   include:
#     - project: '<platform-group>/aap-casc-engine'
#       ref: 'main'
#       file: '/pipeline-templates/gitlab/.gitlab-ci-template.yml'
#
# IMPORTANT: AAP_HOST/AAP_USERNAME/AAP_PASSWORD here are CI/CD platform variables
# (GitLab group-level CI/CD variables) used by the trigger stage curl commands.
# They are NOT the same as CONTROLLER_HOST/CONTROLLER_USERNAME/CONTROLLER_PASSWORD
# injected by AAP credential types into Job Templates at runtime.
#
# CI_JOB_TOKEN: The engine project must add tenant projects/groups to its
# CI/CD Job Token allowlist (Settings > CI/CD > Token Access) for the schemas
# fetch stage to succeed. Without this, git clone will fail the pipeline job.

stages:
  - validate
  - trigger

variables:
  # REQUIRED: Override ENGINE_PROJECT_PATH at the GitLab group level
  # Set to your platform group's engine repo path, e.g. "my-platform-group/aap-casc-engine"
  ENGINE_PROJECT_PATH: ""
  SCHEMA_DIR: "${CI_PROJECT_DIR}/.schemas"
  DISPATCHER_JT_NAME: "jt-platform-casc_dispatcher"
  WAIT_FOR_COMPLETION: "true"
  POLL_TIMEOUT_MINUTES: "30"

# ── Pre-stage: Fetch schemas from engine repo ────────────────────────────────
fetch:schemas:
  stage: .pre
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - |
      if [ -z "$ENGINE_PROJECT_PATH" ]; then
        echo "ERROR: ENGINE_PROJECT_PATH is not set."
        echo "Set it as a CI/CD variable at the GitLab group level, e.g. 'my-platform-group/aap-casc-engine'"
        exit 1
      fi
      git clone --depth 1 --branch main \
        "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${ENGINE_PROJECT_PATH}.git" /tmp/engine
      mkdir -p .schemas
      cp /tmp/engine/schemas/*.schema.json .schemas/ 2>/dev/null || true
      [ -f /tmp/engine/schemas/validate_naming.py ] && cp /tmp/engine/schemas/validate_naming.py .schemas/ || true
      [ -f /tmp/engine/schemas/naming-rules.yml ] && cp /tmp/engine/schemas/naming-rules.yml .schemas/ || true
      [ -f /tmp/engine/schemas/check_naming_sync.py ] && cp /tmp/engine/schemas/check_naming_sync.py .schemas/ || true
      [ -d /tmp/engine/schemas/policies ] && cp -r /tmp/engine/schemas/policies .schemas/ || true
  artifacts:
    paths:
      - .schemas/

# ── Stage 1: Validate ────────────────────────────────────────────────────────
validate:json-schema:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install check-jsonschema pyyaml
  script:
    - |
      echo "=== CasC JSON Validation Pipeline ==="
      ERRORS=0
      for json_file in $(find . -name "*.json" -not -path "./.schemas/*" -not -path "./.git/*"); do
        key_count=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1])).keys()))" "$json_file" 2>/dev/null)
        if [ "$key_count" != "1" ]; then
          echo "ERROR: $json_file has $key_count top-level keys (expected exactly 1)"
          ERRORS=$((ERRORS + 1))
          continue
        fi
        resource_type=$(python3 -c "import json,sys; print(list(json.load(open(sys.argv[1])).keys())[0])" "$json_file" 2>/dev/null)
        if [ -z "$resource_type" ]; then
          echo "ERROR: Could not extract resource type from $json_file"
          ERRORS=$((ERRORS + 1))
          continue
        fi
        schema_file="${SCHEMA_DIR}/${resource_type}.schema.json"
        if [ -f "$schema_file" ]; then
          echo "Validating: $json_file against $schema_file (resource: ${resource_type})"
          if ! check-jsonschema --schemafile "$schema_file" "$json_file"; then
            ERRORS=$((ERRORS + 1))
          fi
        else
          echo "ERROR: No schema found for resource type '${resource_type}' (expected: $schema_file)"
          ERRORS=$((ERRORS + 1))
        fi
      done
      echo ""
      if [ "$ERRORS" -gt 0 ]; then
        echo "=== VALIDATION FAILED: $ERRORS error(s) ==="
        exit 1
      else
        echo "=== ALL JSON FILES PASSED SCHEMA VALIDATION ==="
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:naming-convention:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - |
      if [ -f ".schemas/validate_naming.py" ] && [ -f ".schemas/naming-rules.yml" ]; then
        echo "=== Checking naming conventions ==="
        python3 .schemas/validate_naming.py --config-dir . --rules .schemas/naming-rules.yml
        echo "=== NAMING CONVENTIONS PASSED ==="
      else
        echo "No naming validation scripts found — skipping."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:naming-sync:
  stage: validate
  image: python:3.11-slim
  before_script:
    - pip install pyyaml
  script:
    - |
      if [ -f ".schemas/check_naming_sync.py" ]; then
        python3 .schemas/check_naming_sync.py
      else
        echo "No naming sync check script found — skipping."
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

validate:policy-compliance:
  stage: validate
  image: openpolicyagent/opa:latest
  script:
    - |
      if [ -d ".schemas/policies" ]; then
        echo "=== Checking OPA policy compliance ==="
        for json_file in $(find . -name "*.json" -not -path "./.schemas/*" -not -path "./.git/*"); do
          echo "Policy check: $json_file"
          opa eval --data .schemas/policies/ --input "$json_file" "data.casc.deny" --format pretty
        done
        echo "=== OPA POLICY CHECK COMPLETE ==="
      else
        echo "No OPA policies found — skipping."
      fi
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ── Stage 2: Trigger (lightweight — single curl to correct AAP environment) ──
# Supports dual auth: Bearer token (production) or basic auth (demo/sandbox).
# If per-env token variables are set, Bearer token auth with branch routing is used.
# Otherwise, if AAP_HOST + AAP_USERNAME + AAP_PASSWORD are set, basic auth is used.
# If neither is configured, the trigger stage is skipped.
trigger:dispatcher:
  stage: trigger
  image: python:3.11-slim
  resource_group: casc-dispatcher
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl > /dev/null
  script:
    - |
      # Determine auth mode: Bearer token (per-env) or basic auth (single host)
      case "$CI_COMMIT_BRANCH" in
        feature/*)   TARGET_ENV="dev";  HOST="$AAP_DEV_HOST";  TOKEN="$AAP_DEV_TOKEN" ;;
        develop)     TARGET_ENV="tst";  HOST="$AAP_TST_HOST";  TOKEN="$AAP_TST_TOKEN" ;;
        release/*)   TARGET_ENV="npr";  HOST="$AAP_NPR_HOST";  TOKEN="$AAP_NPR_TOKEN" ;;
        master|main) TARGET_ENV="prd";  HOST="$AAP_PRD_HOST";  TOKEN="$AAP_PRD_TOKEN" ;;
        *)           TARGET_ENV="dev";  HOST="$AAP_DEV_HOST";  TOKEN="$AAP_DEV_TOKEN" ;;
      esac

      if [ -n "$HOST" ] && [ -n "$TOKEN" ]; then
        AUTH_MODE="bearer"
        AAP_HOST="$HOST"
        echo "Using Bearer token auth for environment: ${TARGET_ENV}"
      elif [ -n "$AAP_HOST" ] && [ -n "$AAP_USERNAME" ] && [ -n "$AAP_PASSWORD" ]; then
        AUTH_MODE="basic"
        echo "Using basic auth (demo/sandbox mode) for environment: ${TARGET_ENV}"
      else
        AUTH_MODE="skip"
        if [ "$CI_PIPELINE_SOURCE" = "push" ] || [ "$CI_PIPELINE_SOURCE" = "web" ]; then
          echo "ERROR: Dispatcher trigger skipped — no AAP credentials available."
          echo "Possible causes:"
          echo "  1. Group-level CI/CD variables AAP_HOST / AAP_USERNAME / AAP_PASSWORD not configured"
          echo "  2. Per-env variables (AAP_PRD_HOST/TOKEN, etc.) not configured for branch '${CI_COMMIT_BRANCH}'"
          exit 1
        fi
        echo "No AAP credentials configured — skipping trigger (validate-only mode)"
        exit 0
      fi

      # Helper function for authenticated curl
      auth_curl() {
        if [ "$AUTH_MODE" = "bearer" ]; then
          curl -sk -H "Authorization: Bearer ${TOKEN}" "$@"
        else
          curl -sk -u "${AAP_USERNAME}:${AAP_PASSWORD}" "$@"
        fi
      }

      echo "=== Triggering CasC Dispatcher on AAP ==="
      echo "Host: ${AAP_HOST}"
      echo "Environment: ${TARGET_ENV}"
      echo "Job Template: ${DISPATCHER_JT_NAME}"

      # Resolve dispatcher JT ID by name
      echo "Looking up Job Template: ${DISPATCHER_JT_NAME}"
      JT_RESPONSE=$(auth_curl "https://${AAP_HOST}/api/controller/v2/job_templates/?name=${DISPATCHER_JT_NAME}")

      JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

      if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
        echo "ERROR: Job Template '${DISPATCHER_JT_NAME}' not found on ${AAP_HOST}"
        echo "Response: $JT_RESPONSE"
        exit 1
      fi
      echo "Found JT ID: ${JT_ID}"

      # Verify allow_simultaneous is false — this is the safety net against concurrent dispatchers
      ALLOW_SIMUL=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0].get('allow_simultaneous', False))")
      if [ "$ALLOW_SIMUL" = "True" ]; then
        echo "ERROR: Dispatcher JT '${DISPATCHER_JT_NAME}' has allow_simultaneous=true — this must be false to prevent concurrent full-sweep runs"
        exit 1
      fi

      # Quick courtesy check — AAP serializes via allow_simultaneous=false
      echo "Checking if dispatcher is already running..."
      for attempt in $(seq 1 2); do
        RUNNING=$(auth_curl \
          "https://${AAP_HOST}/api/controller/v2/jobs/?job_template=${JT_ID}&status__in=running,pending,waiting&page_size=1" \
          | python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))")
        if [ "$RUNNING" = "0" ]; then
          break
        fi
        echo "  Dispatcher is busy (attempt ${attempt}/2) — waiting 15s..."
        sleep 15
      done
      if [ "$RUNNING" != "0" ]; then
        echo "INFO: Dispatcher still busy — launching anyway (AAP will queue via allow_simultaneous=false)"
      fi

      # Launch the dispatcher with trigger metadata
      echo "Launching dispatcher..."
      LAUNCH_RESPONSE=$(auth_curl -X POST \
        -H "Content-Type: application/json" \
        -d "{
          \"extra_vars\": {
            \"target_env\": \"${TARGET_ENV}\",
            \"trigger_commit\": \"${CI_COMMIT_SHA}\",
            \"triggered_repo\": \"${CI_PROJECT_NAME}\",
            \"trigger_source\": \"ci-cd-pipeline\"
          }
        }" \
        "https://${AAP_HOST}/api/controller/v2/job_templates/${JT_ID}/launch/")

      JOB_ID=$(echo "$LAUNCH_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id', 'UNKNOWN'))")
      echo "Dispatcher job launched: ID=${JOB_ID}"
      echo "AAP UI: https://${AAP_HOST}/#/jobs/playbook/${JOB_ID}/output"

      if [ "$JOB_ID" = "UNKNOWN" ] || [ -z "$JOB_ID" ]; then
        echo "ERROR: Failed to launch dispatcher"
        echo "Response: $LAUNCH_RESPONSE"
        exit 1
      fi

      # Fire-and-forget mode: exit immediately after launch
      if [ "$WAIT_FOR_COMPLETION" = "false" ]; then
        echo "=== FIRE-AND-FORGET: Dispatcher launched, not waiting for completion ==="
        exit 0
      fi

      # Poll for job completion (configurable timeout)
      POLL_CHECKS=$(( POLL_TIMEOUT_MINUTES * 6 ))
      echo "Waiting for job to complete (timeout: ${POLL_TIMEOUT_MINUTES} min)..."
      for i in $(seq 1 $POLL_CHECKS); do
        sleep 10
        STATUS=$(auth_curl \
          "https://${AAP_HOST}/api/controller/v2/jobs/${JOB_ID}/" \
          | python3 -c "import sys,json; print(json.load(sys.stdin).get('status', 'unknown'))")
        echo "  Status: ${STATUS} (check ${i}/${POLL_CHECKS})"
        case "$STATUS" in
          successful) echo "=== DISPATCHER COMPLETED SUCCESSFULLY ===" && exit 0 ;;
          failed|error|canceled) echo "=== DISPATCHER FAILED (status: ${STATUS}) ===" && exit 1 ;;
        esac
      done

      # Graceful timeout — queued/running is not a failure
      case "$STATUS" in
        pending|waiting|running)
          echo "WARNING: Dispatcher job ${JOB_ID} still ${STATUS} after ${POLL_TIMEOUT_MINUTES} min — exiting with success. Check AAP UI for final status."
          echo "AAP UI: https://${AAP_HOST}/#/jobs/playbook/${JOB_ID}/output"
          exit 0 ;;
      esac
      echo "=== TIMEOUT: Job in unexpected state '${STATUS}' after ${POLL_TIMEOUT_MINUTES} min ==="
      exit 1
  retry: 2
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - if: '$CI_COMMIT_BRANCH =~ /^(feature\/|develop|release\/|master|main)/'
      when: on_success
