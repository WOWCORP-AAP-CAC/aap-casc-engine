---
# git_clone_repos — Clone CasC repositories from Git
#
# Required variables:
#   repos_to_clone: list of dicts with 'name' key (and optional 'scope', 'org')
#   clone_base_dir: base directory for cloned repos (e.g., /tmp/casc-repos)
#   clone_branch:   Git branch to clone (e.g., develop, main)
#   git_base_url:   SCM base URL (e.g., https://github.com/my-org)
#   git_token:      SCM API token for authentication
#
# Per-repo 'org' field (cross-org cloning):
#   When a repo entry includes 'org', the clone URL targets that org/namespace
#   on the SCM host, ignoring the org embedded in git_base_url. This supports
#   multi-org setups where tenant repos live in different GitHub orgs or
#   GitLab groups than the platform repos.
#
#   Without org: https://HOST/BASE_PATH/REPO.git  (derived from git_base_url)
#   With org:    https://HOST/ORG/REPO.git         (HOST extracted from git_base_url)

- name: "Ensure clone base directory exists"
  ansible.builtin.file:
    path: "{{ clone_base_dir }}"
    state: directory
    mode: "0755"

- name: "Clean existing clone directory"
  ansible.builtin.file:
    path: "{{ clone_base_dir }}/{{ item.name }}"
    state: absent
  loop: "{{ repos_to_clone }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Clone CasC repositories at {{ clone_branch }}"
  ansible.builtin.git:
    repo: "https://oauth2:{{ git_token }}@{{ _repo_path }}"
    dest: "{{ clone_base_dir }}/{{ item.name }}"
    version: "{{ clone_branch }}"
    depth: 1
    force: true
  vars:
    _scm_host: "{{ git_base_url | regex_replace('^https?://', '') | regex_replace('/.*$', '') }}"
    _default_path: "{{ git_base_url | regex_replace('^https?://', '') }}/{{ item.name }}.git"
    _org_path: "{{ _scm_host }}/{{ item.org }}/{{ item.name }}.git"
    _repo_path: "{{ _org_path if (item.org is defined and item.org | length > 0) else _default_path }}"
  loop: "{{ repos_to_clone }}"
  loop_control:
    label: "{{ item.name }}"
  register: clone_results

- name: "Report clone results"
  ansible.builtin.debug:
    msg: "Cloned {{ repos_to_clone | length }} repos to {{ clone_base_dir }} (branch: {{ clone_branch }})"
