---
# git_clone_repos — Clone CasC repositories from Git
#
# Required variables:
#   repos_to_clone: list of dicts with 'name' and 'scope' keys
#   clone_base_dir: base directory for cloned repos (e.g., /tmp/casc-repos)
#   clone_branch:   Git branch to clone (e.g., develop, main)
#   git_base_url:   SCM base URL (e.g., https://gitlab.example.com/casc)
#   git_token:      SCM API token for authentication

- name: "Ensure clone base directory exists"
  ansible.builtin.file:
    path: "{{ clone_base_dir }}"
    state: directory
    mode: "0755"

- name: "Clean existing clone directory"
  ansible.builtin.file:
    path: "{{ clone_base_dir }}/{{ item.name }}"
    state: absent
  loop: "{{ repos_to_clone }}"
  loop_control:
    label: "{{ item.name }}"

- name: "Clone CasC repositories at {{ clone_branch }}"
  ansible.builtin.git:
    repo: "https://oauth2:{{ git_token }}@{{ git_base_url | regex_replace('^https?://', '') }}/{{ item.name }}.git"
    dest: "{{ clone_base_dir }}/{{ item.name }}"
    version: "{{ clone_branch }}"
    depth: 1
    force: true
  loop: "{{ repos_to_clone }}"
  loop_control:
    label: "{{ item.name }}"
  register: clone_results

- name: "Report clone results"
  ansible.builtin.debug:
    msg: "Cloned {{ repos_to_clone | length }} repos to {{ clone_base_dir }} (branch: {{ clone_branch }})"
