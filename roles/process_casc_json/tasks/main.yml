---
# process_casc_json — Process CasC JSON files from a cloned repository
#
# Each JSON file MUST contain exactly one top-level key matching a known
# infra.aap_configuration dispatch variable (e.g., "controller_projects").
# Files with multiple top-level keys or unrecognized keys will fail validation.
# The allowlist lives in defaults/main.yml (casc_allowed_resource_keys).
#
# This role implements the core JSON processing pipeline:
#   1. Find all JSON files in the cloned repo directory
#   2. Filter by environment (files with -<env> suffix or no env suffix)
#   3. Validate each file has exactly one top-level key from the allowlist
#   4. Read and merge JSON arrays per resource type
#   5. Add scope suffix to the variable name (e.g., controller_projects → controller_projects_myorg01)
#   6. Write processed JSON to the output directory for include_vars
#
# Required variables:
#   repo_clone_dir: path to the cloned repo (e.g., /tmp/casc-repos/controller-projects-myorg01)
#   repo_scope:     scope suffix to add (e.g., platform, myorg01)
#   output_dir:     directory to write processed JSON files
#   env_filter:     target environment (e.g., dev, tst, npr, prd)

- name: "Ensure output directory exists"
  ansible.builtin.file:
    path: "{{ output_dir }}"
    state: directory
    mode: "0755"

- name: "Find all JSON config files in {{ repo_clone_dir }}"
  ansible.builtin.find:
    paths: "{{ repo_clone_dir }}"
    patterns: "*.json"
    recurse: true
    excludes:
      - ".schemas/*"
      - "package*.json"
  register: json_files

- name: "Process JSON files (env filter + merge + scope suffix)"
  when: json_files.files | length > 0
  block:
    - name: "Read all JSON files"
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ json_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: json_contents

    - name: "Validate single top-level key per JSON file"
      ansible.builtin.assert:
        that:
          - (item.content | b64decode | from_json | dict2items | length) == 1
        fail_msg: >-
          INVALID: {{ item.source | basename }} has {{ (item.content | b64decode | from_json | dict2items | length) }}
          top-level keys ({{ (item.content | b64decode | from_json).keys() | list | join(', ') }}).
          Each JSON file must contain exactly one top-level resource key
          (e.g., "controller_projects" or "aap_organizations").
        quiet: true
      loop: "{{ json_contents.results }}"
      loop_control:
        label: "{{ item.source | basename }}"

    - name: "Validate top-level key is a known dispatch variable"
      ansible.builtin.assert:
        that:
          - (item.content | b64decode | from_json | dict2items | first).key in casc_allowed_resource_keys
        fail_msg: >-
          UNKNOWN RESOURCE TYPE: {{ item.source | basename }} uses key
          "{{ (item.content | b64decode | from_json | dict2items | first).key }}"
          which is not a recognized infra.aap_configuration dispatch variable.
          Allowed keys: {{ casc_allowed_resource_keys | join(', ') }}.
        quiet: true
      loop: "{{ json_contents.results }}"
      loop_control:
        label: "{{ item.source | basename }}"

    - name: "Filter and merge JSON by environment"
      ansible.builtin.set_fact:
        merged_resources: {}

    - name: "Process each JSON file (filter by env, extract resource type)"
      ansible.builtin.set_fact:
        merged_resources: >-
          {{ merged_resources | combine(
               { resource_type: (merged_resources[resource_type] | default([])) + resource_items },
               recursive=false
             ) }}
      vars:
        file_content: "{{ item.content | b64decode | from_json }}"
        file_basename: "{{ item.source | basename | regex_replace('\\.json$', '') }}"
        # Environment filter: include files with no env suffix OR matching env suffix
        file_env_suffix: "{{ file_basename | regex_search('-(' + 'dev|tst|npr|prd' + ')$') | default('') }}"
        is_env_specific: "{{ file_env_suffix | length > 0 }}"
        matches_env: "{{ (not is_env_specific) or (file_env_suffix == '-' + env_filter) }}"
        # Extract the single top-level key as the resource type
        resource_type: "{{ (file_content | dict2items | first).key }}"
        resource_items: "{{ (file_content | dict2items | first).value }}"
      loop: "{{ json_contents.results }}"
      loop_control:
        label: "{{ item.source | basename }}"
      when: matches_env | bool

    - name: "Write scope-suffixed JSON files to output directory"
      ansible.builtin.copy:
        content: "{{ { item.key + '_' + repo_scope: item.value } | to_nice_json }}"
        dest: "{{ output_dir }}/{{ item.key }}_{{ repo_scope }}.json"
        mode: "0644"
      loop: "{{ merged_resources | dict2items }}"
      loop_control:
        label: "{{ item.key }}_{{ repo_scope }}"
      when: merged_resources | length > 0

- name: "Report processing results"
  ansible.builtin.debug:
    msg: >-
      Processed {{ json_files.files | length }} JSON files from {{ repo_clone_dir | basename }}
      → scope: {{ repo_scope }} | env: {{ env_filter }}
      → {{ merged_resources | default({}) | length }} resource types written to {{ output_dir }}
