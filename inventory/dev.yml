---
# Inventory for Dev AAP environment
# Per-env host falls back to CONTROLLER_HOST (single-host credential value).

all:
  hosts:
    localhost:
      ansible_connection: local
  vars:
    target_env: dev
    aap_hostname: "{{ lookup('env', 'CONTROLLER_DEV_HOST') | default(lookup('env', 'CONTROLLER_HOST'), true) }}"
    aap_username: "{{ lookup('env', 'CONTROLLER_USERNAME') }}"
    aap_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    aap_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default(true, true) | bool }}"
