---
# Inventory for Test AAP environment

all:
  hosts:
    localhost:
      ansible_connection: local
  vars:
    target_env: tst
    aap_hostname: "{{ lookup('env', 'AAP_TST_HOST') }}"
    aap_username: "{{ lookup('env', 'AAP_USERNAME') }}"
    aap_password: "{{ lookup('env', 'AAP_PASSWORD') }}"
    aap_validate_certs: true
