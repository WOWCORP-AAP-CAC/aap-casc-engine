---
# Naming convention rules for AAP CasC resources
# Each rule maps a resource type (JSON top-level key) to a regex pattern
# and an example of a valid name.

aap_organizations:
  pattern: "^org-[a-z0-9_]+$"
  example: "org-team_a"
  description: "Organizations: org-<identifier>"

controller_projects:
  pattern: "^prj-[a-z0-9_]+-[a-z0-9_]+(-[a-z0-9_]+)*$"
  example: "prj-myorg01-db_patching"
  description: "Projects: prj-<org_id>-<use_case>"

controller_credentials:
  pattern: "^crd-[a-z0-9_]+-[a-z]+-[a-z0-9_]+$"
  example: "crd-myorg01-cst-db_prod"
  description: "Credentials: crd-<org_id>-<type_prefix>-<purpose>"

controller_credential_types:
  pattern: "^ctp-[a-z0-9_]+$"
  example: "ctp-database_credentials"
  description: "Credential types: ctp-<purpose>"

controller_inventories:
  pattern: "^inv-[a-z0-9_]+(-[a-z0-9_]+)+$"
  example: "inv-myorg01-dev"
  description: "Inventories: inv-<org_id>-<env> or inv-<org_id>-<source>-<env>-<name>"

controller_templates:
  pattern: "^jt-[a-z0-9_]+-[a-z0-9_]+(-[a-z0-9_]+)*$"
  example: "jt-myorg01-db_patching"
  description: "Job templates: jt-<org_id>-<use_case>"

controller_schedules:
  pattern: "^sch-[a-z0-9_]+(-[a-z0-9_]+)*$"
  example: "sch-demo_alpha-nightly-hello"
  description: "Schedules: sch-<org_id>-<purpose>"

controller_workflows:
  pattern: "^wfjt-[a-z0-9_]+-[a-z0-9_]+(-[a-z0-9_]+)*$"
  example: "wfjt-myorg01-db_patching_workflow"
  description: "Workflow job templates: wfjt-<org_id>-<use_case>"

controller_notifications:
  pattern: "^ntf-[a-z0-9_]+-[a-z]+-[a-z0-9_]+$"
  example: "ntf-myorg01-slack-alerts"
  description: "Notifications: ntf-<org_id>-<type>-<purpose>"

controller_execution_environments:
  pattern: "^ee-[a-z0-9]+-[a-z0-9_]+-[a-z]+$"
  example: "ee-rhel9-ansible218-base"
  description: "Execution environments: ee-<os>-<ansible_version>-<purpose>"

# ── Intentionally unconstrained resources (Naming Standard v1) ──────────────
# The following resource types do NOT have naming rules enforced by validation:
#
# aap_teams — Team names come from identity systems (LDAP, SSO, IdP group sync).
#   Customers use their own organizational conventions; imposing a regex would
#   conflict with external naming authority.
#
# gateway_role_user_assignments / gateway_role_team_assignments — These reference
#   vendor-owned AAP Gateway role names (e.g., "Organization Admin", "Team Member").
#   The role names are defined by the AAP product, not by the CasC solution.
#
# controller_settings — AAP internal setting keys are product-defined identifiers
#   (e.g., "AWX_TASK_ENV", "GALAXY_IGNORE_CERTS"). These are not user-configurable
#   resource names; they must match AAP's expected keys exactly.
