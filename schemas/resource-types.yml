    value_type: list
    identity_field: name
    deletion_supported: false
  gateway_role_user_assignments:
    value_type: list
    identity_field: user
    deletion_supported: false
  gateway_role_team_assignments:
    value_type: list
    identity_field: team
    deletion_supported: false
  controller_credential_types:
    value_type: list
    identity_field: name
    deletion_supported: false
  controller_execution_environments:
