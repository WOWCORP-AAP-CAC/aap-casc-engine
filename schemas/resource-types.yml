---
# Per-resource-type validation and merge configuration.
#
# defaults: applied to every resource key unless overridden in exceptions.
#   value_type:     "list" (array of items) or "raw" (dict or list of name/value pairs)
#   identity_field: field used to match items during base/env merge (list types only)
#
# exceptions: keyed by dispatch variable name. Override any default.
#
# Usage:
#   - CI structural validation: checks value_type + identity_field presence
#   - process_casc_config role: drives base/env merge strategy

defaults:
  value_type: list
  identity_field: name
  # Brownfield-safe default: absence from YAML never deletes a live object.
  deletion_supported: false

# Seeded platform/tenant inventory explicitly audited as non-deleting until a
# collection-role evidence review flips a key to true. Missing keys inherit
# defaults.deletion_supported=false.
exceptions:
  aap_organizations:
    value_type: list
    identity_field: name
    deletion_supported: false
  aap_teams:
    value_type: list
    identity_field: name
    deletion_supported: false
  aap_user_accounts:
    value_type: list
    identity_field: username
    deletion_supported: false
