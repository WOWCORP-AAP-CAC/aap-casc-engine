[defaults]
# Hybrid CasC Engine — Ansible configuration
# This file is shipped with the aap-casc-engine and used by the dispatcher,
# drift detection, and bootstrap playbooks.

# Use the collections path to find infra.aap_configuration
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Role search path
roles_path = ./roles

# Reasonable defaults for AAP CasC operations
stdout_callback = yaml
callback_enabled = timer, profile_tasks
retry_files_enabled = false
host_key_checking = false
gathering = smart
fact_caching = memory

# Increase timeout for API-heavy operations
timeout = 60

[inventory]
# Enable YAML inventory plugin
enable_plugins = yaml, ini

[galaxy]
# Galaxy settings for collection installs
server_list = automation_hub, galaxy

[galaxy_server.automation_hub]
url = https://console.redhat.com/api/automation-hub/content/published/
auth_url = https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token

[galaxy_server.galaxy]
url = https://galaxy.ansible.com/
