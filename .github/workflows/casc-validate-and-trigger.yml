# Production-grade reusable workflow for CasC repositories (v3 — multi-env fan-out)
# Lives at: aap-casc-engine/.github/workflows/casc-validate-and-trigger.yml
#
# Generated caller usage (seeded by genesis/bootstrap via caller_role):
#
#   Control repo (caller_role=control):
#     - Ignores unrelated root YAML (control metadata only; not desired state)
#     secrets:
#       AAP_ENGINE_TOKEN: ${{ secrets.AAP_ENGINE_TOKEN }}
#       AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
#       ENGINE_REPO_TOKEN: ${{ secrets.ENGINE_REPO_TOKEN }}
#       CONTROL_REPO_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
#
#   Platform / tenant desired-state repos (caller_role=platform or tenant):
#     secrets:
#       AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
#       ENGINE_REPO_TOKEN: ${{ secrets.ENGINE_REPO_TOKEN }}
#       CONTROL_REPO_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
#
# NOTE: secrets: inherit only works within the same GitHub organization.
# Cross-org callers MUST pass secrets explicitly.

name: CasC Validate and Trigger

# Least-privilege default for generated callers. Deployment jobs never need write.
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      dispatcher_jt_name:
        description: "Name of the AAP dispatcher Job Template to trigger"
        required: false
        default: "jt-platform-casc_dispatcher"
        type: string
      bootstrap_jt_name:
        description: "Name of the AAP bootstrap Job Template to trigger"
        required: false
        default: "jt-platform-bootstrap_tenant"
        type: string
      poll_timeout_minutes:
        description: "Max minutes to poll for job completion"
        required: false
        default: 30
        type: number
      caller_role:
        description: "Generated caller role: control, platform, or tenant"
        required: false
        default: "tenant"
        type: string
      control_scm_org:
        description: "GitHub org containing the control repository"
        required: false
        type: string
      control_repo:
        description: "Control repository containing config.yml and tenants.yml"
        required: false
        type: string
        default: "casc-platform-control"
      control_branch:
        description: "Authoritative branch for control metadata"
        required: false
        type: string
        default: "main"
      aap_engine_host:
        description: "AAP host for execute-only Genesis/Bootstrap launcher token"
        required: false
        type: string
      operation:
        description: "Optional protected control operation (onboarding_dispatch)"
        required: false
        default: ""
        type: string
      tenant_id:
        description: "Tenant tenant_id required for onboarding_dispatch"
        required: false
        default: ""
        type: string
      control_revision:
        description: "Optional pinned control commit SHA; empty resolves control_branch HEAD"
        required: false
        default: ""
        type: string
    secrets:
      # Engine/orchestration credentials
      AAP_ENGINE_TOKEN:
        required: false
      # Dispatcher credentials: the required token-only runtime model.
      AAP_ENV_TARGETS_JSON:
        required: false
      # Repo access tokens
      ENGINE_REPO_TOKEN:
        required: false
      CONTROL_REPO_TOKEN:
        required: false

jobs:
  validate:
    name: Validate YAML Configs
    runs-on: ubuntu-latest
    outputs:
      tenants_changed: ${{ steps.tenants_check.outputs.tenants_changed }}
      engine_repo: ${{ steps.engine.outputs.repo }}
      control_revision: ${{ steps.control.outputs.control_revision }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect tenants.yml change
        id: tenants_check
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          NULL_SHA="0000000000000000000000000000000000000000"

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "tenants_changed=false" >> "$GITHUB_OUTPUT"
            echo "Non-push event — skipping tenants check"
            exit 0
          fi

          if [ "$AFTER" = "$NULL_SHA" ]; then
            echo "tenants_changed=false" >> "$GITHUB_OUTPUT"
            echo "Branch delete event — no bootstrap"
            exit 0
          fi

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$NULL_SHA" ]; then
            git diff-tree --root --no-commit-id --name-only -r "$AFTER" > /tmp/changed_files
          else
            if ! git diff --name-only "$BEFORE" "$AFTER" > /tmp/changed_files; then
              echo "::error::Could not diff ${BEFORE}..${AFTER}; refusing to silently skip bootstrap"
              exit 1
            fi
          fi

          if grep -Fxq "tenants.yml" /tmp/changed_files; then
            echo "tenants_changed=true" >> "$GITHUB_OUTPUT"
            echo "tenants.yml was modified in this push"
          else
            echo "tenants_changed=false" >> "$GITHUB_OUTPUT"
            echo "tenants.yml was NOT modified in this push"
          fi

      - name: Derive engine repo from workflow context
        id: engine
        run: |
          USES_LINE=$(grep -r 'uses:.*casc-validate-and-trigger' .github/workflows/ 2>/dev/null | head -1)
          if [ -n "$USES_LINE" ]; then
            ENGINE_REPO=$(echo "$USES_LINE" | sed 's|.*uses:[[:space:]]*||' | sed "s/['\"]//g" | sed 's|/.github/.*||')
            echo "Engine repo (from caller workflow): ${ENGINE_REPO}"
          else
            ENGINE_REPO="${{ github.workflow_ref }}"
            ENGINE_REPO="${ENGINE_REPO%%/.github/*}"
            echo "Engine repo (fallback from workflow_ref): ${ENGINE_REPO}"
          fi
          echo "repo=${ENGINE_REPO}" >> $GITHUB_OUTPUT

      - name: Checkout engine repo (schemas + role defaults + CI helpers)
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.engine.outputs.repo }}
          path: .engine
          persist-credentials: false
          sparse-checkout: |
            schemas
            roles/process_casc_config/defaults
            scripts/pipeline
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: Setup schemas directory
        run: |
          mkdir -p .schemas
          [ -f .engine/schemas/resource-types.yml ] && cp .engine/schemas/resource-types.yml .schemas/ || true
          [ -f .engine/schemas/validate_naming.py ] && cp .engine/schemas/validate_naming.py .schemas/ || true
          [ -d .engine/schemas/policies ] && cp -r .engine/schemas/policies .schemas/ || true
          [ -f .engine/roles/process_casc_config/defaults/main.yml ] && cp .engine/roles/process_casc_config/defaults/main.yml .schemas/engine_defaults.yml || true
          mkdir -p .scripts/pipeline
          [ -f .engine/scripts/pipeline/casc_runtime.py ] && cp .engine/scripts/pipeline/casc_runtime.py .scripts/pipeline/ || true
          [ -f .engine/scripts/pipeline/repo_name_overrides.py ] && cp .engine/scripts/pipeline/repo_name_overrides.py .scripts/pipeline/ || true

      - name: Fetch authoritative control metadata
        id: control
        if: ${{ inputs.caller_role == 'control' || inputs.caller_role == 'platform' || inputs.caller_role == 'tenant' }}
        env:
          CONTROL_REPO_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
          REQUESTED_CONTROL_REVISION: ${{ inputs.control_revision }}
        run: |
          if [ ! -f .scripts/pipeline/casc_runtime.py ]; then
            echo "::error::casc_runtime.py unavailable; cannot fetch authoritative control metadata"
            exit 1
          fi
          if [ -z "${CONTROL_REPO_TOKEN}" ] || [ -z "${{ inputs.control_scm_org }}" ]; then
            echo "::error::CONTROL_REPO_TOKEN and control_scm_org are required for authoritative control metadata"
            exit 1
          fi
          if [ -z "${REQUESTED_CONTROL_REVISION}" ] \
             && [ "${{ inputs.caller_role }}" = "control" ] \
             && [ "${{ github.repository }}" = "${{ inputs.control_scm_org }}/${{ inputs.control_repo }}" ] \
             && [ "${{ github.ref_name }}" = "${{ inputs.control_branch }}" ]; then
            REQUESTED_CONTROL_REVISION="${GITHUB_SHA}"
          fi
          python3 .scripts/pipeline/casc_runtime.py ensure-control \
            --provider github \
            --control-scm-org "${{ inputs.control_scm_org }}" \
            --control-repo "${{ inputs.control_repo }}" \
            --control-branch "${{ inputs.control_branch }}" \
            --token "${CONTROL_REPO_TOKEN}" \
            --control-revision "${REQUESTED_CONTROL_REVISION}" \
            --dest-dir .control \
            --github-output "$GITHUB_OUTPUT"
          rm -f .schemas/naming-rules.yml
          if [ -f .control/naming-rules.yml ]; then
            cp .control/naming-rules.yml .schemas/naming-rules.yml
            echo "Using optional naming-rules.yml from control revision"
          else
            echo "Naming policy not active."
          fi
          python3 .scripts/pipeline/casc_runtime.py resolve-jt-names \
            --config .control/config.yml \
            --github-output "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: pip install pyyaml

      - name: Validate YAML structure
        env:
          CASC_CALLER_ROLE: ${{ inputs.caller_role }}
        run: |
          echo "=== CasC YAML Structural Validation ==="
          python3 .scripts/pipeline/casc_runtime.py validate-structure \
            --root . \
            --caller-role "${CASC_CALLER_ROLE}" \
            --resource-types .schemas/resource-types.yml \
            --allowed-keys .schemas/engine_defaults.yml
          python3 .scripts/pipeline/casc_runtime.py validate-deletions \
            --root . \
            --caller-role "${CASC_CALLER_ROLE}" \
            --resource-types .schemas/resource-types.yml

      - name: Validate control files (config.yml / tenants.yml)
        run: |
          python3 -c "
          import yaml, sys, os, re
          errors = []

          ENV_NAME_RE = re.compile(r'^[a-z][a-z0-9_]*$')

          if os.path.exists('config.yml'):
              try:
                  cfg = yaml.safe_load(open('config.yml'))
                  for key in ['env_branch_map', 'scm_provider', 'platform_scm_org', 'platform_repo_pattern']:
                      if key not in cfg:
                          errors.append(f'config.yml: missing required key \"{key}\"')
                  for required in ('control_scm_org', 'control_repo', 'control_branch', 'platform_repo_pattern'):
                      if not isinstance(cfg.get(required), str) or not cfg[required].strip():
                          errors.append(f'config.yml: {required} must be a non-empty string')
                  if 'create_missing_env_branches' in cfg and not isinstance(cfg['create_missing_env_branches'], bool):
                      errors.append('config.yml: create_missing_env_branches must be a boolean')
                  if 'bootstrap_dispatch_fanout' in cfg and not isinstance(cfg['bootstrap_dispatch_fanout'], bool):
                      errors.append('config.yml: bootstrap_dispatch_fanout must be a boolean')
                  if 'env_branch_map' in cfg:
                      ebm = cfg['env_branch_map']
                      if not isinstance(ebm, dict) or not ebm:
                          errors.append('config.yml: env_branch_map must be a non-empty mapping')
                      else:
                          for env, branch in ebm.items():
                              if not isinstance(env, str) or not env.strip():
                                  errors.append('config.yml: env_branch_map contains an empty or non-string key')
                              elif not ENV_NAME_RE.match(env):
                                  errors.append(f'config.yml: env_branch_map key \"{env}\" must match ^[a-z][a-z0-9_]*$')
                              if not isinstance(branch, str) or not branch.strip():
                                  errors.append(f'config.yml: env_branch_map[{env}] must be a non-empty branch string')
                          branches = list(ebm.values())
                          if len(branches) != len(set(branches)):
                              dupes = [b for b in set(branches) if branches.count(b) > 1]
                              errors.append(f'config.yml: env_branch_map branch values must be unique. Duplicates: {dupes}')
              except Exception as e:
                  errors.append(f'config.yml: Failed to parse — {e}')

          if errors:
              print('Control file validation errors:')
              for e in errors: print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('=== CONTROL FILES VALID (or not present) ===')
          "
          python3 .scripts/pipeline/casc_runtime.py validate-registry \
            --config .control/config.yml \
            --tenants .control/tenants.yml > /dev/null

      - name: Validate naming conventions
        run: |
          if [ -f ".schemas/naming-rules.yml" ]; then
            echo "=== Checking naming conventions ==="
            python3 .schemas/validate_naming.py \
              --config-dir . \
              --rules .schemas/naming-rules.yml \
              --resource-types .schemas/resource-types.yml \
              --allowed-keys .schemas/engine_defaults.yml \
              --caller-role "${{ inputs.caller_role }}"
            echo "=== NAMING CONVENTIONS PASSED ==="
          else
            echo "Naming policy not active."
          fi

      - name: Check policy compliance (OPA)
        if: always()
        continue-on-error: true
        run: |
          if [ "${{ inputs.caller_role }}" = "control" ]; then
            echo "Control repo: skipping desired-state OPA resource scan"
          elif [ -d ".schemas/policies" ]; then
            echo "=== Checking OPA policy compliance ==="
            curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x opa

            SCAN_DIRS=""
            for d in $(ls -d */ 2>/dev/null); do
              case "$d" in
                .schemas/|.engine/|.engine-runtime/|.scripts/|.control/|.aap-casc-engine/|.git/|.github/) continue ;;
                *) SCAN_DIRS="$SCAN_DIRS $d" ;;
              esac
            done

            if [ -z "$SCAN_DIRS" ]; then
              echo "No desired-state directories found — OPA resource scan skipped"
            else
              for yml_file in $(find $SCAN_DIRS -name "*.yml" -o -name "*.yaml" 2>/dev/null | grep -v '.sample$'); do
                echo "Policy check: $yml_file"
                python3 -c "import yaml,json,sys; json.dump(yaml.safe_load(open(sys.argv[1])), open('/tmp/opa_input.json','w'))" "$yml_file"
                ./opa eval --data .schemas/policies/ --input /tmp/opa_input.json "data.casc.deny" --format pretty
              done
            fi
            echo "=== OPA POLICY CHECK COMPLETE ==="
          else
            echo "No OPA policies found — skipping."
          fi

  bootstrap:
    name: Bootstrap Tenants (GitOps)
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'push'
      && !contains(github.event.head_commit.message, '[skip dispatch]')
      && inputs.caller_role == 'control'
      && github.repository == format('{0}/{1}', inputs.control_scm_org, inputs.control_repo)
      && github.ref_name == inputs.control_branch
      && needs.validate.outputs.tenants_changed == 'true'
    outputs:
      has_tenants_change: ${{ steps.diff.outputs.has_actions }}
      tenant_ids: ${{ steps.diff.outputs.tenant_ids }}
      dispatch_tenant_ids: ${{ steps.diff.outputs.dispatch_tenant_ids }}
      fanout_tenant_ids: ${{ steps.diff.outputs.fanout_tenant_ids }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout engine lifecycle helpers
        uses: actions/checkout@v5
        with:
          repository: ${{ needs.validate.outputs.engine_repo }}
          path: .engine-runtime
          persist-credentials: false
          sparse-checkout: scripts/pipeline
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Diff tenants and determine actions
        id: diff
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CONTROL_REPO_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
        run: |
          NULL_SHA="0000000000000000000000000000000000000000"
          if [ -z "${BEFORE_SHA}" ] || [ "${BEFORE_SHA}" = "${NULL_SHA}" ]; then
            printf '%s\n' 'tenants: []' > /tmp/previous-tenants.yml
          else
            if ! git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              echo "::error::Previous push commit ${BEFORE_SHA} is unavailable; refusing an unsafe tenant lifecycle diff"
              exit 1
            fi
            if git cat-file -e "${BEFORE_SHA}:tenants.yml" 2>/dev/null; then
              git show "${BEFORE_SHA}:tenants.yml" > /tmp/previous-tenants.yml
            else
              printf '%s\n' 'tenants: []' > /tmp/previous-tenants.yml
            fi
          fi
          if [ -z "${CONTROL_REPO_TOKEN}" ]; then
            echo "::error::CONTROL_REPO_TOKEN is required for tenant lifecycle validation"
            exit 1
          fi
          python3 .engine-runtime/scripts/pipeline/casc_runtime.py diff-tenants \
            --provider github \
            --config config.yml \
            --previous /tmp/previous-tenants.yml \
            --current tenants.yml \
            --scm-token "${CONTROL_REPO_TOKEN}" \
            --output tenant_actions.json > /dev/null

          if [ "$(python3 -c 'import json; print(len(json.load(open("tenant_actions.json"))))')" -gt 0 ]; then
            echo "has_actions=true" >> "$GITHUB_OUTPUT"
            tenant_ids=$(python3 -c 'import json; print(json.dumps([a["tenant"]["tenant_id"] for a in json.load(open("tenant_actions.json"))]))')
            # Brownfield is SCM-only: never include in onboarding fan-out.
            # Greenfield with dispatch_enabled=false still needs platform fan-out
            # so Organization/Team foundation can apply.
            dispatch_tenant_ids=$(python3 -c 'import json; print(json.dumps([a["tenant"]["tenant_id"] for a in json.load(open("tenant_actions.json")) if a["tenant"].get("onboarding_mode", "greenfield") == "greenfield" and a["tenant"].get("dispatch_enabled", True)]))')
            fanout_tenant_ids=$(python3 -c 'import json; print(json.dumps([a["tenant"]["tenant_id"] for a in json.load(open("tenant_actions.json")) if a["tenant"].get("onboarding_mode", "greenfield") == "greenfield"]))')
            echo "tenant_ids=${tenant_ids}" >> "$GITHUB_OUTPUT"
            echo "dispatch_tenant_ids=${dispatch_tenant_ids}" >> "$GITHUB_OUTPUT"
            echo "fanout_tenant_ids=${fanout_tenant_ids}" >> "$GITHUB_OUTPUT"
          else
            echo "has_actions=false" >> "$GITHUB_OUTPUT"
            echo "tenant_ids=[]" >> "$GITHUB_OUTPUT"
            echo "dispatch_tenant_ids=[]" >> "$GITHUB_OUTPUT"
            echo "fanout_tenant_ids=[]" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger bootstrap for each tenant and poll to completion
        if: steps.diff.outputs.has_actions == 'true'
        env:
          AAP_ENGINE_HOST: ${{ inputs.aap_engine_host }}
          AAP_ENGINE_TOKEN: ${{ secrets.AAP_ENGINE_TOKEN }}
          PINNED_CONTROL_REVISION: ${{ needs.validate.outputs.control_revision }}
        run: |
          normalize_aap_host() {
            local raw="$1"
            raw="${raw%/}"
            if [[ "$raw" == http://* || "$raw" == https://* ]]; then
              echo "$raw"
            else
              echo "https://${raw}"
            fi
          }

          # Control launcher uses the dedicated execute-only bearer token.
          if [ -n "$AAP_ENGINE_HOST" ] && [ -n "$AAP_ENGINE_TOKEN" ]; then
            export ENGINE_HOST=$(normalize_aap_host "$AAP_ENGINE_HOST")
            export AUTH_HEADER="Authorization: Bearer ${AAP_ENGINE_TOKEN}"
            echo "Using engine bearer auth: ${ENGINE_HOST}"
          else
            echo "::error::Actionable tenants require aap_engine_host and AAP_ENGINE_TOKEN."
            exit 1
          fi

          if [ -n "$PINNED_CONTROL_REVISION" ]; then
            export CONTROL_REVISION="$PINNED_CONTROL_REVISION"
          else
            export CONTROL_REVISION="${{ github.sha }}"
          fi
          echo "control_revision=${CONTROL_REVISION}"

          JT_NAME="${{ inputs.bootstrap_jt_name }}"
          if [ -f config.yml ]; then
            RESOLVED_JT=$(python3 -c "
          import yaml
          try:
              cfg = yaml.safe_load(open('config.yml')) or {}
              jt = (cfg.get('job_templates') or {}).get('bootstrap')
              if isinstance(jt, str) and jt.strip():
                  print(jt.strip())
          except Exception:
              pass
          ")
            if [ -n "$RESOLVED_JT" ]; then
              JT_NAME="$RESOLVED_JT"
              echo "Using bootstrap JT from config.yml: ${JT_NAME}"
            fi
          fi
          export JT_NAME
          export POLL_TIMEOUT="${BOOTSTRAP_POLL_TIMEOUT_MINUTES:-15}"

          JT_RESPONSE=$(curl -sk -H "$AUTH_HEADER" \
            "${ENGINE_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")
          export JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

          if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
            echo "::error::Bootstrap JT '${JT_NAME}' not found on ${ENGINE_HOST}"
            exit 1
          fi

          python3 <<'BOOTSTRAP_PY'
          import json, subprocess, sys, os, time

          auth_args = ['-H', os.environ['AUTH_HEADER']]

          actions = json.load(open('tenant_actions.json'))
          jt_id = os.environ['JT_ID']
          engine_host = os.environ['ENGINE_HOST']
          control_revision = os.environ.get('CONTROL_REVISION', '')
          poll_timeout = int(os.environ.get('POLL_TIMEOUT', '15'))
          poll_interval = 10
          max_polls = (poll_timeout * 60) // poll_interval

          def build_bootstrap_extra_vars(tenant):
              extra = {
                  'tenant_id': tenant['tenant_id'],
                  'aap_organization': tenant['aap_organization'],
                  'tenant_scm_org': tenant['tenant_scm_org'],
                  'repo_pattern': tenant.get('repo_pattern', 'combined'),
                  'control_revision': control_revision,
              }
              for opt in ('team_name', 'repo_mode', 'onboarding_mode', 'dispatch_enabled', 'repo_name', 'repo_names', 'tenant_scm_namespace_id', 'repo_visibility'):
                  if opt in tenant and tenant[opt] is not None and tenant[opt] != '':
                      extra[opt] = tenant[opt]
              return extra

          for action in actions:
              tenant = action['tenant']
              tenant_id = tenant['tenant_id']
              print(f'Bootstrapping tenant: {tenant_id} ({action["action"]})')

              extra_vars = json.dumps(build_bootstrap_extra_vars(tenant))

              launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'extra_vars': extra_vars}),
                  f'{engine_host}/api/controller/v2/job_templates/{jt_id}/launch/'
              ]
              result = subprocess.run(launch_cmd, capture_output=True, text=True)
              try:
                  response = json.loads(result.stdout)
              except Exception:
                  print(f'  ERROR: Failed to parse launch response: {result.stdout[:500]}')
                  sys.exit(1)

              job_id = response.get('id')
              if not job_id:
                  print(f'  ERROR: Failed to launch bootstrap JT for {tenant_id}: {result.stdout[:500]}')
                  sys.exit(1)

              print(f'  Job launched: ID={job_id}')
              print(f'  Polling for completion (timeout: {poll_timeout}min)...')

              for i in range(1, max_polls + 1):
                  time.sleep(poll_interval)
                  status_cmd = ['curl', '-sk'] + auth_args + [
                      f'{engine_host}/api/controller/v2/jobs/{job_id}/'
                  ]
                  status_result = subprocess.run(status_cmd, capture_output=True, text=True)
                  try:
                      status = json.loads(status_result.stdout).get('status', 'unknown')
                  except Exception:
                      status = 'unknown'
                  print(f'    Status: {status} ({i}/{max_polls})')
                  if status == 'successful':
                      print(f'  Bootstrap JT for {tenant_id} completed successfully.')
                      break
                  elif status in ('failed', 'error', 'canceled'):
                      print(f'  ERROR: Bootstrap JT job {job_id} for tenant {tenant_id} {status}.')
                      sys.exit(1)
              else:
                  print(f'  ERROR: Bootstrap JT job {job_id} for tenant \'{tenant_id}\' did not complete within {poll_timeout} minutes.')
                  sys.exit(1)

          print('All bootstrap JTs completed successfully.')
          BOOTSTRAP_PY

  fanout:
    name: Dispatcher Fan-out
    runs-on: ubuntu-latest
    needs: [validate, bootstrap]
    if: >-
      needs.bootstrap.result == 'success'
      && needs.bootstrap.outputs.has_tenants_change == 'true'
      && needs.bootstrap.outputs.fanout_tenant_ids != '[]'
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml

      - name: Fetch config.yml from control repo if not local
        env:
          FETCH_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
        run: |
          if [ ! -f "config.yml" ]; then
            echo "config.yml not in local checkout; fetching from control repo..."
            curl -sf \
              -H "Authorization: Bearer ${FETCH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.control_scm_org }}/${{ inputs.control_repo }}/contents/config.yml?ref=${{ needs.validate.outputs.control_revision }}" \
              -o config.yml
            if [ ! -f "config.yml" ]; then
              echo "ERROR: Could not fetch config.yml from control repo"
              exit 1
            fi
          fi

      - name: Read config.yml and resolve fan-out
        id: config
        run: |
          python3 -c "
          import yaml, json
          cfg = yaml.safe_load(open('config.yml'))
          fanout = cfg.get('bootstrap_dispatch_fanout', True)
          envs = list(cfg.get('env_branch_map', {}).keys())
          dispatcher_jt = (cfg.get('job_templates') or {}).get('dispatcher') or '${{ inputs.dispatcher_jt_name }}'
          print(f'fanout_enabled={str(fanout).lower()}')
          print(f'environments={json.dumps(envs)}')
          print(f'dispatcher_jt_name={dispatcher_jt}')
          " >> $GITHUB_OUTPUT

      - name: Record pending onboarding when fan-out disabled
        if: steps.config.outputs.fanout_enabled != 'true'
        run: |
          echo "onboarding_dispatch_pending=true" >> "$GITHUB_OUTPUT"
          echo "Fan-out disabled by bootstrap_dispatch_fanout=false."
          echo "Onboarding dispatch remains pending."
          echo "Continue with protected control workflow_dispatch operation=onboarding_dispatch and tenant_id=<tenant_id>."
          echo "Normal trigger dispatch is suppressed for this control-repo event."

      - name: Resolve credentials and trigger dispatcher per environment
        if: steps.config.outputs.fanout_enabled == 'true'
        env:
          AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
          ENVIRONMENTS: ${{ steps.config.outputs.environments }}
          ONBOARDING_TENANTS: ${{ needs.bootstrap.outputs.dispatch_tenant_ids }}
          DISPATCHER_JT_NAME: ${{ steps.config.outputs.dispatcher_jt_name }}
          POLL_TIMEOUT: ${{ inputs.poll_timeout_minutes }}
          CONTROL_REVISION: ${{ needs.validate.outputs.control_revision }}
        run: |
          python3 <<'FANOUT_PY'
          import os, json, sys, subprocess, time, urllib.parse

          def normalize_host(raw):
              raw = raw.rstrip('/')
              if raw.startswith('http://') or raw.startswith('https://'):
                  return raw
              return f'https://{raw}'

          def resolve_env_creds(env_key):
              """Resolve the required bearer token for one configured environment."""
              targets = os.environ.get('AAP_ENV_TARGETS_JSON', '')
              try:
                  entry = json.loads(targets).get(env_key, {})
              except json.JSONDecodeError:
                  raise ValueError('AAP_ENV_TARGETS_JSON must be valid JSON')
              if entry.get('username') or entry.get('password'):
                  raise ValueError('username/password credentials are rejected; bearer token only')
              if entry.get('host') and entry.get('token'):
                  print(f"::add-mask::{entry['token']}")
                  return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
              return None

          def wait_for_terminal(host, auth_args, job_id, timeout_minutes):
              checks = max(1, timeout_minutes * 6)
              for _ in range(checks):
                  time.sleep(10)
                  result = subprocess.run(['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/{job_id}/'], capture_output=True, text=True)
                  try:
                      status = json.loads(result.stdout).get('status', 'unknown')
                  except json.JSONDecodeError:
                      status = 'unknown'
                  if status == 'successful':
                      return
                  if status in ('failed', 'error', 'canceled'):
                      raise RuntimeError(f'Dispatcher job {job_id} ended {status}')
              raise RuntimeError(f'Dispatcher job {job_id} did not complete within {timeout_minutes} minutes')

          environments = json.loads(os.environ.get('ENVIRONMENTS', '[]'))
          onboarding_tenants = json.loads(os.environ.get('ONBOARDING_TENANTS', '[]'))
          jt_name = os.environ.get('DISPATCHER_JT_NAME', 'jt-platform-casc_dispatcher')
          poll_timeout = int(os.environ.get('POLL_TIMEOUT', '30'))

          if not environments:
              print('No environments in env_branch_map — nothing to fan-out.')
              sys.exit(0)

          # Phase 1: Resolve all credentials BEFORE launching anything
          resolved = {}
          errors = []
          for env in environments:
              try:
                  result = resolve_env_creds(env)
              except ValueError as exc:
                  errors.append(f'ERROR: {exc}')
                  continue
              if result is None:
                  errors.append(f"ERROR: bootstrap_dispatch_fanout=true but no dispatcher credentials were found for env '{env}'.")
              else:
                  resolved[env] = result

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)

          print(f'Credentials resolved for all {len(environments)} environments. Dispatching bounded onboarding scopes sequentially...')

          # Phase 2: Trigger dispatcher per environment
          for env in environments:
              host, auth_args = resolved[env]
              print(f'\n=== Dispatching env={env} on {host} ===')

              # Look up JT
              jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
              jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
              try:
                  jt_data = json.loads(jt_result.stdout)
                  jt_id = jt_data['results'][0]['id']
              except (json.JSONDecodeError, KeyError, IndexError):
                  print(f"ERROR: JT '{jt_name}' not found on {host}")
                  sys.exit(1)

              # Check allow_simultaneous
              allow_simul = jt_data['results'][0].get('allow_simultaneous', False)
              if allow_simul:
                  print(f'ERROR: Dispatcher JT has allow_simultaneous=true — must be false')
                  sys.exit(1)

              # Onboarding is deliberately bounded: platform first, then only
              # tenants changed in this control-repo push. No full reconciliation.
              for scope, tenant_id in [('platform', '')] + [('tenant', oid) for oid in onboarding_tenants]:
                  if scope == 'full':
                      raise RuntimeError('Refusing full scope during bounded onboarding')
                  extra_vars = json.dumps({
                      'target_env': env,
                      'dispatch_scope': scope,
                      'tenant_id': tenant_id,
                      'control_revision': os.environ.get('CONTROL_REVISION', ''),
                      'trigger_commit': os.environ.get('GITHUB_SHA', ''),
                      'trigger_source': 'bootstrap-onboarding',
                  })
                  launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
                      '-H', 'Content-Type: application/json',
                      '-d', json.dumps({'extra_vars': extra_vars}),
                      f'{host}/api/controller/v2/job_templates/{jt_id}/launch/'
                  ]
                  launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
                  try:
                      job_id = json.loads(launch_result.stdout).get('id')
                  except Exception:
                      job_id = None
                  if not job_id:
                      print(f'ERROR: Failed to launch dispatcher for env={env}, scope={scope}')
                      sys.exit(1)
                  print(f'  Dispatcher launched: job_id={job_id} for env={env}, scope={scope}, tenant={tenant_id or "-"}')
                  wait_for_terminal(host, auth_args, job_id, poll_timeout)
          print('\n=== Fan-out complete ===')
          FANOUT_PY

  onboarding_dispatch:
    name: Protected Onboarding Dispatch
    needs: [validate]
    if: >-
      always()
      && needs.validate.result == 'success'
      && inputs.caller_role == 'control'
      && inputs.operation == 'onboarding_dispatch'
      && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml
      - name: Derive engine repo from reusable workflow ref
        id: engine
        run: |
          ENGINE_REPO="${{ github.workflow_ref }}"
          ENGINE_REPO="${ENGINE_REPO%%/.github/*}"
          echo "repo=${ENGINE_REPO}" >> "$GITHUB_OUTPUT"
      - name: Checkout engine CI helpers
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.engine.outputs.repo }}
          path: .engine
          persist-credentials: false
          sparse-checkout: |
            scripts/pipeline
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}
      - name: Run protected bounded onboarding continuation
        env:
          AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
          CONTROL_REPO_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
        run: |
          HELPER=".engine/scripts/pipeline/casc_runtime.py"
          if [ ! -f "$HELPER" ]; then
            echo "ERROR: casc_runtime.py missing from engine checkout"
            exit 1
          fi
          if [ -z "${{ inputs.tenant_id }}" ]; then
            echo "ERROR: tenant_id is required for onboarding_dispatch"
            exit 1
          fi
          python3 "$HELPER" onboarding-dispatch \
            --provider github \
            --operation "${{ inputs.operation }}" \
            --caller-role "${{ inputs.caller_role }}" \
            --repository "${{ github.repository }}" \
            --ref-name "${{ github.ref_name }}" \
            --control-scm-org "${{ inputs.control_scm_org }}" \
            --control-repo "${{ inputs.control_repo }}" \
            --control-branch "${{ inputs.control_branch }}" \
            --control-token "${CONTROL_REPO_TOKEN}" \
            --tenant-id "${{ inputs.tenant_id }}" \
            --control-revision "${{ needs.validate.outputs.control_revision }}" \
            --poll-timeout "${{ inputs.poll_timeout_minutes }}"

  trigger:
    name: Trigger Dispatcher
    needs: [validate, bootstrap, fanout]
    if: >-
      always()
      && needs.validate.result == 'success'
      && inputs.caller_role != 'control'
      && inputs.operation != 'onboarding_dispatch'
      && (needs.bootstrap.result == 'skipped'
          || (needs.bootstrap.result == 'success' && needs.bootstrap.outputs.has_tenants_change != 'true'))
      && needs.fanout.result != 'success'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.event_name != 'pull_request'
      && !(github.event_name == 'push' && contains(github.event.head_commit.message, '[skip dispatch]'))
    runs-on: ubuntu-latest
    concurrency:
      group: casc-dispatcher-trigger
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml

      - name: Fetch authoritative control metadata and resolve target environment
        id: resolve
        env:
          FETCH_TOKEN: ${{ secrets.CONTROL_REPO_TOKEN }}
        run: |
          python3 <<'PY'
          import os, sys, yaml, json, urllib.request
          org = "${{ inputs.control_scm_org }}"
          repo = "${{ inputs.control_repo }}"
          branch = "${{ inputs.control_branch }}"
          pinned = "${{ needs.validate.outputs.control_revision }}".strip()
          token = os.environ.get("FETCH_TOKEN", "")
          if not token:
              print("ERROR: CONTROL_REPO_TOKEN is required")
              sys.exit(1)
          def gh(url, accept="application/vnd.github+json"):
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": accept,
                  "User-Agent": "aap-casc-engine",
              })
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return resp.read()
          if pinned:
              control_revision = pinned
          else:
              payload = json.loads(gh(f"https://api.github.com/repos/{org}/{repo}/commits/{branch}").decode())
              control_revision = payload["sha"]
          cfg_bytes = gh(
              f"https://api.github.com/repos/{org}/{repo}/contents/config.yml?ref={control_revision}",
              accept="application/vnd.github.v3.raw",
          )
          open("config.yml", "wb").write(cfg_bytes)
          cfg = yaml.safe_load(open("config.yml")) or {}
          env_map = cfg.get("env_branch_map", {})
          branch_name = os.environ.get("GITHUB_REF_NAME", "")
          matching = [env for env, br in env_map.items() if br == branch_name]
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"control_revision={control_revision}\n")
              if not matching:
                  print(f"No env_branch_map entry maps branch {branch_name}. Skipping dispatch.", file=sys.stderr)
                  out.write("target_env=\n")
              else:
                  out.write(f"target_env={matching[0]}\n")
              jt = (cfg.get("job_templates") or {}).get("dispatcher") or "${{ inputs.dispatcher_jt_name }}"
              out.write(f"dispatcher_jt_name={jt}\n")
          print(f"control_revision={control_revision}")
          PY

      - name: Trigger AAP dispatcher
        if: steps.resolve.outputs.target_env != ''
        env:
          AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
          TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
          JT_NAME: ${{ steps.resolve.outputs.dispatcher_jt_name || inputs.dispatcher_jt_name }}
          POLL_TIMEOUT: ${{ inputs.poll_timeout_minutes }}
          CONTROL_REVISION: ${{ steps.resolve.outputs.control_revision }}
          CALLER_ROLE: ${{ inputs.caller_role }}
        run: |
          python3 <<'TRIGGER_PY'
          import os, json, sys, subprocess, time

          def normalize_host(raw):
              raw = raw.rstrip('/')
              if raw.startswith('http://') or raw.startswith('https://'):
                  return raw
              return f'https://{raw}'

          def resolve_env_creds(env_key):
              targets = os.environ.get('AAP_ENV_TARGETS_JSON', '')
              try:
                  entry = json.loads(targets).get(env_key, {})
              except json.JSONDecodeError:
                  raise ValueError('AAP_ENV_TARGETS_JSON must be valid JSON')
              if entry.get('username') or entry.get('password'):
                  raise ValueError('username/password credentials are rejected; bearer token only')
              if entry.get('host') and entry.get('token'):
                  print(f"::add-mask::{entry['token']}")
                  return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
              return None

          target_env = os.environ['TARGET_ENV']
          jt_name = os.environ.get('JT_NAME', 'jt-platform-casc_dispatcher')
          poll_timeout = int(os.environ.get('POLL_TIMEOUT', '30'))
          caller_role = os.environ.get('CALLER_ROLE', 'tenant')
          control_revision = os.environ.get('CONTROL_REVISION', '')

          try:
              creds = resolve_env_creds(target_env)
          except ValueError as exc:
              print(f'ERROR: {exc}')
              sys.exit(1)
          if creds is None:
              print(f'ERROR: No credentials found for env={target_env}')
              sys.exit(1)
          host, auth_args = creds

          print(f'=== Triggering CasC Dispatcher on {host} | Env: {target_env} | JT: {jt_name} ===')

          jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
          jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
          try:
              jt_data = json.loads(jt_result.stdout)
              jt_id = jt_data['results'][0]['id']
          except (json.JSONDecodeError, KeyError, IndexError):
              print(f"ERROR: JT '{jt_name}' not found on {host}")
              sys.exit(1)

          allow_simul = jt_data['results'][0].get('allow_simultaneous', False)
          if allow_simul:
              print('ERROR: Dispatcher JT has allow_simultaneous=true — must be false')
              sys.exit(1)

          dispatch_scope = 'platform' if caller_role == 'platform' else 'tenant'
          if dispatch_scope == 'full':
              print('ERROR: normal trigger cannot launch full scope')
              sys.exit(1)
          extra_vars = {
              'target_env': target_env,
              'dispatch_scope': dispatch_scope,
              'trigger_commit': os.environ.get('GITHUB_SHA', ''),
              'triggered_repo': os.environ.get('GITHUB_REPOSITORY', ''),
              'control_revision': control_revision,
              'trigger_source': 'ci-cd-pipeline',
          }

          launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
              '-H', 'Content-Type: application/json',
              '-d', json.dumps({'extra_vars': json.dumps(extra_vars)}),
              f'{host}/api/controller/v2/job_templates/{jt_id}/launch/'
          ]
          launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
          try:
              job_id = json.loads(launch_result.stdout).get('id')
          except Exception:
              job_id = None

          if not job_id:
              print('ERROR: Failed to launch dispatcher')
              sys.exit(1)

          print(f'Dispatcher launched: ID={job_id}')

          # Serialized baseline requires authoritative completion polling.
          poll_checks = (poll_timeout * 60) // 10
          print(f'Polling for completion (timeout: {poll_timeout} min)...')
          for i in range(1, poll_checks + 1):
              time.sleep(10)
              status_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/{job_id}/']
              status_result = subprocess.run(status_cmd, capture_output=True, text=True)
              try:
                  status = json.loads(status_result.stdout).get('status', 'unknown')
              except Exception:
                  status = 'unknown'
              print(f'  Status: {status} ({i}/{poll_checks})')
              if status == 'successful':
                  print('=== COMPLETED ===')
                  sys.exit(0)
              elif status in ('failed', 'error', 'canceled'):
                  print(f'=== FAILED ({status}) ===')
                  sys.exit(1)

          print(f'ERROR: Job {job_id} still running after {poll_timeout} min')
          sys.exit(1)
          TRIGGER_PY
