# Production-grade reusable workflow for CasC tenant repositories
# Lives at: aap-casc-engine/.github/workflows/casc-validate-and-trigger.yml
#
# Tenant repo usage (.github/workflows/casc.yml):
#   name: CasC Pipeline
#   on:
#     push:
#     pull_request:
#       branches: [main]
#   jobs:
#     casc:
#       uses: <org>/aap-casc-engine/.github/workflows/casc-validate-and-trigger.yml@main
#       with:
#         dispatcher_jt_name: jt-platform-casc-dispatcher
#       secrets: inherit
#
# Supports two authentication modes:
#   1. Bearer token (production) — per-environment secrets: AAP_DEV_HOST/TOKEN, etc.
#   2. Basic auth (demo/sandbox) — single-host secrets: AAP_HOST, AAP_USERNAME, AAP_PASSWORD
#
# IMPORTANT: AAP_HOST/AAP_USERNAME/AAP_PASSWORD here are CI/CD platform secrets
# (GitHub Actions org/repo secrets) used by the trigger stage curl commands.
# They are NOT the same as CONTROLLER_HOST/CONTROLLER_USERNAME/CONTROLLER_PASSWORD
# injected by AAP credential types into Job Templates at runtime.
#
# ENGINE_REPO_TOKEN: Required when the engine repo is private and in a different
# org from the calling repo. Set as an org secret in each tenant GitHub org.
# Falls back to github.token for public or same-org engine repos.

name: CasC Validate and Trigger

on:
  workflow_call:
    inputs:
      dispatcher_jt_name:
        description: "Name of the AAP dispatcher Job Template to trigger"
        required: false
        default: "jt-platform-casc-dispatcher"
        type: string
    secrets:
      # Production — per-environment Bearer token auth
      AAP_DEV_HOST:
        required: false
      AAP_DEV_TOKEN:
        required: false
      AAP_TST_HOST:
        required: false
      AAP_TST_TOKEN:
        required: false
      AAP_NPR_HOST:
        required: false
      AAP_NPR_TOKEN:
        required: false
      AAP_PRD_HOST:
        required: false
      AAP_PRD_TOKEN:
        required: false
      # Basic auth fallback — demo/sandbox single-host mode
      AAP_HOST:
        required: false
      AAP_USERNAME:
        required: false
      AAP_PASSWORD:
        required: false
      # Private engine repo access
      ENGINE_REPO_TOKEN:
        required: false

jobs:
  validate:
    name: Validate JSON Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tenant repo
        uses: actions/checkout@v4

      - name: Derive engine repo from workflow context
        id: engine
        run: |
          # github.workflow_ref = "owner/repo/.github/workflows/file.yml@refs/heads/branch"
          ENGINE_REPO="${{ github.workflow_ref }}"
          ENGINE_REPO="${ENGINE_REPO%%/.github/*}"
          echo "repo=${ENGINE_REPO}" >> $GITHUB_OUTPUT
          echo "Engine repo: ${ENGINE_REPO}"

      - name: Checkout engine repo (schemas)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.engine.outputs.repo }}
          path: .engine
          sparse-checkout: schemas
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: Setup schemas directory
        run: |
          mkdir -p .schemas
          cp .engine/schemas/*.schema.json .schemas/ 2>/dev/null || true
          [ -f .engine/schemas/validate_naming.py ] && cp .engine/schemas/validate_naming.py .schemas/
          [ -f .engine/schemas/naming-rules.yml ] && cp .engine/schemas/naming-rules.yml .schemas/
          [ -d .engine/schemas/policies ] && cp -r .engine/schemas/policies .schemas/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: pip install check-jsonschema pyyaml

      - name: Validate JSON schemas
        run: |
          echo "=== CasC JSON Validation Pipeline ==="
          ERRORS=0
          for json_file in $(find . -name "*.json" -not -path "./.schemas/*" -not -path "./.engine/*" -not -path "./.git/*"); do
            key_count=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1])).keys()))" "$json_file" 2>/dev/null)
            if [ "$key_count" != "1" ]; then
              echo "ERROR: $json_file has $key_count top-level keys (expected exactly 1)"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            resource_type=$(python3 -c "import json,sys; print(list(json.load(open(sys.argv[1])).keys())[0])" "$json_file" 2>/dev/null)
            if [ -z "$resource_type" ]; then
              echo "ERROR: Could not extract resource type from $json_file"
              ERRORS=$((ERRORS + 1))
              continue
            fi
            schema_file=".schemas/${resource_type}.schema.json"
            if [ -f "$schema_file" ]; then
              echo "Validating: $json_file against $schema_file (resource: ${resource_type})"
              if ! check-jsonschema --schemafile "$schema_file" "$json_file"; then
                ERRORS=$((ERRORS + 1))
              fi
            else
              echo "ERROR: No schema found for resource type '${resource_type}' (expected: $schema_file)"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo ""
          if [ "$ERRORS" -gt 0 ]; then
            echo "=== VALIDATION FAILED: $ERRORS error(s) ==="
            exit 1
          else
            echo "=== ALL JSON FILES PASSED SCHEMA VALIDATION ==="
          fi

      - name: Validate naming conventions
        run: |
          if [ -f ".schemas/validate_naming.py" ] && [ -f ".schemas/naming-rules.yml" ]; then
            echo "=== Checking naming conventions ==="
            python3 .schemas/validate_naming.py --config-dir . --rules .schemas/naming-rules.yml
            echo "=== NAMING CONVENTIONS PASSED ==="
          else
            echo "No naming validation scripts found — skipping."
          fi

      - name: Check policy compliance (OPA)
        if: always()
        continue-on-error: true
        run: |
          if [ -d ".schemas/policies" ]; then
            echo "=== Checking OPA policy compliance ==="
            curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x opa
            for json_file in $(find . -name "*.json" -not -path "./.schemas/*" -not -path "./.engine/*" -not -path "./.git/*"); do
              echo "Policy check: $json_file"
              ./opa eval --data .schemas/policies/ --input "$json_file" "data.casc.deny" --format pretty
            done
            echo "=== OPA POLICY CHECK COMPLETE ==="
          else
            echo "No OPA policies found — skipping."
          fi

  trigger:
    name: Trigger Dispatcher
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Determine auth mode and target environment
        id: auth
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          # Check for per-environment Bearer token auth (production mode)
          case "$BRANCH" in
            feature/*)   ENV="dev"; HOST="${{ secrets.AAP_DEV_HOST }}"; TOKEN="${{ secrets.AAP_DEV_TOKEN }}" ;;
            develop)     ENV="tst"; HOST="${{ secrets.AAP_TST_HOST }}"; TOKEN="${{ secrets.AAP_TST_TOKEN }}" ;;
            release/*)   ENV="npr"; HOST="${{ secrets.AAP_NPR_HOST }}"; TOKEN="${{ secrets.AAP_NPR_TOKEN }}" ;;
            main|master) ENV="prd"; HOST="${{ secrets.AAP_PRD_HOST }}"; TOKEN="${{ secrets.AAP_PRD_TOKEN }}" ;;
            *)           ENV="dev"; HOST="${{ secrets.AAP_DEV_HOST }}"; TOKEN="${{ secrets.AAP_DEV_TOKEN }}" ;;
          esac

          if [ -n "$HOST" ] && [ -n "$TOKEN" ]; then
            echo "auth_mode=bearer" >> $GITHUB_OUTPUT
            echo "aap_host=${HOST}" >> $GITHUB_OUTPUT
            echo "target_env=${ENV}" >> $GITHUB_OUTPUT
            echo "auth_header=Authorization: Bearer ${TOKEN}" >> $GITHUB_OUTPUT
            echo "Using Bearer token auth for environment: ${ENV}"
          elif [ -n "${{ secrets.AAP_HOST }}" ] && [ -n "${{ secrets.AAP_USERNAME }}" ] && [ -n "${{ secrets.AAP_PASSWORD }}" ]; then
            echo "auth_mode=basic" >> $GITHUB_OUTPUT
            echo "aap_host=${{ secrets.AAP_HOST }}" >> $GITHUB_OUTPUT
            echo "target_env=${ENV}" >> $GITHUB_OUTPUT
            echo "Using basic auth (demo/sandbox mode) for environment: ${ENV}"
          else
            echo "auth_mode=skip" >> $GITHUB_OUTPUT
            echo "No AAP credentials configured — skipping trigger (validate-only mode)"
          fi

      - name: Trigger AAP dispatcher
        if: steps.auth.outputs.auth_mode != 'skip'
        run: |
          AAP_HOST="${{ steps.auth.outputs.aap_host }}"
          AUTH_MODE="${{ steps.auth.outputs.auth_mode }}"
          TARGET_ENV="${{ steps.auth.outputs.target_env }}"
          JT_NAME="${{ inputs.dispatcher_jt_name }}"

          echo "=== Triggering CasC Dispatcher on AAP ==="
          echo "Host: ${AAP_HOST}"
          echo "Environment: ${TARGET_ENV}"
          echo "Job Template: ${JT_NAME}"
          echo "Auth mode: ${AUTH_MODE}"

          # Build auth arguments for curl
          if [ "$AUTH_MODE" = "bearer" ]; then
            AUTH_ARGS=(-H "${{ steps.auth.outputs.auth_header }}")
          else
            AUTH_ARGS=(-u "${{ secrets.AAP_USERNAME }}:${{ secrets.AAP_PASSWORD }}")
          fi

          # Resolve JT ID by name
          echo "Looking up Job Template: ${JT_NAME}"
          JT_RESPONSE=$(curl -sk "${AUTH_ARGS[@]}" \
            "https://${AAP_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")

          JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

          if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
            echo "ERROR: Job Template '${JT_NAME}' not found on ${AAP_HOST}"
            echo "Response: $JT_RESPONSE"
            exit 1
          fi
          echo "Found JT ID: ${JT_ID}"

          # Launch the dispatcher with trigger metadata
          echo "Launching dispatcher..."
          LAUNCH_RESPONSE=$(curl -sk -X POST "${AUTH_ARGS[@]}" \
            -H "Content-Type: application/json" \
            -d "{
              \"extra_vars\": {
                \"target_env\": \"${TARGET_ENV}\",
                \"trigger_commit\": \"${GITHUB_SHA}\",
                \"triggered_repo\": \"${GITHUB_REPOSITORY##*/}\",
                \"trigger_source\": \"ci-cd-pipeline\"
              }
            }" \
            "https://${AAP_HOST}/api/controller/v2/job_templates/${JT_ID}/launch/")

          JOB_ID=$(echo "$LAUNCH_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id', 'UNKNOWN'))")
          echo "Dispatcher job launched: ID=${JOB_ID}"
          echo "AAP UI: https://${AAP_HOST}/#/jobs/playbook/${JOB_ID}/output"

          if [ "$JOB_ID" = "UNKNOWN" ] || [ -z "$JOB_ID" ]; then
            echo "ERROR: Failed to launch dispatcher"
            echo "Response: $LAUNCH_RESPONSE"
            exit 1
          fi

          # Poll for job completion
          echo "Waiting for job to complete..."
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(curl -sk "${AUTH_ARGS[@]}" \
              "https://${AAP_HOST}/api/controller/v2/jobs/${JOB_ID}/" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status', 'unknown'))")
            echo "  Status: ${STATUS} (check ${i}/60)"
            case "$STATUS" in
              successful) echo "=== DISPATCHER COMPLETED SUCCESSFULLY ===" && exit 0 ;;
              failed|error|canceled) echo "=== DISPATCHER FAILED (status: ${STATUS}) ===" && exit 1 ;;
            esac
          done
          echo "=== TIMEOUT: Job still running after 10 minutes ==="
          exit 1
