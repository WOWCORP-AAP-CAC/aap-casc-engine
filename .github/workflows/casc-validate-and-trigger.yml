# Production-grade reusable workflow for CasC repositories (v2 — YAML)
# Lives at: aap-casc-engine/.github/workflows/casc-validate-and-trigger.yml
#
# Tenant/platform repo usage (.github/workflows/casc.yml):
#   name: CasC Pipeline
#   on:
#     push:
#     pull_request:
#       branches: [main]
#     workflow_dispatch:
#   jobs:
#     casc:
#       uses: <org>/aap-casc-engine/.github/workflows/casc-validate-and-trigger.yml@main
#       with:
#         dispatcher_jt_name: jt-platform-casc_dispatcher
#       secrets:
#         AAP_HOST: ${{ secrets.AAP_HOST }}
#         AAP_USERNAME: ${{ secrets.AAP_USERNAME }}
#         AAP_PASSWORD: ${{ secrets.AAP_PASSWORD }}
#         ENGINE_REPO_TOKEN: ${{ secrets.ENGINE_REPO_TOKEN }}
#
# NOTE: secrets: inherit only works within the same GitHub organization.
# Cross-org callers MUST pass secrets explicitly as shown above.

name: CasC Validate and Trigger

on:
  workflow_call:
    inputs:
      dispatcher_jt_name:
        description: "Name of the AAP dispatcher Job Template to trigger"
        required: false
        default: "jt-platform-casc_dispatcher"
        type: string
      bootstrap_jt_name:
        description: "Name of the AAP bootstrap Job Template to trigger"
        required: false
        default: "jt-platform-bootstrap_tenant"
        type: string
      wait_for_completion:
        description: "Wait for dispatcher to finish (false = fire-and-forget)"
        required: false
        default: true
        type: boolean
      poll_timeout_minutes:
        description: "Max minutes to poll for job completion"
        required: false
        default: 30
        type: number
    secrets:
      AAP_DEV_HOST:
        required: false
      AAP_DEV_TOKEN:
        required: false
      AAP_TST_HOST:
        required: false
      AAP_TST_TOKEN:
        required: false
      AAP_NPR_HOST:
        required: false
      AAP_NPR_TOKEN:
        required: false
      AAP_PRD_HOST:
        required: false
      AAP_PRD_TOKEN:
        required: false
      AAP_HOST:
        required: false
      AAP_USERNAME:
        required: false
      AAP_PASSWORD:
        required: false
      ENGINE_REPO_TOKEN:
        required: false

jobs:
  validate:
    name: Validate YAML Configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Derive engine repo from workflow context
        id: engine
        run: |
          USES_LINE=$(grep -r 'uses:.*casc-validate-and-trigger' .github/workflows/ 2>/dev/null | head -1)
          if [ -n "$USES_LINE" ]; then
            ENGINE_REPO=$(echo "$USES_LINE" | sed 's|.*uses:[[:space:]]*||' | sed "s/['\"]//g" | sed 's|/.github/.*||')
            echo "Engine repo (from caller workflow): ${ENGINE_REPO}"
          else
            ENGINE_REPO="${{ github.workflow_ref }}"
            ENGINE_REPO="${ENGINE_REPO%%/.github/*}"
            echo "Engine repo (fallback from workflow_ref): ${ENGINE_REPO}"
          fi
          echo "repo=${ENGINE_REPO}" >> $GITHUB_OUTPUT

      - name: Checkout engine repo (schemas + role defaults)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.engine.outputs.repo }}
          path: .engine
          sparse-checkout: |
            schemas
            roles/process_casc_config/defaults
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: Setup schemas directory
        run: |
          mkdir -p .schemas
          [ -f .engine/schemas/resource-types.yml ] && cp .engine/schemas/resource-types.yml .schemas/ || true
          [ -f .engine/schemas/validate_naming.py ] && cp .engine/schemas/validate_naming.py .schemas/ || true
          [ -f .engine/schemas/naming-rules.yml ] && cp .engine/schemas/naming-rules.yml .schemas/ || true
          [ -d .engine/schemas/policies ] && cp -r .engine/schemas/policies .schemas/ || true
          [ -f .engine/roles/process_casc_config/defaults/main.yml ] && cp .engine/roles/process_casc_config/defaults/main.yml .schemas/engine_defaults.yml || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: pip install pyyaml

      - name: Validate YAML structure
        run: |
          echo "=== CasC YAML Structural Validation ==="
          python3 -c "
          import yaml, sys, os, glob

          resource_types = yaml.safe_load(open('.schemas/resource-types.yml')) if os.path.exists('.schemas/resource-types.yml') else {'defaults': {'value_type': 'list', 'identity_field': 'name'}, 'exceptions': {}}
          defaults = resource_types.get('defaults', {})
          exceptions = resource_types.get('exceptions', {})

          allowed_keys = None
          for aks in ['.schemas/engine_defaults.yml', os.path.join('.engine', 'roles', 'process_casc_config', 'defaults', 'main.yml')]:
              if os.path.exists(aks):
                  ak = yaml.safe_load(open(aks))
                  allowed_keys = set(ak.get('casc_allowed_resource_keys', []))
                  break

          skip_files = {'config.yml', 'tenants.yml'}
          skip_dirs = {'.schemas', '.engine', '.git', '.github'}
          errors = []

          for search_dir in ['base'] + [d for d in os.listdir('.') if os.path.isdir(d) and d not in skip_dirs and d != 'base']:
              if not os.path.isdir(search_dir):
                  continue
              for root, _, files in os.walk(search_dir):
                  for fname in files:
                      if not fname.endswith(('.yml', '.yaml')):
                          continue
                      if fname.endswith('.sample'):
                          continue
                      fpath = os.path.join(root, fname)
                      try:
                          data = yaml.safe_load(open(fpath))
                      except Exception as e:
                          errors.append(f'{fpath}: Failed to parse YAML — {e}')
                          continue
                      if not isinstance(data, dict):
                          errors.append(f'{fpath}: Expected a mapping, got {type(data).__name__}')
                          continue
                      keys = list(data.keys())
                      if len(keys) != 1:
                          errors.append(f'{fpath}: Expected exactly 1 top-level key, got {len(keys)}: {keys}')
                          continue
                      key = keys[0]
                      if allowed_keys and key not in allowed_keys:
                          errors.append(f'{fpath}: Unknown resource key \"{key}\" (not in casc_allowed_resource_keys)')
                          continue
                      exc = exceptions.get(key, {})
                      vtype = exc.get('value_type', defaults.get('value_type', 'list'))
                      id_field = exc.get('identity_field', defaults.get('identity_field', 'name'))
                      value = data[key]
                      if vtype == 'list':
                          if not isinstance(value, list):
                              errors.append(f'{fpath}: Key \"{key}\" expected list, got {type(value).__name__}')
                              continue
                          for i, item in enumerate(value):
                              if isinstance(item, dict) and id_field not in item:
                                  errors.append(f'{fpath}: Item {i} in \"{key}\" missing identity field \"{id_field}\"')
          if errors:
              print('Structural validation errors:')
              for e in errors:
                  print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('=== ALL YAML FILES PASSED STRUCTURAL VALIDATION ===')
          "

      - name: Validate control files (config.yml / tenants.yml)
        run: |
          python3 -c "
          import yaml, sys, os
          errors = []

          if os.path.exists('config.yml'):
              try:
                  cfg = yaml.safe_load(open('config.yml'))
                  for key in ['env_branch_map', 'scm_provider', 'platform_scm_org', 'repo_pattern']:
                      if key not in cfg:
                          errors.append(f'config.yml: missing required key \"{key}\"')
              except Exception as e:
                  errors.append(f'config.yml: Failed to parse — {e}')

          if os.path.exists('tenants.yml'):
              try:
                  t = yaml.safe_load(open('tenants.yml'))
                  tenants = t.get('tenants', [])
                  if not isinstance(tenants, list):
                      errors.append('tenants.yml: \"tenants\" must be a list')
                  else:
                      for i, entry in enumerate(tenants):
                          for req in ['org_id', 'team_name', 'team_lead', 'tenant_scm_org']:
                              if req not in entry:
                                  errors.append(f'tenants.yml: tenant {i} missing required field \"{req}\"')
                          if 'status' in entry and entry['status'] not in ('active', 'inactive'):
                              errors.append(f'tenants.yml: tenant {i} has invalid status \"{entry[\"status\"]}\"')
              except Exception as e:
                  errors.append(f'tenants.yml: Failed to parse — {e}')

          if errors:
              print('Control file validation errors:')
              for e in errors: print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('=== CONTROL FILES VALID (or not present) ===')
          "

      - name: Validate naming conventions
        run: |
          if [ -f ".schemas/validate_naming.py" ] && [ -f ".schemas/naming-rules.yml" ]; then
            echo "=== Checking naming conventions ==="
            python3 .schemas/validate_naming.py --config-dir . --rules .schemas/naming-rules.yml
            echo "=== NAMING CONVENTIONS PASSED ==="
          else
            echo "No naming validation scripts found — skipping."
          fi

      - name: Check policy compliance (OPA)
        if: always()
        continue-on-error: true
        run: |
          if [ -d ".schemas/policies" ]; then
            echo "=== Checking OPA policy compliance ==="
            curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x opa

            SCAN_DIRS=""
            for d in $(ls -d */ 2>/dev/null); do
              case "$d" in
                .schemas/|.engine/|.git/|.github/) continue ;;
                *) SCAN_DIRS="$SCAN_DIRS $d" ;;
              esac
            done

            for yml_file in $(find $SCAN_DIRS -name "*.yml" -o -name "*.yaml" 2>/dev/null | grep -v '.sample$'); do
              echo "Policy check: $yml_file"
              python3 -c "import yaml,json,sys; json.dump(yaml.safe_load(open(sys.argv[1])), open('/tmp/opa_input.json','w'))" "$yml_file"
              ./opa eval --data .schemas/policies/ --input /tmp/opa_input.json "data.casc.deny" --format pretty
            done
            echo "=== OPA POLICY CHECK COMPLETE ==="
          else
            echo "No OPA policies found — skipping."
          fi

  bootstrap:
    name: Bootstrap Tenants (GitOps)
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'push'
      && contains(toJSON(github.event.commits.*.modified), 'tenants.yml')
      && !contains(github.event.head_commit.message, '[skip dispatch]')
    outputs:
      has_tenants_change: ${{ steps.diff.outputs.has_actions }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Diff tenants and determine actions
        id: diff
        run: |
          python3 -c "
          import yaml, json, sys, os

          try:
              current = yaml.safe_load(open('tenants.yml'))
          except Exception:
              print('tenants.yml not found or invalid — skipping bootstrap')
              sys.exit(0)

          import subprocess
          result = subprocess.run(['git', 'show', 'HEAD~1:tenants.yml'], capture_output=True, text=True)
          if result.returncode != 0:
              previous = {'tenants': []}
          else:
              previous = yaml.safe_load(result.stdout) or {'tenants': []}

          prev_map = {t['org_id']: t for t in previous.get('tenants', [])}
          curr_map = {t['org_id']: t for t in current.get('tenants', [])}

          actions = []
          for oid, tenant in curr_map.items():
              if tenant.get('status') == 'inactive':
                  continue
              if oid not in prev_map:
                  actions.append({'action': 'added', 'tenant': tenant})
              elif tenant != prev_map[oid]:
                  actions.append({'action': 'modified', 'tenant': tenant})

          if not actions:
              print('No new or modified active tenants — skipping bootstrap')
              sys.exit(0)

          print(f'Found {len(actions)} tenant(s) to bootstrap:')
          for a in actions:
              print(f'  {a[\"action\"]}: {a[\"tenant\"][\"org_id\"]}')

          with open('tenant_actions.json', 'w') as f:
              json.dump(actions, f)
          "

          if [ -f tenant_actions.json ]; then
            echo "has_actions=true" >> $GITHUB_OUTPUT
          else
            echo "has_actions=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger bootstrap for each tenant
        if: steps.diff.outputs.has_actions == 'true'
        run: |
          AAP_HOST="${{ secrets.AAP_HOST }}"
          AAP_USERNAME="${{ secrets.AAP_USERNAME }}"
          AAP_PASSWORD="${{ secrets.AAP_PASSWORD }}"
          JT_NAME="${{ inputs.bootstrap_jt_name }}"

          if [ -z "$AAP_HOST" ] || [ -z "$AAP_USERNAME" ] || [ -z "$AAP_PASSWORD" ]; then
            echo "::error::Actionable tenants found but AAP credentials not configured"
            exit 1
          fi

          JT_RESPONSE=$(curl -sk -u "${AAP_USERNAME}:${AAP_PASSWORD}" \
            "https://${AAP_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")
          JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

          if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
            echo "::error::Bootstrap JT '${JT_NAME}' not found"
            exit 1
          fi

          python3 -c "
          import json, subprocess, sys
          actions = json.load(open('tenant_actions.json'))
          for action in actions:
              tenant = action['tenant']
              print(f'Bootstrapping tenant: {tenant[\"org_id\"]} ({action[\"action\"]})')
              extra_vars = json.dumps({
                  'org_id': tenant['org_id'],
                  'team_name': tenant['team_name'],
                  'team_lead': tenant['team_lead'],
                  'tenant_scm_org': tenant['tenant_scm_org'],
                  'repo_pattern': tenant.get('repo_pattern', 'combined'),
              })
              result = subprocess.run([
                  'curl', '-sk', '-X', 'POST',
                  '-u', '${AAP_USERNAME}:${AAP_PASSWORD}',
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'extra_vars': extra_vars}),
                  f'https://${AAP_HOST}/api/controller/v2/job_templates/${JT_ID}/launch/'
              ], capture_output=True, text=True)
              response = json.loads(result.stdout) if result.stdout else {}
              job_id = response.get('id', 'UNKNOWN')
              print(f'  Job launched: ID={job_id}')
          "

  trigger:
    name: Trigger Dispatcher
    needs: [validate, bootstrap]
    if: >-
      always()
      && needs.validate.result == 'success'
      && (needs.bootstrap.result == 'skipped' || (needs.bootstrap.result == 'success' && needs.bootstrap.outputs.has_tenants_change != 'true'))
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && !(github.event_name == 'push' && contains(github.event.head_commit.message, '[skip dispatch]'))
    runs-on: ubuntu-latest
    concurrency:
      group: casc-dispatcher-trigger
      cancel-in-progress: false
    steps:
      - name: Determine auth mode and target environment
        id: auth
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          case "$BRANCH" in
            feature/*)   ENV="dev"; HOST="${{ secrets.AAP_DEV_HOST }}"; TOKEN="${{ secrets.AAP_DEV_TOKEN }}" ;;
            develop)     ENV="tst"; HOST="${{ secrets.AAP_TST_HOST }}"; TOKEN="${{ secrets.AAP_TST_TOKEN }}" ;;
            release/*)   ENV="npr"; HOST="${{ secrets.AAP_NPR_HOST }}"; TOKEN="${{ secrets.AAP_NPR_TOKEN }}" ;;
            main|master) ENV="prd"; HOST="${{ secrets.AAP_PRD_HOST }}"; TOKEN="${{ secrets.AAP_PRD_TOKEN }}" ;;
            *)           ENV="dev"; HOST="${{ secrets.AAP_DEV_HOST }}"; TOKEN="${{ secrets.AAP_DEV_TOKEN }}" ;;
          esac

          if [ -n "$HOST" ] && [ -n "$TOKEN" ]; then
            echo "auth_mode=bearer" >> $GITHUB_OUTPUT
            echo "aap_host=${HOST}" >> $GITHUB_OUTPUT
            echo "target_env=${ENV}" >> $GITHUB_OUTPUT
            echo "auth_header=Authorization: Bearer ${TOKEN}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.AAP_HOST }}" ] && [ -n "${{ secrets.AAP_USERNAME }}" ] && [ -n "${{ secrets.AAP_PASSWORD }}" ]; then
            echo "auth_mode=basic" >> $GITHUB_OUTPUT
            echo "aap_host=${{ secrets.AAP_HOST }}" >> $GITHUB_OUTPUT
            echo "target_env=${ENV}" >> $GITHUB_OUTPUT
          else
            echo "auth_mode=skip" >> $GITHUB_OUTPUT
            echo "::warning::No AAP credentials configured — dispatcher will NOT be triggered."
          fi

      - name: Fail if trigger was expected but secrets are missing
        if: steps.auth.outputs.auth_mode == 'skip' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          echo "::error::Dispatcher trigger skipped — no AAP credentials available."
          exit 1

      - name: Trigger AAP dispatcher
        if: steps.auth.outputs.auth_mode != 'skip'
        run: |
          AAP_HOST="${{ steps.auth.outputs.aap_host }}"
          AUTH_MODE="${{ steps.auth.outputs.auth_mode }}"
          TARGET_ENV="${{ steps.auth.outputs.target_env }}"
          JT_NAME="${{ inputs.dispatcher_jt_name }}"

          echo "=== Triggering CasC Dispatcher on AAP ==="
          echo "Host: ${AAP_HOST} | Env: ${TARGET_ENV} | JT: ${JT_NAME} | Auth: ${AUTH_MODE}"

          if [ "$AUTH_MODE" = "bearer" ]; then
            AUTH_ARGS=(-H "${{ steps.auth.outputs.auth_header }}")
          else
            AUTH_ARGS=(-u "${{ secrets.AAP_USERNAME }}:${{ secrets.AAP_PASSWORD }}")
          fi

          JT_RESPONSE=$(curl -sk "${AUTH_ARGS[@]}" \
            "https://${AAP_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")
          JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

          if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
            echo "ERROR: Job Template '${JT_NAME}' not found on ${AAP_HOST}"
            exit 1
          fi

          ALLOW_SIMUL=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0].get('allow_simultaneous', False))")
          if [ "$ALLOW_SIMUL" = "True" ]; then
            echo "ERROR: Dispatcher JT has allow_simultaneous=true — must be false"
            exit 1
          fi

          for attempt in $(seq 1 2); do
            RUNNING=$(curl -sk "${AUTH_ARGS[@]}" \
              "https://${AAP_HOST}/api/controller/v2/jobs/?job_template=${JT_ID}&status__in=running,pending,waiting&page_size=1" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('count', 0))")
            [ "$RUNNING" = "0" ] && break
            echo "  Dispatcher busy (${attempt}/2) — waiting 15s..."
            sleep 15
          done

          LAUNCH_RESPONSE=$(curl -sk -X POST "${AUTH_ARGS[@]}" \
            -H "Content-Type: application/json" \
            -d "{
              \"extra_vars\": {
                \"target_env\": \"${TARGET_ENV}\",
                \"trigger_commit\": \"${GITHUB_SHA}\",
                \"triggered_repo\": \"${GITHUB_REPOSITORY##*/}\",
                \"trigger_source\": \"ci-cd-pipeline\"
              }
            }" \
            "https://${AAP_HOST}/api/controller/v2/job_templates/${JT_ID}/launch/")

          JOB_ID=$(echo "$LAUNCH_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id', 'UNKNOWN'))")
          echo "Dispatcher launched: ID=${JOB_ID}"

          if [ "$JOB_ID" = "UNKNOWN" ] || [ -z "$JOB_ID" ]; then
            echo "ERROR: Failed to launch dispatcher"
            exit 1
          fi

          if [ "${{ inputs.wait_for_completion }}" = "false" ]; then
            echo "=== FIRE-AND-FORGET ==="
            exit 0
          fi

          POLL_TIMEOUT=${{ inputs.poll_timeout_minutes }}
          POLL_CHECKS=$(( POLL_TIMEOUT * 6 ))
          echo "Polling for completion (timeout: ${POLL_TIMEOUT} min)..."
          for i in $(seq 1 $POLL_CHECKS); do
            sleep 10
            STATUS=$(curl -sk "${AUTH_ARGS[@]}" \
              "https://${AAP_HOST}/api/controller/v2/jobs/${JOB_ID}/" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status', 'unknown'))")
            echo "  Status: ${STATUS} (${i}/${POLL_CHECKS})"
            case "$STATUS" in
              successful) echo "=== COMPLETED ===" && exit 0 ;;
              failed|error|canceled) echo "=== FAILED (${STATUS}) ===" && exit 1 ;;
            esac
          done

          case "$STATUS" in
            pending|waiting|running)
              echo "::warning::Job ${JOB_ID} still ${STATUS} after ${POLL_TIMEOUT} min"
              exit 0 ;;
          esac
          echo "=== TIMEOUT ==="
          exit 1
