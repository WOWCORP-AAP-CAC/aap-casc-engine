# Production-grade reusable workflow for CasC repositories (v3 — multi-env fan-out)
# Lives at: aap-casc-engine/.github/workflows/casc-validate-and-trigger.yml
#
# Generated caller usage (seeded by genesis/bootstrap via caller_role):
#
#   Platform home repo (caller_role=platform_home):
#     secrets:
#       AAP_ENGINE_HOST: ${{ secrets.AAP_ENGINE_HOST }}
#       AAP_ENGINE_TOKEN: ${{ secrets.AAP_ENGINE_TOKEN }}
#       AAP_ENGINE_USERNAME: ${{ secrets.AAP_ENGINE_USERNAME }}
#       AAP_ENGINE_PASSWORD: ${{ secrets.AAP_ENGINE_PASSWORD }}
#       AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
#       ENGINE_REPO_TOKEN: ${{ secrets.ENGINE_REPO_TOKEN }}
#       PLATFORM_REPO_TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN }}
#
#   Tenant / non-home platform repos (caller_role=tenant or platform_nonhome):
#     secrets:
#       AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
#       ENGINE_REPO_TOKEN: ${{ secrets.ENGINE_REPO_TOKEN }}
#       PLATFORM_REPO_TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN }}
#
# The workflow also accepts deprecated per-env secrets (AAP_DEV_HOST, etc.)
# and legacy basic-auth fallback (AAP_HOST/USERNAME/PASSWORD) for manually
# customized callers — see secret declarations below.
#
# NOTE: secrets: inherit only works within the same GitHub organization.
# Cross-org callers MUST pass secrets explicitly.

name: CasC Validate and Trigger

on:
  workflow_call:
    inputs:
      dispatcher_jt_name:
        description: "Name of the AAP dispatcher Job Template to trigger"
        required: false
        default: "jt-platform-casc_dispatcher"
        type: string
      bootstrap_jt_name:
        description: "Name of the AAP bootstrap Job Template to trigger"
        required: false
        default: "jt-platform-bootstrap_tenant"
        type: string
      wait_for_completion:
        description: "Wait for dispatcher to finish (false = fire-and-forget)"
        required: false
        default: true
        type: boolean
      poll_timeout_minutes:
        description: "Max minutes to poll for job completion"
        required: false
        default: 30
        type: number
      platform_scm_org:
        description: "GitHub org containing the platform home repo"
        required: false
        type: string
      platform_home_repo:
        description: "Platform home repo name (contains config.yml)"
        required: false
        type: string
        default: "casc-platform-global"
      platform_branch:
        description: "Branch to read config.yml from"
        required: false
        type: string
        default: "main"
    secrets:
      # Engine/orchestration credentials
      AAP_ENGINE_HOST:
        required: false
      AAP_ENGINE_TOKEN:
        required: false
      AAP_ENGINE_USERNAME:
        required: false
      AAP_ENGINE_PASSWORD:
        required: false
      # Dispatcher credentials — canonical model (recommended)
      AAP_ENV_TARGETS_JSON:
        required: false
      AAP_FANOUT_ALLOW_BASIC:
        required: false
      # DEPRECATED: per-env bearer — use AAP_ENV_TARGETS_JSON instead.
      # Kept for backward compatibility with manually customized callers.
      # The generated caller template no longer passes these secrets.
      AAP_DEV_HOST:
        required: false
      AAP_DEV_TOKEN:
        required: false
      AAP_TST_HOST:
        required: false
      AAP_TST_TOKEN:
        required: false
      AAP_NPR_HOST:
        required: false
      AAP_NPR_TOKEN:
        required: false
      AAP_PRD_HOST:
        required: false
      AAP_PRD_TOKEN:
        required: false
      AAP_LAB_HOST:
        required: false
      AAP_LAB_TOKEN:
        required: false
      AAP_PROD_HOST:
        required: false
      AAP_PROD_TOKEN:
        required: false
      # DEPRECATED: per-env basic auth — use AAP_ENV_TARGETS_JSON instead.
      # Kept for backward compatibility with manually customized callers.
      AAP_DEV_USERNAME:
        required: false
      AAP_DEV_PASSWORD:
        required: false
      AAP_TST_USERNAME:
        required: false
      AAP_TST_PASSWORD:
        required: false
      AAP_NPR_USERNAME:
        required: false
      AAP_NPR_PASSWORD:
        required: false
      AAP_PRD_USERNAME:
        required: false
      AAP_PRD_PASSWORD:
        required: false
      AAP_LAB_USERNAME:
        required: false
      AAP_LAB_PASSWORD:
        required: false
      AAP_PROD_USERNAME:
        required: false
      AAP_PROD_PASSWORD:
        required: false
      # Legacy single-env fallback (requires AAP_FANOUT_ALLOW_BASIC=true)
      AAP_HOST:
        required: false
      AAP_USERNAME:
        required: false
      AAP_PASSWORD:
        required: false
      # Repo access tokens
      ENGINE_REPO_TOKEN:
        required: false
      PLATFORM_REPO_TOKEN:
        required: false

jobs:
  validate:
    name: Validate YAML Configs
    runs-on: ubuntu-latest
    outputs:
      tenants_changed: ${{ steps.tenants_check.outputs.tenants_changed }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect tenants.yml change
        id: tenants_check
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ]; then
            if git diff --name-only "${{ github.event.before }}" "${{ github.event.after }}" 2>/dev/null | grep -Fxq "tenants.yml"; then
              echo "tenants_changed=true" >> "$GITHUB_OUTPUT"
              echo "tenants.yml was modified in this push"
            else
              echo "tenants_changed=false" >> "$GITHUB_OUTPUT"
              echo "tenants.yml was NOT modified in this push"
            fi
          else
            echo "tenants_changed=false" >> "$GITHUB_OUTPUT"
            echo "Non-push event or missing before SHA — skipping tenants check"
          fi

      - name: Derive engine repo from workflow context
        id: engine
        run: |
          USES_LINE=$(grep -r 'uses:.*casc-validate-and-trigger' .github/workflows/ 2>/dev/null | head -1)
          if [ -n "$USES_LINE" ]; then
            ENGINE_REPO=$(echo "$USES_LINE" | sed 's|.*uses:[[:space:]]*||' | sed "s/['\"]//g" | sed 's|/.github/.*||')
            echo "Engine repo (from caller workflow): ${ENGINE_REPO}"
          else
            ENGINE_REPO="${{ github.workflow_ref }}"
            ENGINE_REPO="${ENGINE_REPO%%/.github/*}"
            echo "Engine repo (fallback from workflow_ref): ${ENGINE_REPO}"
          fi
          echo "repo=${ENGINE_REPO}" >> $GITHUB_OUTPUT

      - name: Checkout engine repo (schemas + role defaults)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.engine.outputs.repo }}
          path: .engine
          sparse-checkout: |
            schemas
            roles/process_casc_config/defaults
          token: ${{ secrets.ENGINE_REPO_TOKEN || github.token }}

      - name: Setup schemas directory
        run: |
          mkdir -p .schemas
          [ -f .engine/schemas/resource-types.yml ] && cp .engine/schemas/resource-types.yml .schemas/ || true
          [ -f .engine/schemas/validate_naming.py ] && cp .engine/schemas/validate_naming.py .schemas/ || true
          [ -f .engine/schemas/naming-rules.yml ] && cp .engine/schemas/naming-rules.yml .schemas/ || true
          [ -d .engine/schemas/policies ] && cp -r .engine/schemas/policies .schemas/ || true
          [ -f .engine/roles/process_casc_config/defaults/main.yml ] && cp .engine/roles/process_casc_config/defaults/main.yml .schemas/engine_defaults.yml || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation tools
        run: pip install pyyaml

      - name: Validate YAML structure
        run: |
          echo "=== CasC YAML Structural Validation ==="
          python3 -c "
          import yaml, sys, os, glob

          resource_types = yaml.safe_load(open('.schemas/resource-types.yml')) if os.path.exists('.schemas/resource-types.yml') else {'defaults': {'value_type': 'list', 'identity_field': 'name'}, 'exceptions': {}}
          defaults = resource_types.get('defaults', {})
          exceptions = resource_types.get('exceptions', {})

          allowed_keys = None
          for aks in ['.schemas/engine_defaults.yml', os.path.join('.engine', 'roles', 'process_casc_config', 'defaults', 'main.yml')]:
              if os.path.exists(aks):
                  ak = yaml.safe_load(open(aks))
                  allowed_keys = set(ak.get('casc_allowed_resource_keys', []))
                  break

          skip_files = {'config.yml', 'tenants.yml'}
          skip_dirs = {'.schemas', '.engine', '.git', '.github'}
          errors = []

          for search_dir in ['base'] + [d for d in os.listdir('.') if os.path.isdir(d) and d not in skip_dirs and d != 'base']:
              if not os.path.isdir(search_dir):
                  continue
              for root, _, files in os.walk(search_dir):
                  for fname in files:
                      if not fname.endswith(('.yml', '.yaml')):
                          continue
                      if fname.endswith('.sample'):
                          continue
                      fpath = os.path.join(root, fname)
                      try:
                          data = yaml.safe_load(open(fpath))
                      except Exception as e:
                          errors.append(f'{fpath}: Failed to parse YAML — {e}')
                          continue
                      if not isinstance(data, dict):
                          errors.append(f'{fpath}: Expected a mapping, got {type(data).__name__}')
                          continue
                      keys = list(data.keys())
                      if len(keys) != 1:
                          errors.append(f'{fpath}: Expected exactly 1 top-level key, got {len(keys)}: {keys}')
                          continue
                      key = keys[0]
                      if allowed_keys and key not in allowed_keys:
                          errors.append(f'{fpath}: Unknown resource key \"{key}\" (not in casc_allowed_resource_keys)')
                          continue
                      exc = exceptions.get(key, {})
                      vtype = exc.get('value_type', defaults.get('value_type', 'list'))
                      id_field = exc.get('identity_field', defaults.get('identity_field', 'name'))
                      value = data[key]
                      if vtype == 'list':
                          if not isinstance(value, list):
                              errors.append(f'{fpath}: Key \"{key}\" expected list, got {type(value).__name__}')
                              continue
                          for i, item in enumerate(value):
                              if isinstance(item, dict) and id_field not in item:
                                  errors.append(f'{fpath}: Item {i} in \"{key}\" missing identity field \"{id_field}\"')
          if errors:
              print('Structural validation errors:')
              for e in errors:
                  print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('=== ALL YAML FILES PASSED STRUCTURAL VALIDATION ===')
          "

      - name: Validate control files (config.yml / tenants.yml)
        run: |
          python3 -c "
          import yaml, sys, os, re
          errors = []

          ENV_NAME_RE = re.compile(r'^[a-z][a-z0-9_]*$')

          if os.path.exists('config.yml'):
              try:
                  cfg = yaml.safe_load(open('config.yml'))
                  for key in ['env_branch_map', 'scm_provider', 'platform_scm_org', 'repo_pattern']:
                      if key not in cfg:
                          errors.append(f'config.yml: missing required key \"{key}\"')
                  if 'platform_branch' in cfg and not isinstance(cfg['platform_branch'], str):
                      errors.append('config.yml: platform_branch must be a string')
                  if 'create_missing_env_branches' in cfg and not isinstance(cfg['create_missing_env_branches'], bool):
                      errors.append('config.yml: create_missing_env_branches must be a boolean')
                  if 'bootstrap_dispatch_fanout' in cfg and not isinstance(cfg['bootstrap_dispatch_fanout'], bool):
                      errors.append('config.yml: bootstrap_dispatch_fanout must be a boolean')
                  if 'env_branch_map' in cfg:
                      ebm = cfg['env_branch_map']
                      if not isinstance(ebm, dict) or not ebm:
                          errors.append('config.yml: env_branch_map must be a non-empty mapping')
                      else:
                          for env, branch in ebm.items():
                              if not isinstance(env, str) or not env.strip():
                                  errors.append('config.yml: env_branch_map contains an empty or non-string key')
                              elif not ENV_NAME_RE.match(env):
                                  errors.append(f'config.yml: env_branch_map key \"{env}\" must match ^[a-z][a-z0-9_]*$')
                              if not isinstance(branch, str) or not branch.strip():
                                  errors.append(f'config.yml: env_branch_map[{env}] must be a non-empty branch string')
                          branches = list(ebm.values())
                          if len(branches) != len(set(branches)):
                              dupes = [b for b in set(branches) if branches.count(b) > 1]
                              errors.append(f'config.yml: env_branch_map branch values must be unique. Duplicates: {dupes}')
              except Exception as e:
                  errors.append(f'config.yml: Failed to parse — {e}')

          if os.path.exists('tenants.yml'):
              try:
                  t = yaml.safe_load(open('tenants.yml'))
                  tenants = t.get('tenants', [])
                  if not isinstance(tenants, list):
                      errors.append('tenants.yml: \"tenants\" must be a list')
                  else:
                      for i, entry in enumerate(tenants):
                          for req in ['org_id', 'team_name', 'team_lead', 'tenant_scm_org']:
                              if req not in entry:
                                  errors.append(f'tenants.yml: tenant {i} missing required field \"{req}\"')
                          if 'status' in entry and entry['status'] not in ('active', 'inactive'):
                              errors.append(f'tenants.yml: tenant {i} has invalid status \"{entry[\"status\"]}\"')
              except Exception as e:
                  errors.append(f'tenants.yml: Failed to parse — {e}')

          if errors:
              print('Control file validation errors:')
              for e in errors: print(f'  ERROR: {e}')
              sys.exit(1)
          else:
              print('=== CONTROL FILES VALID (or not present) ===')
          "

      - name: Validate naming conventions
        run: |
          if [ -f ".schemas/validate_naming.py" ] && [ -f ".schemas/naming-rules.yml" ]; then
            echo "=== Checking naming conventions ==="
            python3 .schemas/validate_naming.py --config-dir . --rules .schemas/naming-rules.yml
            echo "=== NAMING CONVENTIONS PASSED ==="
          else
            echo "No naming validation scripts found — skipping."
          fi

      - name: Check policy compliance (OPA)
        if: always()
        continue-on-error: true
        run: |
          if [ -d ".schemas/policies" ]; then
            echo "=== Checking OPA policy compliance ==="
            curl -sL -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
            chmod +x opa

            SCAN_DIRS=""
            for d in $(ls -d */ 2>/dev/null); do
              case "$d" in
                .schemas/|.engine/|.git/|.github/) continue ;;
                *) SCAN_DIRS="$SCAN_DIRS $d" ;;
              esac
            done

            for yml_file in $(find $SCAN_DIRS -name "*.yml" -o -name "*.yaml" 2>/dev/null | grep -v '.sample$'); do
              echo "Policy check: $yml_file"
              python3 -c "import yaml,json,sys; json.dump(yaml.safe_load(open(sys.argv[1])), open('/tmp/opa_input.json','w'))" "$yml_file"
              ./opa eval --data .schemas/policies/ --input /tmp/opa_input.json "data.casc.deny" --format pretty
            done
            echo "=== OPA POLICY CHECK COMPLETE ==="
          else
            echo "No OPA policies found — skipping."
          fi

  bootstrap:
    name: Bootstrap Tenants (GitOps)
    runs-on: ubuntu-latest
    needs: validate
    if: >-
      github.event_name == 'push'
      && !contains(github.event.head_commit.message, '[skip dispatch]')
      && github.repository == format('{0}/{1}', inputs.platform_scm_org, inputs.platform_home_repo)
      && needs.validate.outputs.tenants_changed == 'true'
    outputs:
      has_tenants_change: ${{ steps.diff.outputs.has_actions }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Diff tenants and determine actions
        id: diff
        run: |
          python3 -c "
          import yaml, json, sys, os

          try:
              current = yaml.safe_load(open('tenants.yml'))
          except Exception:
              print('tenants.yml not found or invalid — skipping bootstrap')
              sys.exit(0)

          import subprocess
          result = subprocess.run(['git', 'show', 'HEAD~1:tenants.yml'], capture_output=True, text=True)
          if result.returncode != 0:
              previous = {'tenants': []}
          else:
              previous = yaml.safe_load(result.stdout) or {'tenants': []}

          prev_map = {t['org_id']: t for t in previous.get('tenants', [])}
          curr_map = {t['org_id']: t for t in current.get('tenants', [])}

          actions = []
          for oid, tenant in curr_map.items():
              if tenant.get('status') == 'inactive':
                  continue
              if oid not in prev_map:
                  actions.append({'action': 'added', 'tenant': tenant})
              elif tenant != prev_map[oid]:
                  actions.append({'action': 'modified', 'tenant': tenant})

          if not actions:
              print('No new or modified active tenants — skipping bootstrap')
              sys.exit(0)

          print(f'Found {len(actions)} tenant(s) to bootstrap:')
          for a in actions:
              print(f'  {a[\"action\"]}: {a[\"tenant\"][\"org_id\"]}')

          with open('tenant_actions.json', 'w') as f:
              json.dump(actions, f)
          "

          if [ -f tenant_actions.json ]; then
            echo "has_actions=true" >> $GITHUB_OUTPUT
          else
            echo "has_actions=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger bootstrap for each tenant and poll to completion
        if: steps.diff.outputs.has_actions == 'true'
        env:
          AAP_ENGINE_HOST: ${{ secrets.AAP_ENGINE_HOST }}
          AAP_ENGINE_TOKEN: ${{ secrets.AAP_ENGINE_TOKEN }}
          AAP_ENGINE_USERNAME: ${{ secrets.AAP_ENGINE_USERNAME }}
          AAP_ENGINE_PASSWORD: ${{ secrets.AAP_ENGINE_PASSWORD }}
          AAP_HOST: ${{ secrets.AAP_HOST }}
          AAP_USERNAME: ${{ secrets.AAP_USERNAME }}
          AAP_PASSWORD: ${{ secrets.AAP_PASSWORD }}
        run: |
          normalize_aap_host() {
            local raw="$1"
            raw="${raw%/}"
            if [[ "$raw" == http://* || "$raw" == https://* ]]; then
              echo "$raw"
            else
              echo "https://${raw}"
            fi
          }

          # Engine credential resolution (4-step cascade) — export scalars for Python
          if [ -n "$AAP_ENGINE_HOST" ] && [ -n "$AAP_ENGINE_TOKEN" ]; then
            export ENGINE_HOST=$(normalize_aap_host "$AAP_ENGINE_HOST")
            export AUTH_MODE=bearer
            export AUTH_HEADER="Authorization: Bearer ${AAP_ENGINE_TOKEN}"
            echo "Using engine bearer auth: ${ENGINE_HOST}"
          elif [ -n "$AAP_ENGINE_HOST" ] && [ -n "$AAP_ENGINE_USERNAME" ] && [ -n "$AAP_ENGINE_PASSWORD" ]; then
            export ENGINE_HOST=$(normalize_aap_host "$AAP_ENGINE_HOST")
            export AUTH_MODE=basic
            export AUTH_CREDS="${AAP_ENGINE_USERNAME}:${AAP_ENGINE_PASSWORD}"
            echo "Using engine basic auth: ${ENGINE_HOST}"
          elif [ -n "$AAP_HOST" ] && [ -n "$AAP_USERNAME" ] && [ -n "$AAP_PASSWORD" ]; then
            export ENGINE_HOST=$(normalize_aap_host "$AAP_HOST")
            export AUTH_MODE=basic
            export AUTH_CREDS="${AAP_USERNAME}:${AAP_PASSWORD}"
            echo "Using legacy basic auth fallback: ${ENGINE_HOST}"
          else
            echo "::error::Actionable tenants found but no engine credentials configured (need AAP_ENGINE_HOST+TOKEN or AAP_HOST+USERNAME+PASSWORD)"
            exit 1
          fi

          JT_NAME="${{ inputs.bootstrap_jt_name }}"
          export POLL_TIMEOUT="${BOOTSTRAP_POLL_TIMEOUT_MINUTES:-15}"

          if [ "$AUTH_MODE" = "bearer" ]; then
            JT_RESPONSE=$(curl -sk -H "$AUTH_HEADER" \
              "${ENGINE_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")
          else
            JT_RESPONSE=$(curl -sk -u "$AUTH_CREDS" \
              "${ENGINE_HOST}/api/controller/v2/job_templates/?name=${JT_NAME}")
          fi
          export JT_ID=$(echo "$JT_RESPONSE" | python3 -c "import sys,json; r=json.load(sys.stdin); print(r['results'][0]['id'] if r.get('results') else 'NOT_FOUND')")

          if [ "$JT_ID" = "NOT_FOUND" ] || [ -z "$JT_ID" ]; then
            echo "::error::Bootstrap JT '${JT_NAME}' not found on ${ENGINE_HOST}"
            exit 1
          fi

          python3 <<'BOOTSTRAP_PY'
          import json, subprocess, sys, os, time

          auth_mode = os.environ['AUTH_MODE']
          if auth_mode == 'bearer':
              auth_args = ['-H', os.environ['AUTH_HEADER']]
          else:
              auth_args = ['-u', os.environ['AUTH_CREDS']]

          actions = json.load(open('tenant_actions.json'))
          jt_id = os.environ['JT_ID']
          engine_host = os.environ['ENGINE_HOST']
          poll_timeout = int(os.environ.get('POLL_TIMEOUT', '15'))
          poll_interval = 10
          max_polls = (poll_timeout * 60) // poll_interval

          for action in actions:
              tenant = action['tenant']
              org_id = tenant['org_id']
              print(f'Bootstrapping tenant: {org_id} ({action["action"]})')

              extra_vars = json.dumps({
                  'org_id': org_id,
                  'team_name': tenant['team_name'],
                  'team_lead': tenant['team_lead'],
                  'tenant_scm_org': tenant['tenant_scm_org'],
                  'repo_pattern': tenant.get('repo_pattern', 'combined'),
              })

              launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'extra_vars': extra_vars}),
                  f'{engine_host}/api/controller/v2/job_templates/{jt_id}/launch/'
              ]
              result = subprocess.run(launch_cmd, capture_output=True, text=True)
              try:
                  response = json.loads(result.stdout)
              except Exception:
                  print(f'  ERROR: Failed to parse launch response: {result.stdout[:500]}')
                  sys.exit(1)

              job_id = response.get('id')
              if not job_id:
                  print(f'  ERROR: Failed to launch bootstrap JT for {org_id}: {result.stdout[:500]}')
                  sys.exit(1)

              print(f'  Job launched: ID={job_id}')
              print(f'  Polling for completion (timeout: {poll_timeout}min)...')

              for i in range(1, max_polls + 1):
                  time.sleep(poll_interval)
                  status_cmd = ['curl', '-sk'] + auth_args + [
                      f'{engine_host}/api/controller/v2/jobs/{job_id}/'
                  ]
                  status_result = subprocess.run(status_cmd, capture_output=True, text=True)
                  try:
                      status = json.loads(status_result.stdout).get('status', 'unknown')
                  except Exception:
                      status = 'unknown'
                  print(f'    Status: {status} ({i}/{max_polls})')
                  if status == 'successful':
                      print(f'  Bootstrap JT for {org_id} completed successfully.')
                      break
                  elif status in ('failed', 'error', 'canceled'):
                      print(f'  ERROR: Bootstrap JT job {job_id} for tenant {org_id} {status}.')
                      sys.exit(1)
              else:
                  print(f'  ERROR: Bootstrap JT job {job_id} for tenant \'{org_id}\' did not complete within {poll_timeout} minutes.')
                  sys.exit(1)

          print('All bootstrap JTs completed successfully.')
          BOOTSTRAP_PY

  fanout:
    name: Dispatcher Fan-out
    runs-on: ubuntu-latest
    needs: bootstrap
    if: >-
      needs.bootstrap.result == 'success'
      && needs.bootstrap.outputs.has_tenants_change == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml

      - name: Fetch config.yml from platform home repo if not local
        env:
          FETCH_TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN || secrets.ENGINE_REPO_TOKEN }}
        run: |
          if [ ! -f "config.yml" ]; then
            echo "config.yml not in local checkout; fetching from platform home repo..."
            curl -sf \
              -H "Authorization: Bearer ${FETCH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.platform_scm_org }}/${{ inputs.platform_home_repo || 'casc-platform-global' }}/contents/config.yml?ref=${{ inputs.platform_branch || 'main' }}" \
              -o config.yml
            if [ ! -f "config.yml" ]; then
              echo "ERROR: Could not fetch config.yml from platform home repo"
              exit 1
            fi
          fi

      - name: Read config.yml and resolve fan-out
        id: config
        run: |
          python3 -c "
          import yaml, json
          cfg = yaml.safe_load(open('config.yml'))
          fanout = cfg.get('bootstrap_dispatch_fanout', True)
          envs = list(cfg.get('env_branch_map', {}).keys())
          print(f'fanout_enabled={str(fanout).lower()}')
          print(f'environments={json.dumps(envs)}')
          " >> $GITHUB_OUTPUT

      - name: Exit if fan-out disabled
        if: steps.config.outputs.fanout_enabled != 'true'
        run: echo "Fan-out disabled by bootstrap_dispatch_fanout=false. Exiting successfully."

      - name: Resolve credentials and trigger dispatcher per environment
        if: steps.config.outputs.fanout_enabled == 'true'
        env:
          AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
          AAP_DEV_HOST: ${{ secrets.AAP_DEV_HOST }}
          AAP_DEV_TOKEN: ${{ secrets.AAP_DEV_TOKEN }}
          AAP_DEV_USERNAME: ${{ secrets.AAP_DEV_USERNAME }}
          AAP_DEV_PASSWORD: ${{ secrets.AAP_DEV_PASSWORD }}
          AAP_TST_HOST: ${{ secrets.AAP_TST_HOST }}
          AAP_TST_TOKEN: ${{ secrets.AAP_TST_TOKEN }}
          AAP_TST_USERNAME: ${{ secrets.AAP_TST_USERNAME }}
          AAP_TST_PASSWORD: ${{ secrets.AAP_TST_PASSWORD }}
          AAP_NPR_HOST: ${{ secrets.AAP_NPR_HOST }}
          AAP_NPR_TOKEN: ${{ secrets.AAP_NPR_TOKEN }}
          AAP_NPR_USERNAME: ${{ secrets.AAP_NPR_USERNAME }}
          AAP_NPR_PASSWORD: ${{ secrets.AAP_NPR_PASSWORD }}
          AAP_PRD_HOST: ${{ secrets.AAP_PRD_HOST }}
          AAP_PRD_TOKEN: ${{ secrets.AAP_PRD_TOKEN }}
          AAP_PRD_USERNAME: ${{ secrets.AAP_PRD_USERNAME }}
          AAP_PRD_PASSWORD: ${{ secrets.AAP_PRD_PASSWORD }}
          AAP_LAB_HOST: ${{ secrets.AAP_LAB_HOST }}
          AAP_LAB_TOKEN: ${{ secrets.AAP_LAB_TOKEN }}
          AAP_LAB_USERNAME: ${{ secrets.AAP_LAB_USERNAME }}
          AAP_LAB_PASSWORD: ${{ secrets.AAP_LAB_PASSWORD }}
          AAP_PROD_HOST: ${{ secrets.AAP_PROD_HOST }}
          AAP_PROD_TOKEN: ${{ secrets.AAP_PROD_TOKEN }}
          AAP_PROD_USERNAME: ${{ secrets.AAP_PROD_USERNAME }}
          AAP_PROD_PASSWORD: ${{ secrets.AAP_PROD_PASSWORD }}
          AAP_HOST: ${{ secrets.AAP_HOST }}
          AAP_USERNAME: ${{ secrets.AAP_USERNAME }}
          AAP_PASSWORD: ${{ secrets.AAP_PASSWORD }}
          AAP_FANOUT_ALLOW_BASIC: ${{ secrets.AAP_FANOUT_ALLOW_BASIC }}
          ENVIRONMENTS: ${{ steps.config.outputs.environments }}
          DISPATCHER_JT_NAME: ${{ inputs.dispatcher_jt_name }}
        run: |
          python3 <<'FANOUT_PY'
          import os, json, sys, subprocess, time, urllib.parse

          def normalize_host(raw):
              raw = raw.rstrip('/')
              if raw.startswith('http://') or raw.startswith('https://'):
                  return raw
              return f'https://{raw}'

          def resolve_env_creds(env_key):
              """6-step per-env credential resolution. Returns (host, auth_args) or None."""
              uk = env_key.upper()

              # 1. AAP_ENV_TARGETS_JSON[env].host + .token (bearer)
              targets = os.environ.get('AAP_ENV_TARGETS_JSON', '')
              if targets:
                  try:
                      t = json.loads(targets)
                      entry = t.get(env_key, {})
                      if entry.get('host') and entry.get('token'):
                          return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
                      if entry.get('host') and entry.get('username') and entry.get('password'):
                          return normalize_host(entry['host']), ['-u', f'{entry["username"]}:{entry["password"]}']
                  except json.JSONDecodeError:
                      pass

              # 3. AAP_<ENV>_HOST + AAP_<ENV>_TOKEN (bearer)
              env_host = os.environ.get(f'AAP_{uk}_HOST', '')
              env_token = os.environ.get(f'AAP_{uk}_TOKEN', '')
              if env_host and env_token:
                  return normalize_host(env_host), ['-H', f'Authorization: Bearer {env_token}']

              # 4. AAP_<ENV>_HOST + AAP_<ENV>_USERNAME/PASSWORD (basic, env-scoped)
              env_user = os.environ.get(f'AAP_{uk}_USERNAME', '')
              env_pass = os.environ.get(f'AAP_{uk}_PASSWORD', '')
              if env_host and env_user and env_pass:
                  return normalize_host(env_host), ['-u', f'{env_user}:{env_pass}']

              # 5. AAP_HOST + AAP_USERNAME/PASSWORD only if AAP_FANOUT_ALLOW_BASIC=true
              allow_basic = os.environ.get('AAP_FANOUT_ALLOW_BASIC', 'false').lower() == 'true'
              aap_host = os.environ.get('AAP_HOST', '')
              aap_user = os.environ.get('AAP_USERNAME', '')
              aap_pass = os.environ.get('AAP_PASSWORD', '')
              if allow_basic and aap_host and aap_user and aap_pass:
                  return normalize_host(aap_host), ['-u', f'{aap_user}:{aap_pass}']

              return None

          environments = json.loads(os.environ.get('ENVIRONMENTS', '[]'))
          jt_name = os.environ.get('DISPATCHER_JT_NAME', 'jt-platform-casc_dispatcher')

          if not environments:
              print('No environments in env_branch_map — nothing to fan-out.')
              sys.exit(0)

          # Phase 1: Resolve all credentials BEFORE launching anything
          resolved = {}
          errors = []
          for env in environments:
              result = resolve_env_creds(env)
              if result is None:
                  errors.append(f"ERROR: bootstrap_dispatch_fanout=true but no dispatcher credentials were found for env '{env}'.")
              else:
                  resolved[env] = result

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)

          print(f'Credentials resolved for all {len(environments)} environments. Dispatching sequentially...')

          # Phase 2: Trigger dispatcher per environment
          for env in environments:
              host, auth_args = resolved[env]
              print(f'\n=== Dispatching env={env} on {host} ===')

              # Look up JT
              jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
              jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
              try:
                  jt_data = json.loads(jt_result.stdout)
                  jt_id = jt_data['results'][0]['id']
              except (json.JSONDecodeError, KeyError, IndexError):
                  print(f"ERROR: JT '{jt_name}' not found on {host}")
                  sys.exit(1)

              # Check allow_simultaneous
              allow_simul = jt_data['results'][0].get('allow_simultaneous', False)
              if allow_simul:
                  print(f'ERROR: Dispatcher JT has allow_simultaneous=true — must be false')
                  sys.exit(1)

              # Busy wait
              for attempt in range(1, 3):
                  busy_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/?job_template={jt_id}&status__in=running,pending,waiting&page_size=1']
                  busy_result = subprocess.run(busy_cmd, capture_output=True, text=True)
                  try:
                      running = json.loads(busy_result.stdout).get('count', 0)
                  except Exception:
                      running = 0
                  if running == 0:
                      break
                  print(f'  Dispatcher busy ({attempt}/2) — waiting 15s...')
                  time.sleep(15)

              extra_vars = json.dumps({
                  'target_env': env,
                  'trigger_commit': os.environ.get('GITHUB_SHA', ''),
                  'triggered_repo': os.environ.get('GITHUB_REPOSITORY', '').split('/')[-1],
                  'trigger_source': 'ci-cd-fanout',
              })

              launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
                  '-H', 'Content-Type: application/json',
                  '-d', json.dumps({'extra_vars': extra_vars}),
                  f'{host}/api/controller/v2/job_templates/{jt_id}/launch/'
              ]
              launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
              try:
                  job_id = json.loads(launch_result.stdout).get('id')
              except Exception:
                  job_id = None

              if not job_id:
                  print(f'ERROR: Failed to launch dispatcher for env={env}')
                  sys.exit(1)

              print(f'  Dispatcher launched: job_id={job_id} for env={env}')
          print('\n=== Fan-out complete ===')
          FANOUT_PY

  trigger:
    name: Trigger Dispatcher
    needs: [validate, bootstrap, fanout]
    if: >-
      always()
      && needs.validate.result == 'success'
      && (needs.bootstrap.result == 'skipped'
          || (needs.bootstrap.result == 'success' && needs.bootstrap.outputs.has_tenants_change != 'true'))
      && needs.fanout.result != 'success'
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && !(github.event_name == 'push' && contains(github.event.head_commit.message, '[skip dispatch]'))
    runs-on: ubuntu-latest
    concurrency:
      group: casc-dispatcher-trigger
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install pyyaml

      - name: Fetch config.yml and resolve target environment
        id: resolve
        env:
          FETCH_TOKEN: ${{ secrets.PLATFORM_REPO_TOKEN || secrets.ENGINE_REPO_TOKEN }}
          AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
          AAP_DEV_HOST: ${{ secrets.AAP_DEV_HOST }}
          AAP_DEV_TOKEN: ${{ secrets.AAP_DEV_TOKEN }}
          AAP_DEV_USERNAME: ${{ secrets.AAP_DEV_USERNAME }}
          AAP_DEV_PASSWORD: ${{ secrets.AAP_DEV_PASSWORD }}
          AAP_TST_HOST: ${{ secrets.AAP_TST_HOST }}
          AAP_TST_TOKEN: ${{ secrets.AAP_TST_TOKEN }}
          AAP_TST_USERNAME: ${{ secrets.AAP_TST_USERNAME }}
          AAP_TST_PASSWORD: ${{ secrets.AAP_TST_PASSWORD }}
          AAP_NPR_HOST: ${{ secrets.AAP_NPR_HOST }}
          AAP_NPR_TOKEN: ${{ secrets.AAP_NPR_TOKEN }}
          AAP_NPR_USERNAME: ${{ secrets.AAP_NPR_USERNAME }}
          AAP_NPR_PASSWORD: ${{ secrets.AAP_NPR_PASSWORD }}
          AAP_PRD_HOST: ${{ secrets.AAP_PRD_HOST }}
          AAP_PRD_TOKEN: ${{ secrets.AAP_PRD_TOKEN }}
          AAP_PRD_USERNAME: ${{ secrets.AAP_PRD_USERNAME }}
          AAP_PRD_PASSWORD: ${{ secrets.AAP_PRD_PASSWORD }}
          AAP_LAB_HOST: ${{ secrets.AAP_LAB_HOST }}
          AAP_LAB_TOKEN: ${{ secrets.AAP_LAB_TOKEN }}
          AAP_LAB_USERNAME: ${{ secrets.AAP_LAB_USERNAME }}
          AAP_LAB_PASSWORD: ${{ secrets.AAP_LAB_PASSWORD }}
          AAP_PROD_HOST: ${{ secrets.AAP_PROD_HOST }}
          AAP_PROD_TOKEN: ${{ secrets.AAP_PROD_TOKEN }}
          AAP_PROD_USERNAME: ${{ secrets.AAP_PROD_USERNAME }}
          AAP_PROD_PASSWORD: ${{ secrets.AAP_PROD_PASSWORD }}
          AAP_HOST: ${{ secrets.AAP_HOST }}
          AAP_USERNAME: ${{ secrets.AAP_USERNAME }}
          AAP_PASSWORD: ${{ secrets.AAP_PASSWORD }}
          AAP_FANOUT_ALLOW_BASIC: ${{ secrets.AAP_FANOUT_ALLOW_BASIC }}
        run: |
          # Step 1: Ensure config.yml is available
          if [ ! -f "config.yml" ]; then
            echo "config.yml not in local checkout; fetching from platform home repo..."
            FETCH_TOKEN="${FETCH_TOKEN}"
            curl -sf \
              -H "Authorization: Bearer ${FETCH_TOKEN}" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/${{ inputs.platform_scm_org }}/${{ inputs.platform_home_repo || 'casc-platform-global' }}/contents/config.yml?ref=${{ inputs.platform_branch || 'main' }}" \
              -o config.yml
            if [ ! -f "config.yml" ]; then
              echo "ERROR: Could not fetch config.yml from platform home repo"
              exit 1
            fi
          fi

          # Step 2: Resolve target_env from env_branch_map
          export BRANCH="${GITHUB_REF_NAME}"
          python3 <<'PY' > /tmp/target_env.out
          import os, yaml, json, sys
          cfg = yaml.safe_load(open('config.yml')) or {}
          env_map = cfg.get('env_branch_map', {})
          branch = os.environ['BRANCH']

          matching_envs = [env for env, br in env_map.items() if br == branch]

          if not matching_envs:
              print(f'No env_branch_map entry maps branch {branch} to an environment. Skipping dispatch.', file=sys.stderr)
              print('target_env=')
          else:
              print(f'target_env={matching_envs[0]}')
          PY
          cat /tmp/target_env.out >> "$GITHUB_OUTPUT"

      - name: Trigger AAP dispatcher
        if: steps.resolve.outputs.target_env != ''
        env:
          AAP_ENV_TARGETS_JSON: ${{ secrets.AAP_ENV_TARGETS_JSON }}
          AAP_DEV_HOST: ${{ secrets.AAP_DEV_HOST }}
          AAP_DEV_TOKEN: ${{ secrets.AAP_DEV_TOKEN }}
          AAP_DEV_USERNAME: ${{ secrets.AAP_DEV_USERNAME }}
          AAP_DEV_PASSWORD: ${{ secrets.AAP_DEV_PASSWORD }}
          AAP_TST_HOST: ${{ secrets.AAP_TST_HOST }}
          AAP_TST_TOKEN: ${{ secrets.AAP_TST_TOKEN }}
          AAP_TST_USERNAME: ${{ secrets.AAP_TST_USERNAME }}
          AAP_TST_PASSWORD: ${{ secrets.AAP_TST_PASSWORD }}
          AAP_NPR_HOST: ${{ secrets.AAP_NPR_HOST }}
          AAP_NPR_TOKEN: ${{ secrets.AAP_NPR_TOKEN }}
          AAP_NPR_USERNAME: ${{ secrets.AAP_NPR_USERNAME }}
          AAP_NPR_PASSWORD: ${{ secrets.AAP_NPR_PASSWORD }}
          AAP_PRD_HOST: ${{ secrets.AAP_PRD_HOST }}
          AAP_PRD_TOKEN: ${{ secrets.AAP_PRD_TOKEN }}
          AAP_PRD_USERNAME: ${{ secrets.AAP_PRD_USERNAME }}
          AAP_PRD_PASSWORD: ${{ secrets.AAP_PRD_PASSWORD }}
          AAP_LAB_HOST: ${{ secrets.AAP_LAB_HOST }}
          AAP_LAB_TOKEN: ${{ secrets.AAP_LAB_TOKEN }}
          AAP_LAB_USERNAME: ${{ secrets.AAP_LAB_USERNAME }}
          AAP_LAB_PASSWORD: ${{ secrets.AAP_LAB_PASSWORD }}
          AAP_PROD_HOST: ${{ secrets.AAP_PROD_HOST }}
          AAP_PROD_TOKEN: ${{ secrets.AAP_PROD_TOKEN }}
          AAP_PROD_USERNAME: ${{ secrets.AAP_PROD_USERNAME }}
          AAP_PROD_PASSWORD: ${{ secrets.AAP_PROD_PASSWORD }}
          AAP_HOST: ${{ secrets.AAP_HOST }}
          AAP_USERNAME: ${{ secrets.AAP_USERNAME }}
          AAP_PASSWORD: ${{ secrets.AAP_PASSWORD }}
          AAP_FANOUT_ALLOW_BASIC: ${{ secrets.AAP_FANOUT_ALLOW_BASIC }}
          TARGET_ENV: ${{ steps.resolve.outputs.target_env }}
          JT_NAME: ${{ inputs.dispatcher_jt_name }}
          WAIT: ${{ inputs.wait_for_completion }}
          POLL_TIMEOUT: ${{ inputs.poll_timeout_minutes }}
        run: |
          python3 <<'TRIGGER_PY'
          import os, json, sys, subprocess, time

          def normalize_host(raw):
              raw = raw.rstrip('/')
              if raw.startswith('http://') or raw.startswith('https://'):
                  return raw
              return f'https://{raw}'

          def resolve_env_creds(env_key):
              uk = env_key.upper()
              targets = os.environ.get('AAP_ENV_TARGETS_JSON', '')
              if targets:
                  try:
                      t = json.loads(targets)
                      entry = t.get(env_key, {})
                      if entry.get('host') and entry.get('token'):
                          return normalize_host(entry['host']), ['-H', f'Authorization: Bearer {entry["token"]}']
                      if entry.get('host') and entry.get('username') and entry.get('password'):
                          return normalize_host(entry['host']), ['-u', f'{entry["username"]}:{entry["password"]}']
                  except json.JSONDecodeError:
                      pass
              env_host = os.environ.get(f'AAP_{uk}_HOST', '')
              env_token = os.environ.get(f'AAP_{uk}_TOKEN', '')
              if env_host and env_token:
                  return normalize_host(env_host), ['-H', f'Authorization: Bearer {env_token}']
              env_user = os.environ.get(f'AAP_{uk}_USERNAME', '')
              env_pass = os.environ.get(f'AAP_{uk}_PASSWORD', '')
              if env_host and env_user and env_pass:
                  return normalize_host(env_host), ['-u', f'{env_user}:{env_pass}']
              allow_basic = os.environ.get('AAP_FANOUT_ALLOW_BASIC', 'false').lower() == 'true'
              aap_host = os.environ.get('AAP_HOST', '')
              aap_user = os.environ.get('AAP_USERNAME', '')
              aap_pass = os.environ.get('AAP_PASSWORD', '')
              if allow_basic and aap_host and aap_user and aap_pass:
                  return normalize_host(aap_host), ['-u', f'{aap_user}:{aap_pass}']
              return None

          target_env = os.environ['TARGET_ENV']
          jt_name = os.environ.get('JT_NAME', 'jt-platform-casc_dispatcher')
          wait = os.environ.get('WAIT', 'true') == 'true'
          poll_timeout = int(os.environ.get('POLL_TIMEOUT', '30'))

          creds = resolve_env_creds(target_env)
          if creds is None:
              print(f'ERROR: No credentials found for env={target_env}')
              sys.exit(1)
          host, auth_args = creds

          print(f'=== Triggering CasC Dispatcher on {host} | Env: {target_env} | JT: {jt_name} ===')

          jt_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/job_templates/?name={jt_name}']
          jt_result = subprocess.run(jt_cmd, capture_output=True, text=True)
          try:
              jt_data = json.loads(jt_result.stdout)
              jt_id = jt_data['results'][0]['id']
          except (json.JSONDecodeError, KeyError, IndexError):
              print(f"ERROR: JT '{jt_name}' not found on {host}")
              sys.exit(1)

          allow_simul = jt_data['results'][0].get('allow_simultaneous', False)
          if allow_simul:
              print('ERROR: Dispatcher JT has allow_simultaneous=true — must be false')
              sys.exit(1)

          for attempt in range(1, 3):
              busy_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/?job_template={jt_id}&status__in=running,pending,waiting&page_size=1']
              busy_result = subprocess.run(busy_cmd, capture_output=True, text=True)
              try:
                  running = json.loads(busy_result.stdout).get('count', 0)
              except Exception:
                  running = 0
              if running == 0:
                  break
              print(f'  Dispatcher busy ({attempt}/2) — waiting 15s...')
              time.sleep(15)

          extra_vars = json.dumps({
              'target_env': target_env,
              'trigger_commit': os.environ.get('GITHUB_SHA', ''),
              'triggered_repo': os.environ.get('GITHUB_REPOSITORY', '').split('/')[-1],
              'trigger_source': 'ci-cd-pipeline',
          })

          launch_cmd = ['curl', '-sk', '-X', 'POST'] + auth_args + [
              '-H', 'Content-Type: application/json',
              '-d', json.dumps({'extra_vars': extra_vars}),
              f'{host}/api/controller/v2/job_templates/{jt_id}/launch/'
          ]
          launch_result = subprocess.run(launch_cmd, capture_output=True, text=True)
          try:
              job_id = json.loads(launch_result.stdout).get('id')
          except Exception:
              job_id = None

          if not job_id:
              print('ERROR: Failed to launch dispatcher')
              sys.exit(1)

          print(f'Dispatcher launched: ID={job_id}')

          if not wait:
              print('=== FIRE-AND-FORGET ===')
              sys.exit(0)

          poll_checks = (poll_timeout * 60) // 10
          print(f'Polling for completion (timeout: {poll_timeout} min)...')
          for i in range(1, poll_checks + 1):
              time.sleep(10)
              status_cmd = ['curl', '-sk'] + auth_args + [f'{host}/api/controller/v2/jobs/{job_id}/']
              status_result = subprocess.run(status_cmd, capture_output=True, text=True)
              try:
                  status = json.loads(status_result.stdout).get('status', 'unknown')
              except Exception:
                  status = 'unknown'
              print(f'  Status: {status} ({i}/{poll_checks})')
              if status == 'successful':
                  print('=== COMPLETED ===')
                  sys.exit(0)
              elif status in ('failed', 'error', 'canceled'):
                  print(f'=== FAILED ({status}) ===')
                  sys.exit(1)

          print(f'::warning::Job {job_id} still running after {poll_timeout} min')
          TRIGGER_PY
