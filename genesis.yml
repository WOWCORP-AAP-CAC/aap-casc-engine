---
# AAP Multi-Tenant CasC Engine — Platform Genesis
#
# One-time automated setup of the platform control and desired-state repositories
# in the customer's SCM organization. The control repository contains orchestration
# metadata only; desired-state repositories contain AAP configuration only.
#
# Creates one combined platform desired-state repository (default: casc-platform-global).
#
# Supports both GitHub and GitLab. Provider is set via SCM_PROVIDER env var
# (github|gitlab) or auto-detected from scm_base_url.
# SCM-specific operations are delegated to tasks/genesis_scm_{provider}.yml.
# All operations are idempotent — safe to rerun without side effects.
#
# Usage (via AAP Job Template):
#   JT extra vars: scm_base_url, control_scm_org, control_repo, control_branch,
#                  platform_scm_org, platform_repo, repo_mode, env_branch_map (optional)
#   Credential: crd-platform-scm_token (injects SCM_TOKEN)

- name: "AAP Multi-Tenant CasC Engine — Platform Genesis"
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    scm_base_url: "{{ lookup('env', 'SCM_BASE_URL') | default('https://github.com', true) }}"
    scm_api_token: "{{ lookup('env', 'SCM_TOKEN') }}"

    _scm_provider_override: "{{ lookup('env', 'SCM_PROVIDER') | default('') }}"
    scm_provider: >-
      {{ _scm_provider_override
         if _scm_provider_override in ['github', 'gitlab']
         else ('github' if 'github' in scm_base_url else 'gitlab') }}

    platform_scm_org: "{{ lookup('env', 'PLATFORM_SCM_ORG') | default('') }}"
    control_scm_org: "{{ lookup('env', 'CONTROL_SCM_ORG') | default(platform_scm_org, true) }}"
    control_repo: "{{ lookup('env', 'CONTROL_REPO') | default('casc-platform-control', true) }}"
    control_branch: "{{ lookup('env', 'CONTROL_BRANCH') | default('main', true) }}"
    engine_repo: "{{ lookup('env', 'ENGINE_REPO') | default('aap-casc-engine', true) }}"
    aap_engine_host: "{{ lookup('env', 'AAP_ENGINE_HOST') | default('', true) }}"
    repo_visibility: "{{ lookup('env', 'REPO_VISIBILITY') | default('private', true) }}"
    _repo_private: "{{ repo_visibility == 'private' }}"
    repo_mode: "{{ lookup('env', 'REPO_MODE') | default('create', true) }}"
    platform_repo: "{{ lookup('env', 'PLATFORM_REPO') | default('casc-platform-global', true) }}"

    # GitLab-specific: numeric namespace IDs. control_namespace_id defaults to the
    # platform namespace; set it explicitly when control_scm_org is a different group.
    platform_namespace_id: "{{ lookup('env', 'PLATFORM_NAMESPACE_ID') | default('') }}"
    control_namespace_id: "{{ lookup('env', 'CONTROL_NAMESPACE_ID') | default(lookup('env', 'PLATFORM_NAMESPACE_ID') | default('', true), true) }}"

    # Day-0 environment topology — provided via JT extra_vars or survey.
    env_branch_map:
      dev: develop
      tst: release/tst
      npr: release/npr
      prd: main

    create_missing_env_branches: "{{ lookup('env', 'CREATE_MISSING_ENV_BRANCHES') | default(true, true) | bool }}"
    bootstrap_dispatch_fanout: "{{ lookup('env', 'BOOTSTRAP_DISPATCH_FANOUT') | default(true, true) | bool }}"
    genesis_jt_name: "{{ lookup('env', 'GENESIS_JT_NAME') | default('jt-platform-genesis', true) }}"
    bootstrap_jt_name: "{{ lookup('env', 'BOOTSTRAP_JT_NAME') | default('jt-platform-bootstrap_tenant', true) }}"
    dispatcher_jt_name: "{{ lookup('env', 'DISPATCHER_JT_NAME') | default('jt-platform-casc_dispatcher', true) }}"
    drift_detection_jt_name: "{{ lookup('env', 'DRIFT_DETECTION_JT_NAME') | default('jt-platform-drift_detection', true) }}"

    # Platform resource type metadata — maps folders to seed templates.
    # Used by genesis to seed example.yml.sample files in platform repos.
    _platform_type_metadata:
      - { folder: organizations,          template: "templates/seed-aap-organizations.yml.j2" }
      - { folder: teams,                  template: "templates/seed-aap-teams.yml.j2" }
      - { folder: users,                  template: "templates/seed-aap-users.yml.j2" }
      - { folder: role_definitions,       template: "templates/seed-gateway-role_definitions.yml.j2" }
      - { folder: rbac_user_assignments,  template: "templates/seed-gateway-rbac_user_assignments.yml.j2" }
      - { folder: rbac_team_assignments,  template: "templates/seed-gateway-rbac_team_assignments.yml.j2" }
      - { folder: credential_types,       template: "templates/seed-controller-credential_types.yml.j2" }
      - { folder: execution_environments, template: "templates/seed-controller-execution_environments.yml.j2" }
      - { folder: settings,               template: "templates/seed-controller-settings.yml.j2" }
      - { folder: schedules,              template: "templates/seed-controller-schedules-platform.yml.j2" }

    _platform_type_folders: "{{ _platform_type_metadata | map(attribute='folder') | list }}"

  tasks:
    - name: "Reject removed topology launch inputs"
      ansible.builtin.assert:
        that:
          - platform_repo_pattern is not defined
          - platform_repo_names is not defined
          - repo_pattern is not defined
          - repo_names is not defined
          - (lookup('env', 'PLATFORM_REPO_PATTERN') | default('', true) | length) == 0
          - (lookup('env', 'PLATFORM_REPO_NAMES_JSON') | default('', true) | length) == 0
          - (lookup('env', 'REPO_PATTERN') | default('', true) | length) == 0
          - (lookup('env', 'REPO_NAMES_JSON') | default('', true) | length) == 0
        fail_msg: >-
          Removed topology inputs were supplied
          (platform_repo_pattern / platform_repo_names / repo_pattern / repo_names
          or PLATFORM_REPO_PATTERN / PLATFORM_REPO_NAMES_JSON / REPO_PATTERN / REPO_NAMES_JSON).
          Use the scalar platform_repo contract only.

    # ── Compute effective values ───────────────────────────────────────────
    - name: "Compute effective configuration values"
      ansible.builtin.set_fact:
        _effective_env_branch_map: "{{ env_branch_map }}"
        _desired_state_seed_branch: "{{ env_branch_map.values() | list | last }}"

    - name: "Determine platform desired-state repos"
      ansible.builtin.set_fact:
        platform_repos:
          - name: "{{ platform_repo }}"
            description: "Platform AAP desired-state configuration"
            casc_key: platform

    - name: "Build control repository inventory record"
      ansible.builtin.set_fact:
        control_repo_record:
          name: "{{ control_repo }}"
          description: "AAP CasC control plane: configuration, tenant registry, and naming policy"
          repository_class: control

    - name: "Build complete Genesis repository inventory"
      ansible.builtin.set_fact:
        genesis_repos: "{{ [control_repo_record] + (platform_repos | map('combine', {'repository_class': 'platform'}) | list) }}"

    # ── Render control file content ────────────────────────────────────────
    - name: "Render config.yml content"
      ansible.builtin.set_fact:
        _config_yml_content: "{{ lookup('template', 'templates/seed-config.yml.j2') }}"

    - name: "Render tenants.yml content"
      ansible.builtin.set_fact:
        _tenants_yml_content: "{{ lookup('template', 'templates/seed-tenants.yml.j2') }}"

    # ── Validation ─────────────────────────────────────────────────────────
    - name: "Validate required inputs"
      ansible.builtin.assert:
        that:
          - platform_scm_org | length > 0
          - scm_api_token | length > 0
        fail_msg: >-
          platform_scm_org and SCM_TOKEN are required.
          platform_scm_org='{{ platform_scm_org }}', SCM_TOKEN={{ 'set' if scm_api_token | length > 0 else 'MISSING' }}.

    - name: "Validate SCM provider"
      ansible.builtin.assert:
        that:
          - scm_provider in ['github', 'gitlab']
        fail_msg: >-
          scm_provider must be 'github' or 'gitlab'. Got: '{{ scm_provider }}'.

    - name: "Validate control repository contract"
      ansible.builtin.assert:
        that:
          - control_scm_org | length > 0
          - control_repo | length > 0
          - control_branch | length > 0
          - platform_repo | length > 0
          - repo_mode in ['create', 'existing']
          - control_repo not in (platform_repos | map(attribute='name') | list)
        fail_msg: >-
          control_scm_org, control_repo, control_branch, platform_repo, and a distinct
          control repo are required. repo_mode must be create or existing.

    - name: "Validate existing-repository branch behavior"
      ansible.builtin.assert:
        that:
          - create_missing_env_branches | bool or repo_mode == 'existing'
        fail_msg: >-
          create_missing_env_branches=false requires repo_mode=existing so branch topology can be
          verified before Genesis mutates any repository.

    - name: "Validate repo visibility"
      ansible.builtin.assert:
        that:
          - repo_visibility in ['public', 'private']
        fail_msg: >-
          repo_visibility must be 'public' or 'private'. Got: '{{ repo_visibility }}'.

    - name: "Validate GitLab-specific inputs"
      ansible.builtin.assert:
        that:
          - platform_namespace_id | length > 0
          - control_namespace_id | length > 0
          - control_scm_org == platform_scm_org or (control_namespace_id | string) != (platform_namespace_id | string)
        fail_msg: >-
          GitLab Genesis requires platform_namespace_id and control_namespace_id.
          When control_scm_org differs from platform_scm_org, set CONTROL_NAMESPACE_ID
          to the numeric ID of the control group (must not equal PLATFORM_NAMESPACE_ID).
      when:
        - scm_provider == 'gitlab'
        - repo_mode == 'create'

    - name: "Validate env_branch_map structure"
      ansible.builtin.assert:
        that:
          - env_branch_map is mapping
          - env_branch_map | length > 0
        fail_msg: >-
          env_branch_map must be a non-empty dict.
          Got: {{ env_branch_map }}

    - name: "Derive invalid env_branch_map entries"
      ansible.builtin.set_fact:
        _ebm_items: "{{ env_branch_map | dict2items }}"
        _ebm_non_string_keys: "{{ (env_branch_map | dict2items) | rejectattr('key', 'string') | map(attribute='key') | list }}"
        _ebm_empty_keys: "{{ (env_branch_map | dict2items) | selectattr('key', 'string') | selectattr('key', 'equalto', '') | map(attribute='key') | list }}"
        _ebm_bad_env_names: "{{ (env_branch_map | dict2items) | selectattr('key', 'string') | rejectattr('key', 'match', '^[a-z][a-z0-9_]*$') | map(attribute='key') | list }}"
        _ebm_non_string_values: "{{ (env_branch_map | dict2items) | rejectattr('value', 'string') | map(attribute='key') | list }}"
        _ebm_empty_values: "{{ (env_branch_map | dict2items) | selectattr('value', 'string') | selectattr('value', 'match', '^\\s*$') | map(attribute='key') | list }}"

    - name: "Validate env_branch_map keys and values"
      ansible.builtin.assert:
        that:
          - _ebm_non_string_keys | length == 0
          - _ebm_empty_keys | length == 0
          - _ebm_bad_env_names | length == 0
          - _ebm_non_string_values | length == 0
          - _ebm_empty_values | length == 0
          - env_branch_map.values() | list | length == env_branch_map.values() | list | unique | length
        fail_msg: >-
          env_branch_map validation failed.
          Non-string keys: {{ _ebm_non_string_keys }}.
          Empty keys: {{ _ebm_empty_keys }}.
          Invalid env names (must match ^[a-z][a-z0-9_]*$): {{ _ebm_bad_env_names }}.
          Non-string branch values: {{ _ebm_non_string_values }}.
          Empty/whitespace branch values: {{ _ebm_empty_values }}.
          Branch values must be unique: {{ env_branch_map.values() | list }}.
        success_msg: "env_branch_map is valid: {{ env_branch_map }}"

    - name: "Log genesis parameters"
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════
          PLATFORM GENESIS
          ══════════════════════════════════════════════════════
          Provider:       {{ scm_provider }}
          Platform Org:   {{ platform_scm_org }}
          Engine Repo:    {{ engine_repo }}
          Platform Repo:  {{ platform_repo }}
          Visibility:     {{ repo_visibility }}
          Control Repo:   {{ control_scm_org }}/{{ control_repo }} ({{ control_branch }})
          Desired-state branch seed: {{ _desired_state_seed_branch }}
          Repos to create/verify: {{ genesis_repos | length }}
          {% for r in genesis_repos %}
            {{ loop.index }}. {{ r.name }} ({{ r.repository_class }})
          {% endfor %}
          ══════════════════════════════════════════════════════

    # ── SCM Operations ─────────────────────────────────────────────────────
    - name: "Execute {{ scm_provider }} genesis operations"
      ansible.builtin.include_tasks: "tasks/genesis_scm_{{ scm_provider }}.yml"

    # ── Completion ─────────────────────────────────────────────────────────
    - name: "Genesis complete"
      ansible.builtin.debug:
        msg: |
          ══════════════════════════════════════════════════════
          PLATFORM GENESIS COMPLETE
          ══════════════════════════════════════════════════════
          Platform Org:    {{ platform_scm_org }}
          Platform Repo:   {{ platform_repo }}
          Repos Created:   {{ genesis_repos | length }}
          Control Repo:    {{ control_repo }}
          Control Files:   config.yml, tenants.yml (optional naming-rules.yml is customer-owned)
          CI/CD Seeded:    {{ '.github/workflows/casc.yml' if scm_provider == 'github' else '.gitlab-ci.yml' }}
          ══════════════════════════════════════════════════════
          Next steps:
            1. Create AAP Project pointing to {{ platform_scm_org }}/{{ engine_repo }}
            2. Create dispatcher, drift_detection, and bootstrap Job Templates
            3. Run bootstrap to onboard your first tenant
          ══════════════════════════════════════════════════════
