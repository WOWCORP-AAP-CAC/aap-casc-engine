---
# bootstrap_scm_github.yml — GitHub-specific SCM operations for tenant bootstrap
#
# Steps 1-6: Push platform YAML (org/team/RBAC to platform repo(s) at
# folder-based paths), create tenant repos, seed with folder structure,
# set permissions, update tenants.yml, push RBAC. Called from bootstrap.yml.
# All platform writes target _effective_platform_branch.
#
# All operations are idempotent — safe to rerun. File writes use
# GET-then-PUT (with SHA when updating existing files). Repo creation
# tolerates 422 (already exists). tenants.yml updates skip duplicate entries.
#
# Required variables: platform_scm_org, platform_repo, tenant_scm_org,
#   scm_api_token, org_id, _effective_team_group, team_lead,
#   team_lead_username, tenant_repos, repo_pattern, engine_repo

# ═══════════════════════════════════════════════════════════════════════════
# Step 1: Push org + team YAML to platform repo(s) (folder-based paths)
#   - combined: writes to platform_repo at base/organizations/ and base/teams/
#   - per-resource-type: writes to aap-organizations-global and aap-teams-global
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Compute platform target repos and paths"
  ansible.builtin.set_fact:
    _org_target_repo: "{{ 'aap-organizations-global' if platform_repo_pattern == 'per-resource-type' else platform_repo }}"
    _team_target_repo: "{{ 'aap-teams-global' if platform_repo_pattern == 'per-resource-type' else platform_repo }}"
    _org_target_path: "{{ 'base/org-' + org_id + '.yml' if platform_repo_pattern == 'per-resource-type' else 'base/organizations/org-' + org_id + '.yml' }}"
    _team_target_path: "{{ 'base/team-' + org_id + '.yml' if platform_repo_pattern == 'per-resource-type' else 'base/teams/team-' + org_id + '.yml' }}"

- name: "GH – Check if org YAML already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _org_target_repo }}/contents/{{ _org_target_path }}?ref={{ _effective_platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_org_file

- name: "GH – Push organization YAML to platform"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _org_target_repo }}/contents/{{ _org_target_path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: add organization org-' + org_id + ' [skip dispatch]',
          'branch': _effective_platform_branch,
          'content': lookup('template', 'templates/org-template.yml.j2') | b64encode}
         | combine({'sha': _gh_org_file.json.sha} if _gh_org_file.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    org_name: "org-{{ org_id }}"
    org_description: "{{ team_name }} automation organization"
    org_default_ee: "{{ default_ee }}"

- name: "GH – Check if team YAML already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _team_target_repo }}/contents/{{ _team_target_path }}?ref={{ _effective_platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_team_file

- name: "GH – Push team YAML to platform"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _team_target_repo }}/contents/{{ _team_target_path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: add team for org-' + org_id + ' [skip dispatch]',
          'branch': _effective_platform_branch,
          'content': lookup('template', 'templates/team-template.yml.j2') | b64encode}
         | combine({'sha': _gh_team_file.json.sha} if _gh_team_file.status == 200 else {}) }}
    status_code: [200, 201]

# ═══════════════════════════════════════════════════════════════════════════
# Step 2: Create tenant CasC repositories (tolerates already-exists)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Create tenant repos in {{ tenant_scm_org }}"
  ansible.builtin.uri:
    url: "https://api.github.com/orgs/{{ tenant_scm_org }}/repos"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      name: "{{ item }}"
      description: "CasC repo for tenant {{ org_id }} — managed by Hybrid CasC bootstrap"
      private: "{{ _repo_private | bool }}"
      auto_init: true
    status_code: [200, 201, 422]
  failed_when: >-
    _gh_created_repos.status == 422 and
    'already exists' not in (_gh_created_repos.json.errors | default([]) | map(attribute='message', default='') | join(' '))
    and 'already exists' not in (_gh_created_repos.json.message | default(''))
  loop: "{{ tenant_repos }}"
  register: _gh_created_repos

# ═══════════════════════════════════════════════════════════════════════════
# Step 3: Seed repos with pipeline + example YAML (folder-based structure)
#   Seeding BEFORE env branch creation ensures branches inherit these files.
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if thin caller workflow already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item }}/contents/.github/workflows/casc.yml"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ tenant_repos }}"
  register: _gh_workflow_checks

- name: "GH – Seed thin caller workflow in each tenant repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item }}/contents/.github/workflows/casc.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: add CasC pipeline-as-a-service (thin caller) [skip dispatch]',
          'content': lookup('template', 'templates/github-workflow-caller.yml.j2') | b64encode}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_workflow_checks.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: "GH – Build seed file list (type-aware paths for both patterns)"
  ansible.builtin.set_fact:
    _seed_items: "{{ _seed_items | default([]) + [{'repo': _repo_name, 'path': 'base/' + item.folder + '/example.yml.sample', 'template': item.template, 'folder': item.folder}] }}"
  loop: "{{ _tenant_types }}"
  vars:
    _repo_name: "{{ (item.basename + '-' + org_id) if repo_pattern == 'per-resource-type' else tenant_repos[0] }}"

- name: "GH – Check if seed files already exist"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.repo }}/contents/{{ item.path }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _seed_items }}"
  loop_control:
    label: "{{ item.repo }}:{{ item.path }}"
  register: _gh_seed_checks

- name: "GH – Seed example YAML in tenant repos (correct type folders)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item.repo }}/contents/{{ item.item.path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: add ' + item.item.folder + ' example YAML (rename to .yml to activate) [skip dispatch]',
          'content': _seed_content | b64encode}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    _seed_content: "{{ lookup('template', item.item.template) }}"
  loop: "{{ _gh_seed_checks.results }}"
  loop_control:
    label: "{{ item.item.repo }}:{{ item.item.path }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 3b: Create environment branches in each tenant repo (if enabled)
#   Done AFTER seeding so branches inherit CI caller + example YAML.
#   Re-fetches default branch HEAD SHA to include seeded commits.
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Get default branch info for each tenant repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ tenant_repos }}"
  register: _gh_repo_info
  when: _create_missing_env_branches | bool

- name: "GH – Get default branch HEAD SHA for each tenant repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ item.json.default_branch }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _gh_repo_info.results }}"
  loop_control:
    label: "{{ item.json.name }}"
  register: _gh_default_refs
  when: _create_missing_env_branches | bool

- name: "GH – Create environment branches in tenant repos"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.item.json.name }}/git/refs"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      ref: "refs/heads/{{ item.1.value }}"
      sha: "{{ item.0.json.object.sha }}"
    status_code: [200, 201, 422]
  failed_when: >-
    _gh_env_branch_result.status == 422 and
    'Reference already exists' not in (_gh_env_branch_result.json.message | default(''))
  loop: "{{ _gh_default_refs.results | product(_env_branch_map | dict2items) | list }}"
  loop_control:
    label: "{{ item.0.item.json.name }}:{{ item.1.value }}"
  register: _gh_env_branch_result
  when: _create_missing_env_branches | bool

# ═══════════════════════════════════════════════════════════════════════════
# Step 4: Set repository permissions (idempotent — PUT is naturally so)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Grant team lead collaborator access to tenant repos"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item }}/collaborators/{{ team_lead_username }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      permission: "maintain"
    status_code: [200, 201, 204]
  loop: "{{ tenant_repos }}"
  when: team_lead_username | default('') | length > 0

# ═══════════════════════════════════════════════════════════════════════════
# Step 5: Update tenants.yml in platform home repo (dedup-safe)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Get current tenants.yml from platform repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ platform_repo }}/contents/tenants.yml?ref={{ _effective_platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  register: _gh_tenants_file

- name: "GH – Parse current tenants.yml"
  ansible.builtin.set_fact:
    _current_tenants: "{{ (_gh_tenants_file.json.content | b64decode) | from_yaml }}"
    _tenants_sha: "{{ _gh_tenants_file.json.sha }}"

- name: "GH – Check if tenant already registered"
  ansible.builtin.set_fact:
    _existing_org_ids: "{{ _current_tenants.tenants | default([]) | map(attribute='org_id') | list }}"

- name: "GH – Build new tenant entry"
  ansible.builtin.set_fact:
    _new_tenant_entry:
      org_id: "{{ org_id }}"
      team_name: "{{ team_name }}"
      team_lead: "{{ team_lead }}"
      tenant_scm_org: "{{ tenant_scm_org }}"
      repo_pattern: "{{ repo_pattern }}"
      status: active
  when: org_id not in _existing_org_ids

- name: "GH – Update tenants.yml with new tenant"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ platform_repo }}/contents/tenants.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Bootstrap: register tenant {{ org_id }} [skip dispatch]"
      branch: "{{ _effective_platform_branch }}"
      content: "{{ _updated_tenants | to_nice_yaml(indent=2) | b64encode }}"
      sha: "{{ _tenants_sha }}"
    status_code: [200, 201]
  vars:
    _updated_tenants: "{{ _current_tenants | combine({'tenants': _current_tenants.tenants | default([]) + [_new_tenant_entry]}) }}"
  when: _new_tenant_entry is defined

# ═══════════════════════════════════════════════════════════════════════════
# Step 6: Push RBAC YAML to platform repo(s) on _effective_platform_branch
#   Uses name-based assignment (no AAP API lookup needed).
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Compute RBAC target repos and paths"
  ansible.builtin.set_fact:
    _rbac_user_repo: "{{ 'gateway-role_user_assignments-global' if platform_repo_pattern == 'per-resource-type' else platform_repo }}"
    _rbac_team_repo: "{{ 'gateway-role_team_assignments-global' if platform_repo_pattern == 'per-resource-type' else platform_repo }}"
    _rbac_user_path: "{{ 'base/rbac-user-' + org_id + '.yml' if platform_repo_pattern == 'per-resource-type' else 'base/rbac_user_assignments/rbac-user-' + org_id + '.yml' }}"
    _rbac_team_path: "{{ 'base/rbac-team-' + org_id + '.yml' if platform_repo_pattern == 'per-resource-type' else 'base/rbac_team_assignments/rbac-team-' + org_id + '.yml' }}"

- name: "GH – Check if RBAC user YAML already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _rbac_user_repo }}/contents/{{ _rbac_user_path }}?ref={{ _effective_platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_rbac_user_file

- name: "GH – Push RBAC user assignments"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _rbac_user_repo }}/contents/{{ _rbac_user_path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: add RBAC user assignments for org-' + org_id + ' [skip dispatch]',
          'branch': _effective_platform_branch,
          'content': lookup('template', 'templates/rbac-user-template.yml.j2') | b64encode}
         | combine({'sha': _gh_rbac_user_file.json.sha} if _gh_rbac_user_file.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    admin_user: "{{ team_lead }}"

- name: "GH – Check if RBAC team YAML already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _rbac_team_repo }}/contents/{{ _rbac_team_path }}?ref={{ _effective_platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_rbac_team_file

- name: "GH – Push RBAC team assignments"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _rbac_team_repo }}/contents/{{ _rbac_team_path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: add RBAC team assignments for org-' + org_id + ' [skip dispatch]',
          'branch': _effective_platform_branch,
          'content': lookup('template', 'templates/rbac-team-template.yml.j2') | b64encode}
         | combine({'sha': _gh_rbac_team_file.json.sha} if _gh_rbac_team_file.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    dev_team: "{{ _effective_team_group }}"
