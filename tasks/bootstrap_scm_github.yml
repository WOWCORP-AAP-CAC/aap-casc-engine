---
# GitHub Bootstrap provider implementation. All non-mutating ownership,
# marker, branch, policy, and foundation checks complete before managed writes.

- name: "GH - Build Greenfield foundation targets"
  ansible.builtin.set_fact:
    _foundation_files:
      - repo: "{{ platform_repo }}"
        path: "base/organizations/{{ _effective_tenant_id }}.yml"
        content: "{{ _org_foundation_content }}"
        label: organization
      - repo: "{{ platform_repo }}"
        path: "base/teams/{{ _effective_tenant_id }}.yml"
        content: "{{ _team_foundation_content }}"
        label: team
  when: onboarding_mode == 'greenfield'

- name: "GH - Check requested tenant repositories"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _tenant_repositories }}"
  register: _gh_repo_preflight

- name: "GH - Require every pre-created tenant repository"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: "repo_mode=existing requires pre-created repository {{ tenant_scm_org }}/{{ item.item }}."
  loop: "{{ _gh_repo_preflight.results }}"
  when: repo_mode == 'existing'

- name: "GH - Check scaffold markers on all existing mapped branches"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.name }}/contents/.aap-casc-engine/tenant-scaffold.yml?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _tenant_repo_records | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0.name }}@{{ item.1 }}"
  register: _gh_marker_preflight

- name: "GH - Validate every existing scaffold marker"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
      - scaffold-marker
      - --tenant-json
      - "{{ _tenant_runtime | to_json }}"
      - --repository
      - "{{ item.item.0.name }}"
      - --actual-json
      - "{{ (item.json.content | b64decode | from_yaml) | to_json }}"
  loop: "{{ _gh_marker_preflight.results }}"
  loop_control:
    label: "{{ item.item.0.name }}@{{ item.item.1 }}"
  when: (item.status | default(0)) == 200
  changed_when: false

- name: "GH - Check scaffold markers on existing repository default branches"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item }}/contents/.aap-casc-engine/tenant-scaffold.yml?ref={{ item.json.default_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _gh_repo_preflight.results }}"
  loop_control:
    label: "{{ item.item }}@{{ item.json.default_branch | default('-') }}"
  when:
    - item.status == 200
    - item.json.default_branch | default('') | length > 0
  register: _gh_default_marker_preflight

- name: "GH - Validate every existing default-branch scaffold marker"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
      - scaffold-marker
      - --tenant-json
      - "{{ _tenant_runtime | to_json }}"
      - --repository
      - "{{ item.item.item }}"
      - --actual-json
      - "{{ (item.json.content | b64decode | from_yaml) | to_json }}"
  loop: >-
    {{ (_gh_default_marker_preflight.results | default([]))
       | selectattr('skipped', 'undefined')
       | selectattr('status', 'defined')
       | selectattr('status', 'equalto', 200)
       | list }}
  loop_control:
    label: "{{ item.item.item }}@{{ item.item.json.default_branch | default('-') }}"
  when: (_gh_default_marker_preflight.results | default([]) | length) > 0
  changed_when: false

- name: "GH - Check existing environment branches"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0 }}/git/ref/heads/{{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404, 409]
  loop: "{{ _tenant_repositories | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0 }}@{{ item.1 }}"
  register: _gh_branch_preflight

- name: "GH - Fail when branch creation is disabled and a branch is missing"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: >-
      Required branch {{ item.item.1 }} is missing from {{ tenant_scm_org }}/{{ item.item.0 }}
      and create_missing_env_branches=false.
  loop: "{{ _gh_branch_preflight.results | default([]) }}"
  when:
    - not _create_missing_env_branches | bool

- name: "GH - Check every existing foundation target before any foundation write"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.repo }}/contents/{{ item.0.path }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ (_foundation_files | default([])) | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0.repo }}@{{ item.1 }}:{{ item.0.path }}"
  register: _gh_foundation_preflight
  when: onboarding_mode == 'greenfield'

- name: "GH - Require every Greenfield platform branch before tenant mutation"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0 }}/git/ref/heads/{{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ (_foundation_files | default([]) | map(attribute='repo') | unique | list) | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0 }}@{{ item.1 }}"
  register: _gh_platform_branch_preflight
  when: onboarding_mode == 'greenfield'

- name: "GH - Fail when a required Greenfield platform branch is missing"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: >-
      Required platform branch {{ item.item.1 }} is missing from
      {{ platform_scm_org }}/{{ item.item.0 }}. Run Genesis branch convergence first.
  loop: "{{ _gh_platform_branch_preflight.results | default([]) }}"
  when: onboarding_mode == 'greenfield'

- name: "GH - Reject occupied foundation paths with different content"
  ansible.builtin.assert:
    that:
      - item.status == 404 or (item.json.content | b64decode) == item.item.0.content
    fail_msg: >-
      Foundation path {{ item.item.0.repo }}@{{ item.item.1 }}:{{ item.item.0.path }}
      already contains different content. Refusing to take ownership.
  loop: "{{ _gh_foundation_preflight.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.repo }}@{{ item.item.1 }}:{{ item.item.0.path }}"
  when: onboarding_mode == 'greenfield'

# Mutation begins only after all preflight checks above pass.
- name: "GH - Create missing tenant repositories"
  ansible.builtin.uri:
    url: "https://api.github.com/orgs/{{ tenant_scm_org }}/repos"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      name: "{{ item.item }}"
      description: "CasC repo for tenant {{ _effective_tenant_id }} - managed by AAP Multi-Tenant CasC Engine"
      private: "{{ _repo_private | bool }}"
      auto_init: true
    status_code: [200, 201]
  loop: "{{ _gh_repo_preflight.results }}"
  when:
    - repo_mode == 'create'
    - item.status == 404

- name: "GH - Read tenant repository default branches"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _tenant_repositories }}"
  register: _gh_repo_info

- name: "GH - Check seeded default branch tips"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ item.json.default_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404, 409]
  loop: "{{ _gh_repo_info.results }}"
  register: _gh_default_ref_checks
  when: _create_missing_env_branches | bool

- name: "GH - Reject unresolved non-empty default branches"
  ansible.builtin.assert:
    that:
      - item.status == 200 or (item.status in [404, 409] and (item.item.json.size | int) == 0)
    fail_msg: >-
      Cannot resolve default branch {{ item.item.json.default_branch }} for
      {{ tenant_scm_org }}/{{ item.item.json.name }}. Refusing to initialize a
      repository that GitHub does not report as empty.
  loop: "{{ _gh_default_ref_checks.results | default([]) }}"
  when: _create_missing_env_branches | bool

- name: "GH - Initialize empty tenant repositories with their immutable marker"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item.json.name }}/contents/.aap-casc-engine/tenant-scaffold.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Bootstrap: initialize tenant scaffold identity [skip ci]"
      content: "{{ _marker_content | b64encode }}"
    status_code: [200, 201]
  vars:
    _current_scaffold_marker: "{{ _scaffold_markers[item.item.json.name] }}"
    _marker_content: "{{ lookup('template', 'templates/tenant-scaffold.yml.j2') }}"
  loop: "{{ _gh_default_ref_checks.results | default([]) }}"
  loop_control:
    label: "{{ item.item.json.name }}"
  when:
    - _create_missing_env_branches | bool
    - item.status in [404, 409]

- name: "GH - Resolve initialized default branch tips"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ item.json.default_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404, 409]
  loop: "{{ _gh_repo_info.results }}"
  register: _gh_default_refs
  retries: 5
  delay: 1
  until: _gh_default_refs.status == 200
  when: _create_missing_env_branches | bool

- name: "GH - Compute high-to-low branch topology"
  ansible.builtin.set_fact:
    _tenant_highest_env_branch: "{{ _mapped_branches | last }}"
    _tenant_lower_env_branches: "{{ (_mapped_branches | reverse | list)[1:] }}"
  when: _create_missing_env_branches | bool

- name: "GH - Ensure highest environment branch from seeded tip"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item.json.name }}/git/refs"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      ref: "refs/heads/{{ _tenant_highest_env_branch }}"
      sha: "{{ item.json.object.sha }}"
    status_code: [200, 201, 422]
  failed_when: >-
    _gh_high_branch_result.status == 422 and
    'Reference already exists' not in (_gh_high_branch_result.json.message | default(''))
  loop: "{{ _gh_default_refs.results | default([]) }}"
  register: _gh_high_branch_result
  when:
    - _create_missing_env_branches | bool
    - item.item.json.default_branch != _tenant_highest_env_branch

- name: "GH - Resolve highest environment branch tips"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ _tenant_highest_env_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _gh_repo_info.results }}"
  register: _gh_high_branch_refs
  when: _create_missing_env_branches | bool

- name: "GH - Create lower branches from the highest branch tip"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.item.json.name }}/git/refs"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      ref: "refs/heads/{{ item.1 }}"
      sha: "{{ item.0.json.object.sha }}"
    status_code: [200, 201, 422]
  failed_when: >-
    _gh_lower_branch_result.status == 422 and
    'Reference already exists' not in (_gh_lower_branch_result.json.message | default(''))
  loop: "{{ (_gh_high_branch_refs.results | default([])) | product(_tenant_lower_env_branches | default([])) | list }}"
  register: _gh_lower_branch_result
  when: _create_missing_env_branches | bool

- name: "GH - Recheck scaffold markers after branch convergence"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.name }}/contents/.aap-casc-engine/tenant-scaffold.yml?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _tenant_repo_records | product(_mapped_branches) | list }}"
  register: _gh_marker_checks

- name: "GH - Write missing immutable scaffold markers before content scaffolding"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item.0.name }}/contents/.aap-casc-engine/tenant-scaffold.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Bootstrap: record tenant scaffold identity [skip ci]"
      branch: "{{ item.item.1 }}"
      content: "{{ _marker_content | b64encode }}"
    status_code: [200, 201]
  vars:
    _current_scaffold_marker: "{{ _scaffold_markers[item.item.0.name] }}"
    _marker_content: "{{ lookup('template', 'templates/tenant-scaffold.yml.j2') }}"
  loop: "{{ _gh_marker_checks.results }}"
  when: item.status == 404

- name: "GH - Build tenant scaffold file inventory"
  ansible.builtin.set_fact:
    _tenant_scaffold_files: []

- name: "GH - Add examples and environment folders to scaffold inventory"
  ansible.builtin.set_fact:
    _tenant_scaffold_files: >-
      {{ _tenant_scaffold_files
         + [{'repo': _tenant_repository,
             'path': 'base/' + item.folder + '/example.yml.sample',
             'content': lookup('template', item.template),
             'kind': 'example'}] }}
  loop: "{{ _tenant_types }}"

- name: "GH - Add environment folders to scaffold inventory"
  ansible.builtin.set_fact:
    _tenant_scaffold_files: >-
      {{ _tenant_scaffold_files
         + [{'repo': _tenant_repository,
             'path': item.1 + '/' + item.0.folder + '/.gitkeep',
             'content': '',
             'kind': 'folder'}] }}
  loop: "{{ _tenant_types | product(_env_branch_map.keys() | list) | list }}"

- name: "GH - Check thin callers on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0 }}/contents/.github/workflows/casc.yml?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _tenant_repositories | product(_mapped_branches) | list }}"
  register: _gh_caller_checks

- name: "GH - Converge thin callers on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item.0 }}/contents/.github/workflows/casc.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Bootstrap: converge CasC thin caller [skip ci]',
          'branch': item.item.1,
          'content': _caller_content | b64encode}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    caller_role: tenant
    _caller_content: "{{ lookup('template', 'templates/github-workflow-caller.yml.j2') }}"
  loop: "{{ _gh_caller_checks.results }}"
  when: item.status == 404 or (item.json.content | b64decode) != _caller_content

- name: "GH - Check scaffold examples and folders on every branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.repo }}/contents/{{ item.0.path }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _tenant_scaffold_files | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0.repo }}@{{ item.1 }}:{{ item.0.path }}"
  register: _gh_scaffold_checks

- name: "GH - Create missing scaffold examples and folders"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.item.0.repo }}/contents/{{ item.item.0.path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Bootstrap: add managed {{ item.item.0.kind }} scaffold [skip ci]"
      branch: "{{ item.item.1 }}"
      content: "{{ item.item.0.content | b64encode }}"
    status_code: [200, 201]
  loop: "{{ _gh_scaffold_checks.results }}"
  when: item.status == 404

- name: "GH - Write missing Greenfield foundation files on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.0.repo }}/contents/{{ item.item.0.path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Bootstrap: add {{ item.item.0.label }} foundation for {{ _effective_tenant_id }} [skip ci]"
      branch: "{{ item.item.1 }}"
      content: "{{ item.item.0.content | b64encode }}"
    status_code: [200, 201]
  loop: "{{ _gh_foundation_preflight.results | default([]) }}"
  when:
    - onboarding_mode == 'greenfield'
    - item.status == 404

- name: "GH - Verify final scaffold markers"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.name }}/contents/.aap-casc-engine/tenant-scaffold.yml?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _tenant_repo_records | product(_mapped_branches) | list }}"
  register: _gh_final_marker_checks

- name: "GH - Validate final scaffold marker content"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
      - scaffold-marker
      - --tenant-json
      - "{{ _tenant_runtime | to_json }}"
      - --repository
      - "{{ item.item.0.name }}"
      - --actual-json
      - "{{ (item.json.content | b64decode | from_yaml) | to_json }}"
  loop: "{{ _gh_final_marker_checks.results }}"
  changed_when: false

- name: "GH - Verify final thin caller content"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0 }}/contents/.github/workflows/casc.yml?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _tenant_repositories | product(_mapped_branches) | list }}"
  register: _gh_final_caller_checks

- name: "GH - Assert final thin callers match the engine template"
  ansible.builtin.assert:
    that:
      - (item.json.content | b64decode) == _caller_content
    fail_msg: "Thin caller convergence failed for {{ item.item.0 }}@{{ item.item.1 }}."
  vars:
    caller_role: tenant
    _caller_content: "{{ lookup('template', 'templates/github-workflow-caller.yml.j2') }}"
  loop: "{{ _gh_final_caller_checks.results }}"

- name: "GH - Verify required scaffold files exist"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ tenant_scm_org }}/{{ item.0.repo }}/contents/{{ item.0.path }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _tenant_scaffold_files | product(_mapped_branches) | list }}"

- name: "GH - Verify final Greenfield foundation content"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.repo }}/contents/{{ item.0.path }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ (_foundation_files | default([])) | product(_mapped_branches) | list }}"
  register: _gh_final_foundation_checks
  when: onboarding_mode == 'greenfield'

- name: "GH - Assert final Greenfield foundation content"
  ansible.builtin.assert:
    that:
      - (item.json.content | b64decode) == item.item.0.content
    fail_msg: >-
      Foundation convergence failed for
      {{ item.item.0.repo }}@{{ item.item.1 }}:{{ item.item.0.path }}.
  loop: "{{ _gh_final_foundation_checks.results | default([]) }}"
  when: onboarding_mode == 'greenfield'

- name: "GH - Read current tenant registry for survey fallback"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/tenants.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  register: _gh_tenants_file
  when: not _tenant_registered | bool

- name: "GH - Build and validate survey registry candidate"
  when: not _tenant_registered | bool
  block:
    - name: "GH - Build survey registry candidate"
      ansible.builtin.set_fact:
        _survey_registry_candidate: >-
          {{ _current_tenants
             | combine({'tenants': _current_tenants.tenants | default([])
                                    + [_tenant_registry_entry]}) }}
      vars:
        _current_tenants: "{{ (_gh_tenants_file.json.content | b64decode) | from_yaml }}"

    - name: "GH - Write survey registry candidate for validation"
      ansible.builtin.copy:
        dest: "{{ bootstrap_clone_dir }}/survey-registry-candidate.yml"
        content: "{{ _survey_registry_candidate | to_nice_yaml(indent=2) }}"
        mode: "0600"

    - name: "GH - Validate latest survey registry candidate"
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
          - validate-registry
          - --config
          - "{{ bootstrap_clone_dir }}/{{ control_repo }}/config.yml"
          - --tenants
          - "{{ bootstrap_clone_dir }}/survey-registry-candidate.yml"
      changed_when: false

- name: "GH - Register successful survey Bootstrap"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/tenants.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Bootstrap: register tenant {{ _effective_tenant_id }} [skip ci]"
      branch: "{{ control_branch }}"
      content: "{{ _survey_registry_candidate | to_nice_yaml(indent=2) | b64encode }}"
      sha: "{{ _gh_tenants_file.json.sha }}"
    status_code: [200, 201]
  when: not _tenant_registered | bool
