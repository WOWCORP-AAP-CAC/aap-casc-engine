---
# GitLab Bootstrap provider implementation. It mirrors the GitHub ownership,
# branch, foundation, caller, marker, and survey-fallback contracts.

- name: "GL - Build Greenfield foundation targets"
  ansible.builtin.set_fact:
    _foundation_files:
      - repo: "{{ platform_repo }}"
        path: "base/organizations/{{ _effective_tenant_id }}.yml"
        content: "{{ _org_foundation_content }}"
        label: organization
      - repo: "{{ platform_repo }}"
        path: "base/teams/{{ _effective_tenant_id }}.yml"
        content: "{{ _team_foundation_content }}"
        label: team
  when: onboarding_mode == 'greenfield'

- name: "GL - Check requested tenant projects"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (tenant_scm_org ~ '/' ~ item) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _tenant_repositories }}"
  register: _gl_repo_preflight

- name: "GL - Require every pre-created tenant project"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: "repo_mode=existing requires pre-created project {{ tenant_scm_org }}/{{ item.item }}."
  loop: "{{ _gl_repo_preflight.results }}"
  when: repo_mode == 'existing'

- name: "GL - Build existing project records"
  ansible.builtin.set_fact:
    _gl_existing_projects: >-
      {{ _gl_existing_projects | default([])
         + [{'name': item.item,
             'id': item.json.id,
             'default_branch': item.json.default_branch}] }}
  loop: "{{ _gl_repo_preflight.results }}"
  when: (item.status | default(0)) == 200

- name: "GL - Require repositories to pre-exist when branch creation is disabled"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: >-
      create_missing_env_branches=false requires pre-created project
      {{ tenant_scm_org }}/{{ item.item }} with every mapped branch.
  loop: "{{ _gl_repo_preflight.results }}"
  when: not _create_missing_env_branches | bool

- name: "GL - Check scaffold markers on all existing mapped branches"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.id }}/repository/files/{{ '.aap-casc-engine/tenant-scaffold.yml' | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ (_gl_existing_projects | default([])) | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0.name }}@{{ item.1 }}"
  register: _gl_marker_preflight

- name: "GL - Validate every existing scaffold marker"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
      - scaffold-marker
      - --tenant-json
      - "{{ _tenant_runtime | to_json }}"
      - --repository
      - "{{ item.item.0.name }}"
      - --actual-json
      - "{{ (item.json.content | b64decode | from_yaml) | to_json }}"
  loop: "{{ _gl_marker_preflight.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.name }}@{{ item.item.1 }}"
  when: (item.status | default(0)) == 200
  changed_when: false

- name: "GL - Check scaffold markers on existing project default branches"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.id }}/repository/files/{{ '.aap-casc-engine/tenant-scaffold.yml' | urlencode() | replace('/', '%2F') }}?ref={{ item.default_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_existing_projects | default([]) }}"
  loop_control:
    label: "{{ item.name }}@{{ item.default_branch }}"
  register: _gl_default_marker_preflight
  when: item.default_branch | default('') | length > 0

- name: "GL - Validate every existing default-branch scaffold marker"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
      - scaffold-marker
      - --tenant-json
      - "{{ _tenant_runtime | to_json }}"
      - --repository
      - "{{ item.item.name }}"
      - --actual-json
      - "{{ (item.json.content | b64decode | from_yaml) | to_json }}"
  loop: >-
    {{ (_gl_default_marker_preflight.results | default([]))
       | selectattr('skipped', 'undefined')
       | selectattr('status', 'defined')
       | selectattr('status', 'equalto', 200)
       | list }}
  loop_control:
    label: "{{ item.item.name }}@{{ item.item.default_branch | default('-') }}"
  when: (_gl_default_marker_preflight.results | default([]) | length) > 0
  changed_when: false

- name: "GL - Check existing environment branches"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.id }}/repository/branches/{{ item.1 | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404, 409]
  loop: "{{ (_gl_existing_projects | default([])) | product(_mapped_branches) | list }}"
  register: _gl_branch_preflight

- name: "GL - Fail when branch creation is disabled and a branch is missing"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: >-
      Required branch {{ item.item.1 }} is missing from {{ tenant_scm_org }}/{{ item.item.0.name }}
      and create_missing_env_branches=false.
  loop: "{{ _gl_branch_preflight.results | default([]) }}"
  when:
    - not _create_missing_env_branches | bool

- name: "GL - Resolve Greenfield foundation projects"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (platform_scm_org ~ '/' ~ item.repo) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ _foundation_files | default([]) }}"
  register: _gl_foundation_projects
  when: onboarding_mode == 'greenfield'

- name: "GL - Check every existing foundation target before any foundation write"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/files/{{ item.0.item.path | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ (_gl_foundation_projects.results | default([])) | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0.item.repo }}@{{ item.1 }}:{{ item.0.item.path }}"
  register: _gl_foundation_preflight
  when: onboarding_mode == 'greenfield'

- name: "GL - Require every Greenfield platform branch before tenant mutation"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/branches/{{ item.1 | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ (_gl_foundation_projects.results | default([])) | product(_mapped_branches) | list }}"
  loop_control:
    label: "{{ item.0.item.repo }}@{{ item.1 }}"
  register: _gl_platform_branch_preflight
  when: onboarding_mode == 'greenfield'

- name: "GL - Fail when a required Greenfield platform branch is missing"
  ansible.builtin.assert:
    that:
      - item.status == 200
    fail_msg: >-
      Required platform branch {{ item.item.1 }} is missing from
      {{ platform_scm_org }}/{{ item.item.0.item.repo }}. Run Genesis branch convergence first.
  loop: "{{ _gl_platform_branch_preflight.results | default([]) }}"
  when: onboarding_mode == 'greenfield'

- name: "GL - Reject occupied foundation paths with different content"
  ansible.builtin.assert:
    that:
      - item.status == 404 or (item.json.content | b64decode) == item.item.0.item.content
    fail_msg: >-
      Foundation path {{ item.item.0.item.repo }}@{{ item.item.1 }}:{{ item.item.0.item.path }}
      already contains different content. Refusing to take ownership.
  loop: "{{ _gl_foundation_preflight.results | default([]) }}"
  when: onboarding_mode == 'greenfield'

# Mutation begins only after all preflight checks above pass.
- name: "GL - Create missing tenant projects"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      name: "{{ item.item }}"
      namespace_id: "{{ tenant_scm_namespace_id }}"
      visibility: "{{ repo_visibility }}"
      initialize_with_readme: true
    status_code: [200, 201]
  loop: "{{ _gl_repo_preflight.results }}"
  when:
    - repo_mode == 'create'
    - item.status == 404

- name: "GL - Resolve all tenant projects"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (tenant_scm_org ~ '/' ~ item) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ _tenant_repositories }}"
  register: _gl_tenant_projects

- name: "GL - Index tenant project IDs"
  ansible.builtin.set_fact:
    _gl_tenant_project_by_name: >-
      {{ _gl_tenant_project_by_name | default({}) | combine({item.item: item.json.id}) }}
  loop: "{{ _gl_tenant_projects.results }}"

- name: "GL - Compute high-to-low branch topology"
  ansible.builtin.set_fact:
    _tenant_highest_env_branch: "{{ _mapped_branches | last }}"
    _tenant_lower_env_branches: "{{ (_mapped_branches | reverse | list)[1:] }}"
  when: _create_missing_env_branches | bool

- name: "GL - Initialize empty tenant projects with their immutable marker"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/{{ '.aap-casc-engine/tenant-scaffold.yml' | urlencode() | replace('/', '%2F') }}"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ _tenant_highest_env_branch }}"
      content: "{{ _marker_content }}"
      commit_message: "Bootstrap: initialize tenant scaffold identity [skip ci]"
    status_code: [200, 201]
  vars:
    _current_scaffold_marker: "{{ _scaffold_markers[item.item] }}"
    _marker_content: "{{ lookup('template', 'templates/tenant-scaffold.yml.j2') }}"
  loop: "{{ _gl_tenant_projects.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - _create_missing_env_branches | bool
    - item.json.empty_repo | default(false) | bool

- name: "GL - Refresh initialized tenant projects"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (tenant_scm_org ~ '/' ~ item) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ _tenant_repositories }}"
  register: _gl_tenant_projects
  retries: 5
  delay: 1
  until: not (_gl_tenant_projects.json.empty_repo | default(false) | bool)
  when: _create_missing_env_branches | bool

- name: "GL - Ensure highest environment branch from seeded tip"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/branches"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ _tenant_highest_env_branch }}"
      ref: "{{ item.json.default_branch }}"
    status_code: [200, 201, 400]
  failed_when: >-
    _gl_high_branch_result.status == 400 and
    'already exists' not in (_gl_high_branch_result.json.message | default('') | lower)
  loop: "{{ _gl_tenant_projects.results }}"
  register: _gl_high_branch_result
  when:
    - _create_missing_env_branches | bool
    - item.json.default_branch != _tenant_highest_env_branch

- name: "GL - Create lower branches from the highest branch"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/branches"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ item.1 }}"
      ref: "{{ _tenant_highest_env_branch }}"
    status_code: [200, 201, 400]
  failed_when: >-
    _gl_lower_branch_result.status == 400 and
    'already exists' not in (_gl_lower_branch_result.json.message | default('') | lower)
  loop: "{{ _gl_tenant_projects.results | product(_tenant_lower_env_branches | default([])) | list }}"
  register: _gl_lower_branch_result
  when: _create_missing_env_branches | bool

- name: "GL - Recheck scaffold markers after branch convergence"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.0.name] }}/repository/files/{{ '.aap-casc-engine/tenant-scaffold.yml' | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _tenant_repo_records | product(_mapped_branches) | list }}"
  register: _gl_marker_checks

- name: "GL - Write missing immutable scaffold markers before content scaffolding"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.item.0.name] }}/repository/files/{{ '.aap-casc-engine/tenant-scaffold.yml' | urlencode() | replace('/', '%2F') }}"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ item.item.1 }}"
      content: "{{ _marker_content }}"
      commit_message: "Bootstrap: record tenant scaffold identity [skip ci]"
    status_code: [200, 201]
  vars:
    _current_scaffold_marker: "{{ _scaffold_markers[item.item.0.name] }}"
    _marker_content: "{{ lookup('template', 'templates/tenant-scaffold.yml.j2') }}"
  loop: "{{ _gl_marker_checks.results }}"
  when: item.status == 404

- name: "GL - Build tenant scaffold file inventory"
  ansible.builtin.set_fact:
    _tenant_scaffold_files: []

- name: "GL - Add examples to scaffold inventory"
  ansible.builtin.set_fact:
    _tenant_scaffold_files: >-
      {{ _tenant_scaffold_files
         + [{'repo': _tenant_repository,
             'path': 'base/' + item.folder + '/example.yml.sample',
             'content': lookup('template', item.template),
             'kind': 'example'}] }}
  loop: "{{ _tenant_types }}"

- name: "GL - Add environment folders to scaffold inventory"
  ansible.builtin.set_fact:
    _tenant_scaffold_files: >-
      {{ _tenant_scaffold_files
         + [{'repo': _tenant_repository,
             'path': item.1 + '/' + item.0.folder + '/.gitkeep',
             'content': '',
             'kind': 'folder'}] }}
  loop: "{{ _tenant_types | product(_env_branch_map.keys() | list) | list }}"

- name: "GL - Check thin callers on every mapped branch"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.0] }}/repository/files/{{ '.gitlab-ci.yml' | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _tenant_repositories | product(_mapped_branches) | list }}"
  register: _gl_caller_checks

- name: "GL - Converge thin callers on every mapped branch"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.item.0] }}/repository/files/{{ '.gitlab-ci.yml' | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ item.item.1 }}"
      content: "{{ _caller_content }}"
      commit_message: "Bootstrap: converge CasC thin caller [skip ci]"
    status_code: [200, 201]
  vars:
    caller_role: tenant
    _caller_content: "{{ lookup('template', 'templates/gitlab-ci-caller.yml.j2') }}"
  loop: "{{ _gl_caller_checks.results }}"
  when: item.status == 404 or (item.json.content | b64decode) != _caller_content

- name: "GL - Check scaffold examples and folders on every branch"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.0.repo] }}/repository/files/{{ item.0.path | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _tenant_scaffold_files | product(_mapped_branches) | list }}"
  register: _gl_scaffold_checks

- name: "GL - Create missing scaffold examples and folders"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.item.0.repo] }}/repository/files/{{ item.item.0.path | urlencode() | replace('/', '%2F') }}"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ item.item.1 }}"
      content: "{{ item.item.0.content }}"
      commit_message: "Bootstrap: add managed {{ item.item.0.kind }} scaffold [skip ci]"
    status_code: [200, 201]
  loop: "{{ _gl_scaffold_checks.results }}"
  when: item.status == 404

- name: "GL - Write missing Greenfield foundation files on every mapped branch"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.0.json.id }}/repository/files/{{ item.item.0.item.path | urlencode() | replace('/', '%2F') }}"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ item.item.1 }}"
      content: "{{ item.item.0.item.content }}"
      commit_message: "Bootstrap: add {{ item.item.0.item.label }} foundation for {{ _effective_tenant_id }} [skip ci]"
    status_code: [200, 201]
  loop: "{{ _gl_foundation_preflight.results | default([]) }}"
  when:
    - onboarding_mode == 'greenfield'
    - item.status == 404

- name: "GL - Verify final scaffold markers"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.0.name] }}/repository/files/{{ '.aap-casc-engine/tenant-scaffold.yml' | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ _tenant_repo_records | product(_mapped_branches) | list }}"
  register: _gl_final_marker_checks

- name: "GL - Validate final scaffold marker content"
  ansible.builtin.command:
    argv:
      - python3
      - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
      - scaffold-marker
      - --tenant-json
      - "{{ _tenant_runtime | to_json }}"
      - --repository
      - "{{ item.item.0.name }}"
      - --actual-json
      - "{{ (item.json.content | b64decode | from_yaml) | to_json }}"
  loop: "{{ _gl_final_marker_checks.results }}"
  changed_when: false

- name: "GL - Verify final thin caller content"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.0] }}/repository/files/{{ '.gitlab-ci.yml' | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ _tenant_repositories | product(_mapped_branches) | list }}"
  register: _gl_final_caller_checks

- name: "GL - Assert final thin callers match the engine template"
  ansible.builtin.assert:
    that:
      - (item.json.content | b64decode) == _caller_content
    fail_msg: "Thin caller convergence failed for {{ item.item.0 }}@{{ item.item.1 }}."
  vars:
    caller_role: tenant
    _caller_content: "{{ lookup('template', 'templates/gitlab-ci-caller.yml.j2') }}"
  loop: "{{ _gl_final_caller_checks.results }}"

- name: "GL - Verify required scaffold files exist"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_tenant_project_by_name[item.0.repo] }}/repository/files/{{ item.0.path | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ _tenant_scaffold_files | product(_mapped_branches) | list }}"

- name: "GL - Verify final Greenfield foundation content"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/files/{{ item.0.item.path | urlencode() | replace('/', '%2F') }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ (_gl_foundation_projects.results | default([])) | product(_mapped_branches) | list }}"
  register: _gl_final_foundation_checks
  when: onboarding_mode == 'greenfield'

- name: "GL - Assert final Greenfield foundation content"
  ansible.builtin.assert:
    that:
      - (item.json.content | b64decode) == item.item.0.item.content
    fail_msg: >-
      Foundation convergence failed for
      {{ item.item.0.item.repo }}@{{ item.item.1 }}:{{ item.item.0.item.path }}.
  loop: "{{ _gl_final_foundation_checks.results | default([]) }}"
  when: onboarding_mode == 'greenfield'

- name: "GL - Resolve control project for survey fallback"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (control_scm_org ~ '/' ~ control_repo) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  register: _gl_control_project
  when: not _tenant_registered | bool

- name: "GL - Read current tenant registry for survey fallback"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project.json.id }}/repository/files/tenants.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  register: _gl_tenants_file
  when: not _tenant_registered | bool

- name: "GL - Build and validate survey registry candidate"
  when: not _tenant_registered | bool
  block:
    - name: "GL - Build survey registry candidate"
      ansible.builtin.set_fact:
        _survey_registry_candidate: >-
          {{ _current_tenants
             | combine({'tenants': _current_tenants.tenants | default([])
                                    + [_tenant_registry_entry]}) }}
      vars:
        _current_tenants: "{{ (_gl_tenants_file.json.content | b64decode) | from_yaml }}"

    - name: "GL - Write survey registry candidate for validation"
      ansible.builtin.copy:
        dest: "{{ bootstrap_clone_dir }}/survey-registry-candidate.yml"
        content: "{{ _survey_registry_candidate | to_nice_yaml(indent=2) }}"
        mode: "0600"

    - name: "GL - Validate latest survey registry candidate"
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/scripts/pipeline/casc_runtime.py"
          - validate-registry
          - --config
          - "{{ bootstrap_clone_dir }}/{{ control_repo }}/config.yml"
          - --tenants
          - "{{ bootstrap_clone_dir }}/survey-registry-candidate.yml"
      changed_when: false

- name: "GL - Register successful survey Bootstrap"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project.json.id }}/repository/files/tenants.yml"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ control_branch }}"
      content: "{{ _survey_registry_candidate | to_nice_yaml(indent=2) }}"
      commit_message: "Bootstrap: register tenant {{ _effective_tenant_id }} [skip ci]"
      last_commit_id: "{{ _gl_tenants_file.json.last_commit_id }}"
    status_code: [200, 201]
  when: not _tenant_registered | bool
