---
# bootstrap_scm_gitlab.yml — GitLab-specific SCM operations for tenant bootstrap
#
# Steps 1-5: Push platform YAML (org/team to combined platform repo at
# folder-based paths), create tenant repos, seed with folder structure,
# set permissions, update tenants.yml. Called from bootstrap.yml.
#
# All operations are idempotent — safe to rerun.
#
# Required variables:
#   platform_scm_org, platform_repo, platform_repo_id,
#   tenant_scm_org, tenant_scm_namespace_id,
#   scm_base_url, scm_api_token, org_id, team_name,
#   _effective_team_group, team_lead, team_lead_user_id,
#   tenant_repos, repo_pattern, engine_repo

# ═══════════════════════════════════════════════════════════════════════════
# Step 1: Push org + team YAML to platform repo(s) (folder-based paths)
#   - combined: writes to platform_repo at base/organizations/ and base/teams/
#   - per-resource-type: writes to aap-organizations-global and aap-teams-global
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Resolve platform repo project ID (if not provided)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (platform_scm_org ~ '/' ~ platform_repo) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  register: _gl_platform_project
  when: platform_repo_id | default('') | length == 0

- name: "GL – Set effective platform project ID"
  ansible.builtin.set_fact:
    _effective_platform_id: "{{ platform_repo_id if platform_repo_id | default('') | length > 0 else _gl_platform_project.json.id }}"

- name: "GL – Compute platform target repos and paths"
  ansible.builtin.set_fact:
    _org_target_repo: "{{ 'aap-organizations-global' if platform_repo_pattern == 'per-resource-type' else platform_repo }}"
    _team_target_repo: "{{ 'aap-teams-global' if platform_repo_pattern == 'per-resource-type' else platform_repo }}"
    _org_target_path: "{{ 'base/org-' + org_id + '.yml' if platform_repo_pattern == 'per-resource-type' else 'base/organizations/org-' + org_id + '.yml' }}"
    _team_target_path: "{{ 'base/team-' + org_id + '.yml' if platform_repo_pattern == 'per-resource-type' else 'base/teams/team-' + org_id + '.yml' }}"

- name: "GL – Resolve per-resource-type org project ID"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (platform_scm_org ~ '/' ~ _org_target_repo) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  register: _gl_org_project
  when: platform_repo_pattern == 'per-resource-type'

- name: "GL – Resolve per-resource-type team project ID"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (platform_scm_org ~ '/' ~ _team_target_repo) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  register: _gl_team_project
  when: platform_repo_pattern == 'per-resource-type'

- name: "GL – Set effective target project IDs for org/team"
  ansible.builtin.set_fact:
    _org_project_id: "{{ _gl_org_project.json.id if platform_repo_pattern == 'per-resource-type' else _effective_platform_id }}"
    _team_project_id: "{{ _gl_team_project.json.id if platform_repo_pattern == 'per-resource-type' else _effective_platform_id }}"

- name: "GL – Check if org YAML already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _org_project_id }}/repository/files/{{ _org_target_path | urlencode() | replace('/', '%2F') }}?ref=main"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_org_file

- name: "GL – Push organization YAML to platform"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _org_project_id }}/repository/files/{{ _org_target_path | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if _gl_org_file.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "main"
      content: "{{ lookup('template', 'templates/org-template.yml.j2') }}"
      commit_message: "Bootstrap: {{ 'update' if _gl_org_file.status == 200 else 'add' }} organization org-{{ org_id }} [skip dispatch]"
    status_code: [200, 201]
  vars:
    org_name: "org-{{ org_id }}"
    org_description: "{{ team_name }} automation organization"
    org_default_ee: "{{ default_ee }}"

- name: "GL – Check if team YAML already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _team_project_id }}/repository/files/{{ _team_target_path | urlencode() | replace('/', '%2F') }}?ref=main"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_team_file

- name: "GL – Push team YAML to platform"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _team_project_id }}/repository/files/{{ _team_target_path | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if _gl_team_file.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "main"
      content: "{{ lookup('template', 'templates/team-template.yml.j2') }}"
      commit_message: "Bootstrap: {{ 'update' if _gl_team_file.status == 200 else 'add' }} team for org-{{ org_id }} [skip dispatch]"
    status_code: [200, 201]

# ═══════════════════════════════════════════════════════════════════════════
# Step 2: Create tenant CasC repositories (tolerates already-exists)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Create tenant repos in GitLab namespace {{ tenant_scm_namespace_id }}"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      name: "{{ item }}"
      namespace_id: "{{ tenant_scm_namespace_id }}"
      visibility: "{{ repo_visibility }}"
      initialize_with_readme: true
    status_code: [200, 201, 400]
  failed_when: >-
    _gl_created_repos.status == 400 and
    'has already been taken' not in (_gl_created_repos.json | default({}) | string)
  loop: "{{ tenant_repos }}"
  register: _gl_created_repos

- name: "GL – Look up project IDs for tenant repos"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (tenant_scm_org ~ '/' ~ item) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ tenant_repos }}"
  register: _gl_tenant_projects

# ═══════════════════════════════════════════════════════════════════════════
# Step 3: Seed repos with pipeline + example YAML (folder-based structure)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Check if CI config already exists in tenant repos"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/.gitlab-ci.yml?ref=main"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_tenant_projects.results }}"
  loop_control:
    label: "{{ item.json.name }}"
  register: _gl_ci_checks

- name: "GL – Seed GitLab CI include in each tenant repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/.gitlab-ci.yml"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "main"
      content: "{{ lookup('template', 'templates/gitlab-ci-caller.yml.j2') }}"
      commit_message: "Bootstrap: shared pipeline template [skip dispatch]"
    status_code: [200, 201]
  loop: "{{ _gl_ci_checks.results }}"
  loop_control:
    label: "{{ item.item.json.name }}"

- name: "GL – Check if example YAML sample already exists in tenant repos"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/base%2Fprojects%2Fexample.yml.sample?ref=main"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_tenant_projects.results }}"
  loop_control:
    label: "{{ item.json.name }}"
  register: _gl_example_checks

- name: "GL – Seed example YAML sample in each tenant repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/base%2Fprojects%2Fexample.yml.sample"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "main"
      content: "{{ _seed_content }}"
      commit_message: "Bootstrap: example YAML sample (rename to .yml to activate) [skip dispatch]"
    status_code: [200, 201]
  vars:
    _repo_basename: "{{ item.item.json.name | regex_replace('-' + org_id + '$', '') }}"
    _per_type_template: "templates/seed-{{ _repo_basename }}.yml.j2"
    _combined_template: "templates/seed-combined-tenant.yml.j2"
    _template: "{{ _per_type_template if lookup('first_found', dict(files=[_per_type_template], skip=true)) else _combined_template }}"
    _seed_content: "{{ lookup('template', _template) }}"
  loop: "{{ _gl_example_checks.results }}"
  loop_control:
    label: "{{ item.item.json.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 4: Set repository permissions (tolerates already-member)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Grant tenant team maintainer access"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/members"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      user_id: "{{ team_lead_user_id }}"
      access_level: 40
    status_code: [200, 201, 409]
  loop: "{{ _gl_tenant_projects.results }}"
  loop_control:
    label: "{{ item.json.name }}"
  when: team_lead_user_id | default('') | length > 0

# ═══════════════════════════════════════════════════════════════════════════
# Step 5: Update tenants.yml in platform repo (dedup-safe)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Get current tenants.yml from platform repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _effective_platform_id }}/repository/files/tenants.yml?ref=main"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  register: _gl_tenants_file

- name: "GL – Parse current tenants.yml"
  ansible.builtin.set_fact:
    _current_tenants: "{{ (_gl_tenants_file.json.content | b64decode) | from_yaml }}"

- name: "GL – Check if tenant already registered"
  ansible.builtin.set_fact:
    _existing_org_ids: "{{ _current_tenants.tenants | default([]) | map(attribute='org_id') | list }}"

- name: "GL – Build new tenant entry"
  ansible.builtin.set_fact:
    _new_tenant_entry:
      org_id: "{{ org_id }}"
      team_name: "{{ team_name }}"
      team_lead: "{{ team_lead }}"
      tenant_scm_org: "{{ tenant_scm_org }}"
      tenant_scm_namespace_id: "{{ tenant_scm_namespace_id }}"
      repo_pattern: "{{ repo_pattern }}"
      status: active
  when: org_id not in _existing_org_ids

- name: "GL – Update tenants.yml with new tenant"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _effective_platform_id }}/repository/files/tenants.yml"
    method: PUT
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "main"
      content: "{{ _updated_tenants | to_nice_yaml(indent=2) }}"
      commit_message: "Bootstrap: register tenant {{ org_id }} [skip dispatch]"
    status_code: [200, 201]
  vars:
    _updated_tenants: "{{ _current_tenants | combine({'tenants': _current_tenants.tenants | default([]) + [_new_tenant_entry]}) }}"
  when: _new_tenant_entry is defined
