---
# genesis_scm_github.yml — GitHub-specific SCM operations for platform genesis
#
# Creates the control repository plus platform desired-state repositories. Control
# files are never written to desired-state repositories.
#
# Required variables: control_scm_org, control_repo, control_branch, genesis_repos,
#   platform_repos, scm_api_token, repo_visibility, _repo_private,
#   _config_yml_content, _tenants_yml_content

# ═══════════════════════════════════════════════════════════════════════════
# Step 1: Create all platform repos (tolerates already-exists 422)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Create or verify control and platform repositories"
  ansible.builtin.uri:
    url: "https://api.github.com/orgs/{{ control_scm_org if item.repository_class == 'control' else platform_scm_org }}/repos"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      name: "{{ item.name }}"
      description: "{{ item.description }}"
      private: "{{ _repo_private | bool }}"
      auto_init: true
    status_code: [200, 201, 422]
  failed_when: >-
    _gh_repo_result.status == 422 and
    'already exists' not in (_gh_repo_result.json | default({}) | string)
  register: _gh_repo_result
  loop: "{{ genesis_repos }}"
  loop_control:
    label: "{{ item.name }}"
  when: repo_mode == 'create'

# ═══════════════════════════════════════════════════════════════════════════
# Step 1b: Create control branch and desired-state branch topology
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Get repository metadata"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.repository_class == 'control' else platform_scm_org }}/{{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ genesis_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gh_repo_info

- name: "GH - Check repository default branch tips"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.item.repository_class == 'control' else platform_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ item.json.default_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404, 409]
  loop: "{{ _gh_repo_info.results }}"
  loop_control:
    label: "{{ item.json.name }}:{{ item.json.default_branch }}"
  register: _gh_initial_default_refs

- name: "GH - Reject unresolved non-empty repositories"
  ansible.builtin.assert:
    that:
      - >-
        item.status == 200 or
        ((item.item.item.repository_class == 'control' or create_missing_env_branches | bool)
         and item.status in [404, 409]
         and (item.item.json.size | int) == 0)
    fail_msg: >-
      Cannot resolve the default branch for
      {{ control_scm_org if item.item.item.repository_class == 'control' else platform_scm_org }}/{{ item.item.json.name }}.
      Empty platform repositories require create_missing_env_branches=true; a
      non-empty repository with an unresolved default branch is never initialized.
  loop: "{{ _gh_initial_default_refs.results }}"
  loop_control:
    label: "{{ item.item.json.name }}"

- name: "GH - Verify every mapped branch before mutation when creation is disabled"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.json.name }}/git/ref/heads/{{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404, 409]
  loop: >-
    {{ (_gh_repo_info.results | rejectattr('item.repository_class', 'equalto', 'control') | list)
       | product(env_branch_map.values() | list) | list }}
  loop_control:
    label: "{{ item.0.json.name }}:{{ item.1 }}"
  register: _gh_existing_branch_checks
  when: not (create_missing_env_branches | bool)

- name: "GH - Fail before scaffolding when required existing branches are absent"
  ansible.builtin.assert:
    that:
      - _gh_existing_branch_checks.results | rejectattr('status', 'equalto', 200) | list | length == 0
    fail_msg: >-
      repo_mode=existing with create_missing_env_branches=false requires every
      mapped branch in every platform desired-state repository before Genesis.
  when: not (create_missing_env_branches | bool)

- name: "GH - Initialize empty repositories with their final README"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.item.item.repository_class == 'control' else platform_scm_org }}/{{ item.item.json.name }}/contents/README.md"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: initialize managed repository [skip ci]"
      content: "{{ lookup('template', 'templates/genesis-readme.md.j2') | b64encode }}"
    status_code: [200, 201]
  vars:
    repo: "{{ item.item.item }}"
  loop: "{{ _gh_initial_default_refs.results }}"
  loop_control:
    label: "{{ item.item.json.name }}"
  when:
    - item.status in [404, 409]
    - item.item.item.repository_class == 'control' or create_missing_env_branches | bool

- name: "GH – Store control repository default branch"
  ansible.builtin.set_fact:
    _gh_home_default_branch: >-
      {{ (_gh_repo_info.results | selectattr('item.name', 'equalto', control_repo) | first).json.default_branch }}

- name: "GH – Create control branch when it differs from its default branch"
  when: control_branch != _gh_home_default_branch
  block:
    - name: "GH – Get control default branch HEAD SHA"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/git/ref/heads/{{ _gh_home_default_branch }}"
        method: GET
        headers:
          Authorization: "Bearer {{ scm_api_token }}"
          Accept: "application/vnd.github.v3+json"
      register: _gh_control_default_branch_ref

    - name: "GH – Create control branch from default branch"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/git/refs"
        method: POST
        headers:
          Authorization: "Bearer {{ scm_api_token }}"
          Accept: "application/vnd.github.v3+json"
        body_format: json
        body:
          ref: "refs/heads/{{ control_branch }}"
          sha: "{{ _gh_control_default_branch_ref.json.object.sha }}"
        status_code: [200, 201, 422]
      failed_when: >-
        _gh_control_branch_result.status == 422 and
        'Reference already exists' not in (_gh_control_branch_result.json.message | default(''))
      register: _gh_control_branch_result

- name: "GH – Check highest environment branch in platform desired-state repositories"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _gh_repo_info.results | rejectattr('item.repository_class', 'equalto', 'control') | list }}"
  loop_control:
    label: "{{ item.json.name }}:{{ _desired_state_seed_branch }}"
  register: _gh_seed_branch_checks

- name: "GH – Get default branch ref for missing highest environment branches"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.json.name }}/git/ref/heads/{{ item.item.json.default_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ _gh_seed_branch_checks.results | selectattr('status', 'equalto', 404) | list }}"
  loop_control:
    label: "{{ item.item.json.name }}"
  register: _gh_seed_branch_default_refs
  when: create_missing_env_branches | bool

- name: "GH – Create missing highest environment branches"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.item.json.name }}/git/refs"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      ref: "refs/heads/{{ _desired_state_seed_branch }}"
      sha: "{{ item.json.object.sha }}"
    status_code: [200, 201, 422]
  loop: "{{ _gh_seed_branch_default_refs.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.json.name }}:{{ _desired_state_seed_branch }}"
  when: create_missing_env_branches | bool

- name: "GH – Fail when the required highest environment branch is absent"
  ansible.builtin.assert:
    that: _gh_seed_branch_checks.results | selectattr('status', 'equalto', 404) | list | length == 0
    fail_msg: >-
      create_missing_env_branches=false requires {{ _desired_state_seed_branch }} to exist in every
      platform desired-state repository before any scaffolding mutation.
  when: not (create_missing_env_branches | bool)

# ═══════════════════════════════════════════════════════════════════════════
# Step 2: Push control files to the control repo (first-time only)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if config.yml already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/config.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_config_check

- name: "GH – Push config.yml (first-time only)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/config.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: initialize config.yml [skip ci]"
      content: "{{ _config_yml_content | b64encode }}"
      branch: "{{ control_branch }}"
    status_code: [200, 201]
  when: _gh_config_check.status == 404

- name: "GH – Skip config.yml (already exists)"
  ansible.builtin.debug:
    msg: "config.yml already exists in {{ control_repo }}. Skipping to preserve operational settings."
  when: _gh_config_check.status == 200

- name: "GH – Check if tenants.yml already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/tenants.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_tenants_check

- name: "GH – Push tenants.yml (first-time only)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/tenants.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: initialize tenants.yml [skip ci]"
      content: "{{ _tenants_yml_content | b64encode }}"
      branch: "{{ control_branch }}"
    status_code: [200, 201]
  when: _gh_tenants_check.status == 404

- name: "GH – Skip tenants.yml (already exists)"
  ansible.builtin.debug:
    msg: "tenants.yml already exists in {{ control_repo }}. Skipping to preserve tenant entries."
  when: _gh_tenants_check.status == 200

- name: "GH – Check naming-rules.yml.sample on control_branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/naming-rules.yml.sample?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_naming_sample_check

- name: "GH – Create missing naming-rules.yml.sample from canonical examples bytes"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org }}/{{ control_repo }}/contents/naming-rules.yml.sample"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: seed inert naming-rules.yml.sample [skip ci]"
      content: "{{ _naming_rules_sample_content | b64encode }}"
      branch: "{{ control_branch }}"
    status_code: [200, 201]
  when: _gh_naming_sample_check.status == 404

- name: "GH – Keep customer-modified naming-rules.yml.sample unchanged"
  ansible.builtin.debug:
    msg: >-
      Preserving customer-modified naming-rules.yml.sample on
      {{ control_repo }}@{{ control_branch }} (differs from examples/naming-rules.yml.sample).
  when:
    - _gh_naming_sample_check.status == 200
    - ((_gh_naming_sample_check.json.content | default('') | regex_replace('\\n', '') | b64decode) != _naming_rules_sample_content)

- name: "GH – naming-rules.yml.sample already matches canonical bytes"
  ansible.builtin.debug:
    msg: "naming-rules.yml.sample on {{ control_repo }}@{{ control_branch }} already matches canonical examples bytes."
  when:
    - _gh_naming_sample_check.status == 200
    - ((_gh_naming_sample_check.json.content | default('') | regex_replace('\\n', '') | b64decode) == _naming_rules_sample_content)

# ═══════════════════════════════════════════════════════════════════════════
# Step 3: Seed CI/CD thin caller workflow in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if CI/CD workflow already exists in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.repository_class == 'control' else platform_scm_org }}/{{ item.name }}/contents/.github/workflows/casc.yml?ref={{ control_branch if item.repository_class == 'control' else _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ genesis_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gh_workflow_checks

- name: "GH – Seed CI/CD thin caller in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.item.repository_class == 'control' else platform_scm_org }}/{{ item.item.name }}/contents/.github/workflows/casc.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add CasC pipeline-as-a-service (thin caller) [skip ci]',
          'content': lookup('template', 'templates/github-workflow-caller.yml.j2') | b64encode,
          'branch': (control_branch if item.item.repository_class == 'control' else _desired_state_seed_branch)}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    caller_role: "{{ 'control' if item.item.repository_class == 'control' else 'platform' }}"
  loop: "{{ _gh_workflow_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 4: Seed README.md in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if README.md already exists in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.repository_class == 'control' else platform_scm_org }}/{{ item.name }}/contents/README.md?ref={{ control_branch if item.repository_class == 'control' else _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ genesis_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gh_readme_checks

- name: "GH – Seed README.md in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ control_scm_org if item.item.repository_class == 'control' else platform_scm_org }}/{{ item.item.name }}/contents/README.md"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add README with repo purpose and usage [skip ci]',
          'content': lookup('template', 'templates/genesis-readme.md.j2') | b64encode,
          'branch': (control_branch if item.item.repository_class == 'control' else _desired_state_seed_branch)}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    repo: "{{ item.item }}"
  loop: "{{ _gh_readme_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 5: Seed full multi-env folder structure (base/ + env/)
#   base/<type>/ + <env>/<type>/ in the combined platform desired-state repo.
#   <env> comes from each KEY in env_branch_map (e.g., dev, tst, prd).

- name: "GH – Compute all folder paths (combined)"
  ansible.builtin.set_fact:
    _genesis_seed_paths: >-
      {{ (_platform_type_folders | map('regex_replace', '^', 'base/') | list)
         + (env_branch_map.keys() | list | product(_platform_type_folders)
            | map('join', '/') | list) }}

- name: "GH – Check .gitkeep in folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ platform_repo }}/contents/{{ item }}/.gitkeep?ref={{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _genesis_seed_paths }}"
  register: _gh_folder_checks_combined

- name: "GH – Seed .gitkeep in folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ platform_repo }}/contents/{{ item.item }}/.gitkeep"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: create ' + item.item + '/ folder [skip ci]',
          'content': '' | b64encode,
          'branch': _desired_state_seed_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_folder_checks_combined.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}/"

# ═══════════════════════════════════════════════════════════════════════════
# Step 6: Seed example.yml.sample in platform repos
#   Provides self-documenting examples of the expected YAML structure for
#   each platform resource type. Uses .sample extension so the dispatcher
#   ignores them — tenants/operators rename to .yml to activate.
# ═══════════════════════════════════════════════════════════════════════════

#   base/<type>/example.yml.sample in the combined platform desired-state repo.

- name: "GH – Check example.yml.sample in platform type folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ platform_repo }}/contents/base/{{ item.folder }}/example.yml.sample?ref={{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _platform_type_metadata }}"
  loop_control:
    label: "base/{{ item.folder }}/example.yml.sample"
  register: _gh_platform_example_checks

- name: "GH – Seed example.yml.sample in platform type folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ platform_repo }}/contents/base/{{ item.item.folder }}/example.yml.sample"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add ' + item.item.folder + ' example YAML (rename to .yml to activate) [skip ci]',
          'content': lookup('template', item.item.template) | b64encode,
          'branch': _desired_state_seed_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_platform_example_checks.results | default([]) }}"
  loop_control:
    label: "base/{{ item.item.folder }}/example.yml.sample"

# Seed files are committed on the highest environment branch first. Create the
# remaining promotion branches afterwards so each starts from the seeded state.
- name: "GH – Compute lower environment branches in promotion order"
  ansible.builtin.set_fact:
    _lower_env_branches: "{{ (env_branch_map.values() | list | reverse | list)[1:] }}"

- name: "GH – Get seeded highest branch refs for platform repositories"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.name }}/git/ref/heads/{{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}:{{ _desired_state_seed_branch }}"
  register: _gh_high_branch_refs
  when: create_missing_env_branches | bool

- name: "GH – Check lower environment branches in platform repositories"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.item.name }}/git/ref/heads/{{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ (_gh_high_branch_refs.results | default([])) | product(_lower_env_branches) | list }}"
  loop_control:
    label: "{{ item.0.item.name }}:{{ item.1 }}"
  register: _gh_lower_branch_checks
  when: create_missing_env_branches | bool

- name: "GH – Create missing lower environment branches from seeded high branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.0.item.name }}/git/refs"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      ref: "refs/heads/{{ item.item.1 }}"
      sha: "{{ item.item.0.json.object.sha }}"
    status_code: [200, 201, 422]
  loop: "{{ _gh_lower_branch_checks.results | default([]) | selectattr('status', 'equalto', 404) | list }}"
  loop_control:
    label: "{{ item.item.0.item.name }}:{{ item.item.1 }}"
  when: create_missing_env_branches | bool

# Existing branches do not inherit later scaffold commits. Converge only
# engine-managed callers, empty folders, and examples on every mapped branch.
- name: "GH - Check platform thin callers on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.name }}/contents/.github/workflows/casc.yml?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ platform_repos | product(env_branch_map.values() | list) | list }}"
  register: _gh_platform_caller_convergence_checks

- name: "GH - Converge platform thin callers on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.0.name }}/contents/.github/workflows/casc.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: converge CasC thin caller [skip ci]',
          'branch': item.item.1,
          'content': _platform_caller_content | b64encode}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    caller_role: platform
    _platform_caller_content: "{{ lookup('template', 'templates/github-workflow-caller.yml.j2') }}"
  loop: "{{ _gh_platform_caller_convergence_checks.results }}"
  when: item.status == 404 or (item.json.content | b64decode) != _platform_caller_content

- name: "GH - Initialize platform branch scaffold inventory"
  ansible.builtin.set_fact:
    _platform_branch_scaffold: []

- name: "GH - Add combined folder scaffolds"
  ansible.builtin.set_fact:
    _platform_branch_scaffold: >-
      {{ _platform_branch_scaffold
         + [{'repo': platform_repo, 'path': item + '/.gitkeep', 'content': ''}] }}
  loop: "{{ _genesis_seed_paths | default([]) }}"

- name: "GH - Add combined examples"
  ansible.builtin.set_fact:
    _platform_branch_scaffold: >-
      {{ _platform_branch_scaffold
         + [{'repo': platform_repo,
             'path': 'base/' + item.folder + '/example.yml.sample',
             'content': lookup('template', item.template)}] }}
  loop: "{{ _platform_type_metadata }}"

- name: "GH - Check platform scaffold on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.repo }}/contents/{{ item.0.path }}?ref={{ item.1 | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _platform_branch_scaffold | product(env_branch_map.values() | list) | list }}"
  register: _gh_platform_scaffold_convergence_checks

- name: "GH - Create missing platform scaffold on every mapped branch"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.0.repo }}/contents/{{ item.item.0.path }}"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: converge managed platform scaffold [skip ci]"
      branch: "{{ item.item.1 }}"
      content: "{{ item.item.0.content | b64encode }}"
    status_code: [200, 201]
  loop: "{{ _gh_platform_scaffold_convergence_checks.results }}"
  when: item.status == 404
