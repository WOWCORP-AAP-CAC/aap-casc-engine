---
# genesis_scm_github.yml — GitHub-specific SCM operations for platform genesis
#
# Creates all platform repos, pushes config.yml + tenants.yml to the home repo,
# seeds CI/CD thin callers, and README.md files. All operations are idempotent.
#
# Required variables: platform_scm_org, engine_repo, platform_repos, _home_repo,
#   scm_api_token, repo_visibility, _repo_private, _config_yml_content,
#   _tenants_yml_content

# ═══════════════════════════════════════════════════════════════════════════
# Step 1: Create all platform repos (tolerates already-exists 422)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Create platform repos in {{ platform_scm_org }}"
  ansible.builtin.uri:
    url: "https://api.github.com/orgs/{{ platform_scm_org }}/repos"
    method: POST
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      name: "{{ item.name }}"
      description: "{{ item.description }}"
      private: "{{ _repo_private | bool }}"
      auto_init: true
    status_code: [200, 201, 422]
  failed_when: >-
    _gh_repo_result.status == 422 and
    'already exists' not in (_gh_repo_result.json | default({}) | string)
  register: _gh_repo_result
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 1b: Create platform_branch on all repos if it differs from default
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Get repo info for all platform repos"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.name }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gh_repo_info

- name: "GH – Store home repo default branch"
  ansible.builtin.set_fact:
    _gh_home_default_branch: >-
      {{ (_gh_repo_info.results | selectattr('item.name', 'equalto', _home_repo) | first).json.default_branch }}

- name: "GH – Create platform_branch on all repos (if not default)"
  when: platform_branch != _gh_home_default_branch
  block:
    - name: "GH – Get default branch HEAD SHA for each repo"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.json.name }}/git/ref/heads/{{ item.json.default_branch }}"
        method: GET
        headers:
          Authorization: "Bearer {{ scm_api_token }}"
          Accept: "application/vnd.github.v3+json"
      loop: "{{ _gh_repo_info.results }}"
      loop_control:
        label: "{{ item.json.name }}"
      register: _gh_default_branch_refs

    - name: "GH – Create platform_branch from default branch"
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.json.name }}/git/refs"
        method: POST
        headers:
          Authorization: "Bearer {{ scm_api_token }}"
          Accept: "application/vnd.github.v3+json"
        body_format: json
        body:
          ref: "refs/heads/{{ platform_branch }}"
          sha: "{{ item.json.object.sha }}"
        status_code: [200, 201, 422]
      failed_when: >-
        _gh_platform_branch_result.status == 422 and
        'Reference already exists' not in (_gh_platform_branch_result.json.message | default(''))
      loop: "{{ _gh_default_branch_refs.results }}"
      loop_control:
        label: "{{ item.item.json.name }}"
      register: _gh_platform_branch_result

# ═══════════════════════════════════════════════════════════════════════════
# Step 2: Push config.yml and tenants.yml to home repo (first-time only)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if config.yml already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/config.yml?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_config_check

- name: "GH – Push config.yml (first-time only)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/config.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: initialize config.yml [skip dispatch]"
      content: "{{ _config_yml_content | b64encode }}"
      branch: "{{ platform_branch }}"
    status_code: [200, 201]
  when: _gh_config_check.status == 404

- name: "GH – Skip config.yml (already exists)"
  ansible.builtin.debug:
    msg: "config.yml already exists in {{ _home_repo }}. Skipping to preserve operational settings."
  when: _gh_config_check.status == 200

- name: "GH – Check if tenants.yml already exists"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/tenants.yml?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  register: _gh_tenants_check

- name: "GH – Push tenants.yml (first-time only)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/tenants.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body:
      message: "Genesis: initialize tenants.yml [skip dispatch]"
      content: "{{ _tenants_yml_content | b64encode }}"
      branch: "{{ platform_branch }}"
    status_code: [200, 201]
  when: _gh_tenants_check.status == 404

- name: "GH – Skip tenants.yml (already exists)"
  ansible.builtin.debug:
    msg: "tenants.yml already exists in {{ _home_repo }}. Skipping to preserve tenant entries."
  when: _gh_tenants_check.status == 200

# ═══════════════════════════════════════════════════════════════════════════
# Step 3: Seed CI/CD thin caller workflow in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if CI/CD workflow already exists in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.name }}/contents/.github/workflows/casc.yml?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gh_workflow_checks

- name: "GH – Seed CI/CD thin caller in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.name }}/contents/.github/workflows/casc.yml"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add CasC pipeline-as-a-service (thin caller) [skip dispatch]',
          'content': lookup('template', 'templates/github-workflow-caller.yml.j2') | b64encode,
          'branch': platform_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    caller_role: "{{ 'platform_home' if item.item.is_home | default(false) else 'platform_nonhome' }}"
  loop: "{{ _gh_workflow_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 4: Seed README.md in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GH – Check if README.md already exists in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.name }}/contents/README.md?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gh_readme_checks

- name: "GH – Seed README.md in each repo"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.name }}/contents/README.md"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add README with repo purpose and usage [skip dispatch]',
          'content': lookup('template', 'templates/genesis-readme.md.j2') | b64encode,
          'branch': platform_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  vars:
    repo: "{{ item.item }}"
  loop: "{{ _gh_readme_checks.results }}"
  loop_control:
    label: "{{ item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 5: Seed full multi-env folder structure (base/ + env/)
#   Makes repos self-documenting with the complete layout from day-0.
#   - combined:          base/<type>/ + <env>/<type>/ in home repo
#   - per-resource-type: base/ + <env>/ in each type-specific repo
#   <env> comes from each KEY in env_branch_map (e.g., dev, tst, prd).
# ═══════════════════════════════════════════════════════════════════════════

# --- Combined pattern: base/<type>/ + <env>/<type>/ in one repo ---
- name: "GH – Compute all folder paths (combined)"
  ansible.builtin.set_fact:
    _genesis_seed_paths: >-
      {{ (_platform_type_folders | map('regex_replace', '^', 'base/') | list)
         + (env_branch_map.keys() | list | product(_platform_type_folders)
            | map('join', '/') | list) }}
  when: repo_pattern == 'combined'

- name: "GH – Check .gitkeep in folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/{{ item }}/.gitkeep?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _genesis_seed_paths }}"
  register: _gh_folder_checks_combined
  when: repo_pattern == 'combined'

- name: "GH – Seed .gitkeep in folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/{{ item.item }}/.gitkeep"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: create ' + item.item + '/ folder [skip dispatch]',
          'content': '' | b64encode,
          'branch': platform_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_folder_checks_combined.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}/"
  when: repo_pattern == 'combined'

# --- Per-resource-type: base/ + <env>/ in each type repo ---
- name: "GH – Compute folder prefixes (per-resource-type)"
  ansible.builtin.set_fact:
    _genesis_folder_prefixes: "{{ ['base'] + (env_branch_map.keys() | list) }}"
  when: repo_pattern == 'per-resource-type'

- name: "GH – Check .gitkeep in folders (per-resource-type)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.0.name }}/contents/{{ item.1 }}/.gitkeep?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ (platform_repos | rejectattr('is_home') | list) | product(_genesis_folder_prefixes) | list }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1 }}/"
  register: _gh_folder_checks_per_type
  when: repo_pattern == 'per-resource-type'

- name: "GH – Seed .gitkeep in folders (per-resource-type)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.0.name }}/contents/{{ item.item.1 }}/.gitkeep"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: create ' + item.item.1 + '/ folder [skip dispatch]',
          'content': '' | b64encode,
          'branch': platform_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_folder_checks_per_type.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.name }}/{{ item.item.1 }}/"
  when: repo_pattern == 'per-resource-type'

# ═══════════════════════════════════════════════════════════════════════════
# Step 6: Seed example.yml.sample in platform repos
#   Provides self-documenting examples of the expected YAML structure for
#   each platform resource type. Uses .sample extension so the dispatcher
#   ignores them — tenants/operators rename to .yml to activate.
# ═══════════════════════════════════════════════════════════════════════════

# --- Combined pattern: base/<type>/example.yml.sample in home repo ---
- name: "GH – Check example.yml.sample in platform type folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/base/{{ item.folder }}/example.yml.sample?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ _platform_type_metadata }}"
  loop_control:
    label: "base/{{ item.folder }}/example.yml.sample"
  register: _gh_platform_example_checks
  when: repo_pattern == 'combined'

- name: "GH – Seed example.yml.sample in platform type folders (combined)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ _home_repo }}/contents/base/{{ item.item.folder }}/example.yml.sample"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add ' + item.item.folder + ' example YAML (rename to .yml to activate) [skip dispatch]',
          'content': lookup('template', item.item.template) | b64encode,
          'branch': platform_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_platform_example_checks.results | default([]) }}"
  loop_control:
    label: "base/{{ item.item.folder }}/example.yml.sample"
  when: repo_pattern == 'combined'

# --- Per-resource-type: base/example.yml.sample in each type repo ---
- name: "GH – Check example.yml.sample in platform type repos (per-resource-type)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.name }}/contents/base/example.yml.sample?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    status_code: [200, 404]
  loop: "{{ platform_repos | rejectattr('is_home') | list }}"
  loop_control:
    label: "{{ item.name }}/base/example.yml.sample"
  register: _gh_platform_example_checks_per_type
  when: repo_pattern == 'per-resource-type'

- name: "GH – Seed example.yml.sample in platform type repos (per-resource-type)"
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ platform_scm_org }}/{{ item.item.name }}/contents/base/example.yml.sample"
    method: PUT
    headers:
      Authorization: "Bearer {{ scm_api_token }}"
      Accept: "application/vnd.github.v3+json"
    body_format: json
    body: >-
      {{ {'message': 'Genesis: add ' + item.item.folder + ' example YAML (rename to .yml to activate) [skip dispatch]',
          'content': lookup('template', item.item.template) | b64encode,
          'branch': platform_branch}
         | combine({'sha': item.json.sha} if item.status == 200 else {}) }}
    status_code: [200, 201]
  loop: "{{ _gh_platform_example_checks_per_type.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}/base/example.yml.sample"
  when: repo_pattern == 'per-resource-type'
