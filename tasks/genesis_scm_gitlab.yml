---
# genesis_scm_gitlab.yml — GitLab-specific SCM operations for platform genesis
#
# Creates all platform repos, pushes config.yml + tenants.yml to the home repo,
# seeds CI/CD includes, and README.md files. All operations are idempotent.
#
# Required variables: platform_scm_org, platform_namespace_id, engine_repo,
#   platform_repos, _home_repo, scm_base_url, scm_api_token,
#   repo_visibility, _config_yml_content, _tenants_yml_content

# ═══════════════════════════════════════════════════════════════════════════
# Step 1: Create all platform repos (tolerates already-exists)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Create platform repos in {{ platform_scm_org }}"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      description: "{{ item.description }}"
      namespace_id: "{{ platform_namespace_id }}"
      visibility: "{{ repo_visibility }}"
      initialize_with_readme: true
    status_code: [200, 201, 400]
  failed_when: >-
    _gl_repo_result.status == 400 and
    'has already been taken' not in (_gl_repo_result.json | default({}) | string)
  register: _gl_repo_result
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}"

- name: "GL – Look up project IDs"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ (platform_scm_org ~ '/' ~ item.name) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ platform_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gl_project_lookups

# ═══════════════════════════════════════════════════════════════════════════
# Step 2: Push config.yml + tenants.yml to home repo (first-time only)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Find home repo project ID"
  ansible.builtin.set_fact:
    _gl_home_project_id: >-
      {{ (_gl_project_lookups.results | selectattr('item.name', 'equalto', _home_repo) | first).json.id }}

- name: "GL – Store home repo default branch"
  ansible.builtin.set_fact:
    _gl_home_default_branch: >-
      {{ (_gl_project_lookups.results | selectattr('item.name', 'equalto', _home_repo) | first).json.default_branch | default('main') }}

- name: "GL – Create platform branch if not default"
  when: platform_branch != _gl_home_default_branch
  block:
    - name: "GL – Check if platform branch already exists"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_home_project_id }}/repository/branches/{{ platform_branch | urlencode | replace('/', '%2F') }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        status_code: [200, 404]
      register: _gl_platform_branch_check

    - name: "GL – Create platform branch from default branch"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_home_project_id }}/repository/branches"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "{{ platform_branch }}"
          ref: "{{ _gl_home_default_branch }}"
        status_code: [200, 201]
      when: _gl_platform_branch_check.status == 404

- name: "GL – Check if config.yml already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_home_project_id }}/repository/files/config.yml?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_config_check

- name: "GL – Push config.yml (first-time only)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_home_project_id }}/repository/files/config.yml"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ platform_branch }}"
      content: "{{ _config_yml_content }}"
      commit_message: "Genesis: initialize config.yml [skip dispatch]"
    status_code: [200, 201]
  when: _gl_config_check.status == 404

- name: "GL – Check if tenants.yml already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_home_project_id }}/repository/files/tenants.yml?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_tenants_check

- name: "GL – Push tenants.yml (first-time only)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_home_project_id }}/repository/files/tenants.yml"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ platform_branch }}"
      content: "{{ _tenants_yml_content }}"
      commit_message: "Genesis: initialize tenants.yml [skip dispatch]"
    status_code: [200, 201]
  when: _gl_tenants_check.status == 404

# ═══════════════════════════════════════════════════════════════════════════
# Step 3: Seed CI/CD include in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Create platform branch in non-home repos (if not default)"
  when: platform_branch != _gl_home_default_branch
  block:
    - name: "GL – Check if platform branch exists in each repo"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/branches/{{ platform_branch | urlencode | replace('/', '%2F') }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        status_code: [200, 404]
      loop: "{{ _gl_project_lookups.results | rejectattr('item.name', 'equalto', _home_repo) | list }}"
      loop_control:
        label: "{{ item.item.name }}"
      register: _gl_repo_branch_checks

    - name: "GL – Create platform branch from default in repos where missing"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/branches"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "{{ platform_branch }}"
          ref: "{{ item.item.json.default_branch | default(_gl_home_default_branch) }}"
        status_code: [200, 201]
      loop: "{{ _gl_repo_branch_checks.results | selectattr('status', 'equalto', 404) | list }}"
      loop_control:
        label: "{{ item.item.item.name }}"

- name: "GL – Check if .gitlab-ci.yml already exists in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/.gitlab-ci.yml?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_project_lookups.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: _gl_ci_checks

- name: "GL – Seed .gitlab-ci.yml in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/.gitlab-ci.yml"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ platform_branch }}"
      content: "{{ lookup('template', 'templates/gitlab-ci-caller.yml.j2') }}"
      commit_message: "Genesis: add shared CasC pipeline template [skip dispatch]"
    status_code: [200, 201]
  loop: "{{ _gl_ci_checks.results }}"
  loop_control:
    label: "{{ item.item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 4: Seed README.md in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Check if README.md already exists in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/README.md?ref={{ platform_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_project_lookups.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: _gl_readme_checks

- name: "GL – Seed README.md in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/README.md"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ platform_branch }}"
      content: "{{ lookup('template', 'templates/genesis-readme.md.j2') }}"
      commit_message: "Genesis: add README with repo purpose and usage [skip dispatch]"
    status_code: [200, 201]
  vars:
    repo: "{{ item.item.item }}"
  loop: "{{ _gl_readme_checks.results }}"
  loop_control:
    label: "{{ item.item.item.name }}"
