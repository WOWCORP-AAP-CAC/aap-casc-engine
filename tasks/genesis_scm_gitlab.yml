---
# genesis_scm_gitlab.yml — GitLab-specific SCM operations for platform genesis
#
# Creates the control repository plus platform desired-state repositories.
# Control files are never written to desired-state repositories.
#
# Required variables: control_scm_org, control_repo, control_branch, genesis_repos,
#   platform_repos, platform_namespace_id, control_namespace_id, scm_api_token,
#   repo_visibility, _config_yml_content, _tenants_yml_content, _naming_rules_yml_content

# ═══════════════════════════════════════════════════════════════════════════
# Step 1: Create all platform repos (tolerates already-exists)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Create or verify control and platform repositories"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      description: "{{ item.description }}"
      namespace_id: "{{ control_namespace_id if item.repository_class == 'control' else platform_namespace_id }}"
      visibility: "{{ repo_visibility }}"
      initialize_with_readme: true
    status_code: [200, 201, 400]
  failed_when: >-
    _gl_repo_result.status == 400 and
    'has already been taken' not in (_gl_repo_result.json | default({}) | string)
  register: _gl_repo_result
  loop: "{{ genesis_repos }}"
  loop_control:
    label: "{{ item.name }}@{{ control_namespace_id if item.repository_class == 'control' else platform_namespace_id }}"
  when: repo_mode == 'create'

- name: "GL – Look up project IDs"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ ((control_scm_org if item.repository_class == 'control' else platform_scm_org) ~ '/' ~ item.name) | urlencode() | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
  loop: "{{ genesis_repos }}"
  loop_control:
    label: "{{ item.name }}"
  register: _gl_project_lookups

# ═══════════════════════════════════════════════════════════════════════════
# Step 2: Push config.yml + tenants.yml to the control repo (first-time only)
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Find control repo project ID"
  ansible.builtin.set_fact:
    _gl_control_project_id: >-
      {{ (_gl_project_lookups.results | selectattr('item.name', 'equalto', control_repo) | first).json.id }}

- name: "GL – Store control repo default branch"
  ansible.builtin.set_fact:
    _gl_control_default_branch: >-
      {{ (_gl_project_lookups.results | selectattr('item.name', 'equalto', control_repo) | first).json.default_branch | default('main') }}

- name: "GL – Store combined platform desired-state project ID"
  ansible.builtin.set_fact:
    _gl_platform_combined_project_id: >-
      {{ (_gl_project_lookups.results | selectattr('item.name', 'equalto', platform_repo) | first).json.id }}
  when: repo_pattern == 'combined'

- name: "GL – Verify every mapped desired-state branch before existing-repo mutation"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/branches/{{ item.1 | urlencode | replace('/', '%2F') }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: >-
    {{ (_gl_project_lookups.results | selectattr('item.repository_class', 'equalto', 'platform') | list)
       | product(env_branch_map.values() | list) | list }}
  loop_control:
    label: "{{ item.0.item.name }}:{{ item.1 }}"
  register: _gl_existing_branch_checks
  when: not (create_missing_env_branches | bool)

- name: "GL – Fail existing-repository Genesis before scaffolding when branches are missing"
  ansible.builtin.assert:
    that: _gl_existing_branch_checks.results | selectattr('status', 'equalto', 404) | list | length == 0
    fail_msg: "repo_mode=existing with create_missing_env_branches=false requires every mapped branch in every platform desired-state repository."
  when: not (create_missing_env_branches | bool)

- name: "GL – Create control branch if not default"
  when: control_branch != _gl_control_default_branch
  block:
    - name: "GL – Check if platform branch already exists"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/branches/{{ control_branch | urlencode | replace('/', '%2F') }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        status_code: [200, 404]
      register: _gl_platform_branch_check

    - name: "GL – Create platform branch from default branch"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/branches"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "{{ control_branch }}"
          ref: "{{ _gl_control_default_branch }}"
        status_code: [200, 201]
      when: _gl_platform_branch_check.status == 404

- name: "GL – Check if config.yml already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/files/config.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_config_check

- name: "GL – Push config.yml (first-time only)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/files/config.yml"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ control_branch }}"
      content: "{{ _config_yml_content }}"
      commit_message: "Genesis: initialize config.yml [skip ci]"
    status_code: [200, 201]
  when: _gl_config_check.status == 404

- name: "GL – Check if tenants.yml already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/files/tenants.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_tenants_check

- name: "GL – Push tenants.yml (first-time only)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/files/tenants.yml"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ control_branch }}"
      content: "{{ _tenants_yml_content }}"
      commit_message: "Genesis: initialize tenants.yml [skip ci]"
    status_code: [200, 201]
  when: _gl_tenants_check.status == 404

- name: "GL – Check if naming-rules.yml already exists"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/files/naming-rules.yml?ref={{ control_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  register: _gl_naming_rules_check

- name: "GL – Push naming-rules.yml (first-time only)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_control_project_id }}/repository/files/naming-rules.yml"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ control_branch }}"
      content: "{{ _naming_rules_yml_content }}"
      commit_message: "Genesis: initialize naming policy [skip ci]"
    status_code: [200, 201]
  when: _gl_naming_rules_check.status == 404

# ═══════════════════════════════════════════════════════════════════════════
# Step 3: Seed CI/CD include in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Create desired-state seed branch in platform repositories"
  when: _desired_state_seed_branch != 'main' and create_missing_env_branches | bool
  block:
    - name: "GL – Check if platform branch exists in each repo"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/branches/{{ _desired_state_seed_branch | urlencode | replace('/', '%2F') }}"
        method: GET
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        status_code: [200, 404]
      loop: "{{ _gl_project_lookups.results | selectattr('item.repository_class', 'equalto', 'platform') | list }}"
      loop_control:
        label: "{{ item.item.name }}"
      register: _gl_repo_branch_checks

    - name: "GL – Create platform branch from default in repos where missing"
      ansible.builtin.uri:
        url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/branches"
        method: POST
        headers:
          PRIVATE-TOKEN: "{{ scm_api_token }}"
        body_format: json
        body:
          branch: "{{ _desired_state_seed_branch }}"
          ref: "{{ item.item.json.default_branch | default('main') }}"
        status_code: [200, 201]
      loop: "{{ _gl_repo_branch_checks.results | selectattr('status', 'equalto', 404) | list }}"
      loop_control:
        label: "{{ item.item.item.name }}"

- name: "GL – Check if .gitlab-ci.yml already exists in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/.gitlab-ci.yml?ref={{ control_branch if item.item.repository_class == 'control' else _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_project_lookups.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: _gl_ci_checks

- name: "GL – Seed .gitlab-ci.yml in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/.gitlab-ci.yml"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ control_branch if item.item.item.repository_class == 'control' else _desired_state_seed_branch }}"
      content: "{{ lookup('template', 'templates/gitlab-ci-caller.yml.j2') }}"
      commit_message: "Genesis: add shared CasC pipeline template [skip ci]"
    status_code: [200, 201]
  vars:
    caller_role: "{{ 'control' if item.item.item.repository_class == 'control' else 'platform' }}"
  loop: "{{ _gl_ci_checks.results }}"
  loop_control:
    label: "{{ item.item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 4: Seed README.md in each repo
# ═══════════════════════════════════════════════════════════════════════════

- name: "GL – Check if README.md already exists in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/README.md?ref={{ control_branch if item.item.repository_class == 'control' else _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_project_lookups.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: _gl_readme_checks

- name: "GL – Seed README.md in each repo"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/README.md"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ control_branch if item.item.item.repository_class == 'control' else _desired_state_seed_branch }}"
      content: "{{ lookup('template', 'templates/genesis-readme.md.j2') }}"
      commit_message: "Genesis: add README with repo purpose and usage [skip ci]"
    status_code: [200, 201]
  vars:
    repo: "{{ item.item.item }}"
  loop: "{{ _gl_readme_checks.results }}"
  loop_control:
    label: "{{ item.item.item.name }}"

# ═══════════════════════════════════════════════════════════════════════════
# Step 5: Seed full multi-env folder structure (base/ + env/)
#   Makes repos self-documenting with the complete layout from day-0.
#   - combined:          base/<type>/ + <env>/<type>/ in the combined platform desired-state repo
#   - per-resource-type: base/ + <env>/ in each type-specific repo
#   <env> comes from each KEY in env_branch_map (e.g., dev, tst, prd).
# ═══════════════════════════════════════════════════════════════════════════

# --- Combined pattern: base/<type>/ + <env>/<type>/ in the combined platform desired-state repo ---
- name: "GL – Compute all folder paths (combined)"
  ansible.builtin.set_fact:
    _genesis_seed_paths: >-
      {{ (_platform_type_folders | map('regex_replace', '^', 'base/') | list)
         + (env_branch_map.keys() | list | product(_platform_type_folders)
            | map('join', '/') | list) }}
  when: repo_pattern == 'combined'

- name: "GL – Check .gitkeep in folders (combined)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_platform_combined_project_id }}/repository/files/{{ (item ~ '/.gitkeep') | urlencode() | replace('/', '%2F') }}?ref={{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _genesis_seed_paths }}"
  register: _gl_folder_checks_combined
  when: repo_pattern == 'combined'

- name: "GL – Seed .gitkeep in folders (combined)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_platform_combined_project_id }}/repository/files/{{ (item.item ~ '/.gitkeep') | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ _desired_state_seed_branch }}"
      content: ""
      commit_message: "Genesis: create {{ item.item }}/ folder [skip ci]"
    status_code: [200, 201]
  loop: "{{ _gl_folder_checks_combined.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}/"
  when: repo_pattern == 'combined'

# --- Per-resource-type: base/ + <env>/ in each type repo ---
- name: "GL – Compute folder prefixes (per-resource-type)"
  ansible.builtin.set_fact:
    _genesis_folder_prefixes: "{{ ['base'] + (env_branch_map.keys() | list) }}"
  when: repo_pattern == 'per-resource-type'

- name: "GL – Check .gitkeep in folders (per-resource-type)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/files/{{ (item.1 ~ '/.gitkeep') | urlencode() | replace('/', '%2F') }}?ref={{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ (_gl_project_lookups.results | selectattr('item.repository_class', 'equalto', 'platform') | list) | product(_genesis_folder_prefixes) | list }}"
  loop_control:
    label: "{{ item.0.item.name }}/{{ item.1 }}/"
  register: _gl_folder_checks_per_type
  when: repo_pattern == 'per-resource-type'

- name: "GL – Seed .gitkeep in folders (per-resource-type)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.0.json.id }}/repository/files/{{ (item.item.1 ~ '/.gitkeep') | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ _desired_state_seed_branch }}"
      content: ""
      commit_message: "Genesis: create {{ item.item.1 }}/ folder [skip ci]"
    status_code: [200, 201]
  loop: "{{ _gl_folder_checks_per_type.results | default([]) }}"
  loop_control:
    label: "{{ item.item.0.item.name }}/{{ item.item.1 }}/"
  when: repo_pattern == 'per-resource-type'

# ═══════════════════════════════════════════════════════════════════════════
# Step 6: Seed example.yml.sample in platform repos
#   Provides self-documenting examples of the expected YAML structure for
#   each platform resource type. Uses .sample extension so the dispatcher
#   ignores them — tenants/operators rename to .yml to activate.
# ═══════════════════════════════════════════════════════════════════════════

# --- Combined pattern: base/<type>/example.yml.sample in the combined platform desired-state repo ---
- name: "GL – Check example.yml.sample in platform type folders (combined)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_platform_combined_project_id }}/repository/files/{{ ('base/' ~ item.folder ~ '/example.yml.sample') | urlencode() | replace('/', '%2F') }}?ref={{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _platform_type_metadata }}"
  loop_control:
    label: "base/{{ item.folder }}/example.yml.sample"
  register: _gl_platform_example_checks
  when: repo_pattern == 'combined'

- name: "GL – Seed example.yml.sample in platform type folders (combined)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ _gl_platform_combined_project_id }}/repository/files/{{ ('base/' ~ item.item.folder ~ '/example.yml.sample') | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ _desired_state_seed_branch }}"
      content: "{{ lookup('template', item.item.template) }}"
      commit_message: "Genesis: add {{ item.item.folder }} example YAML (rename to .yml to activate) [skip ci]"
    status_code: [200, 201]
  loop: "{{ _gl_platform_example_checks.results | default([]) }}"
  loop_control:
    label: "base/{{ item.item.folder }}/example.yml.sample"
  when: repo_pattern == 'combined'

# --- Per-resource-type: base/example.yml.sample in each type repo ---
- name: "GL – Check example.yml.sample in platform type repos (per-resource-type)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.json.id }}/repository/files/{{ ('base/example.yml.sample') | urlencode() | replace('/', '%2F') }}?ref={{ _desired_state_seed_branch | urlencode }}"
    method: GET
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    status_code: [200, 404]
  loop: "{{ _gl_project_lookups.results | selectattr('item.repository_class', 'equalto', 'platform') | list }}"
  loop_control:
    label: "{{ item.item.name }}/base/example.yml.sample"
  register: _gl_platform_example_checks_per_type
  when: repo_pattern == 'per-resource-type'

- name: "GL – Seed example.yml.sample in platform type repos (per-resource-type)"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.item.json.id }}/repository/files/{{ ('base/example.yml.sample') | urlencode() | replace('/', '%2F') }}"
    method: "{{ 'PUT' if item.status == 200 else 'POST' }}"
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ _desired_state_seed_branch }}"
      content: "{{ lookup('template', item.item.item.template) }}"
      commit_message: "Genesis: add {{ item.item.item.folder }} example YAML (rename to .yml to activate) [skip ci]"
    status_code: [200, 201]
  loop: "{{ _gl_platform_example_checks_per_type.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.name }}/base/example.yml.sample"
  when: repo_pattern == 'per-resource-type'

# Desired-state files are seeded on the highest environment branch first. The
# remaining branches start from that immutable seed commit and then follow the
# normal low-to-high promotion lifecycle.
- name: "GL – Compute lower environment branches in promotion order"
  ansible.builtin.set_fact:
    _lower_env_branches: "{{ (env_branch_map.values() | list | reverse | list)[1:] }}"

- name: "GL – Create missing lower environment branches from seeded high branch"
  ansible.builtin.uri:
    url: "{{ scm_base_url }}/api/v4/projects/{{ item.0.json.id }}/repository/branches"
    method: POST
    headers:
      PRIVATE-TOKEN: "{{ scm_api_token }}"
    body_format: json
    body:
      branch: "{{ item.1 }}"
      ref: "{{ _desired_state_seed_branch }}"
    status_code: [200, 201, 400]
  failed_when: >-
    _gl_lower_branch_result.status == 400 and
    'already exists' not in (_gl_lower_branch_result.json | default({}) | string)
  loop: >-
    {{ (_gl_project_lookups.results | selectattr('item.repository_class', 'equalto', 'platform') | list)
       | product(_lower_env_branches) | list }}
  loop_control:
    label: "{{ item.0.item.name }}:{{ item.1 }}"
  register: _gl_lower_branch_result
  when: create_missing_env_branches | bool
